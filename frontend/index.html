<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPZ Bodegas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#F1F4F9;color:#1E293B}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #CBD5E1;border-radius:6px;width:100%;background:#fff;color:#1E293B;outline:none;transition:border .15s}
input:focus,select:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
button{font-family:inherit;cursor:pointer;border:none}
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:#64748B;background:#F8FAFC;border-bottom:1px solid #E2E8F0;text-align:left;white-space:nowrap}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid #F1F4F9;color:#1E293B;vertical-align:middle}
tr:hover td{background:#F8FAFC}
#root{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:#0F172A;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid #1E293B}
.sidebar-logo h1{color:#F8FAFC;font-size:13px;font-weight:600;line-height:1.3}
.sidebar-logo p{color:#64748B;font-size:11px;margin-top:2px}
.nav-group-title{padding:14px 16px 4px;color:#475569;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;color:#94A3B8;cursor:pointer;font-size:13px;border-radius:6px;margin:1px 6px;transition:all .15s}
.nav-item:hover{background:#1E293B;color:#E2E8F0}
.nav-item.active{background:#1D4ED8;color:#EFF6FF;font-weight:500}
.nav-item .badge{margin-left:auto;background:#EF4444;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:600}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 24px;background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:17px;font-weight:600;color:#0F172A}
.topbar-user{font-size:12px;color:#64748B;display:flex;align-items:center;gap:10px}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:0;overflow:hidden;margin-bottom:16px}
.card-header{padding:14px 18px;border-bottom:1px solid #F1F4F9;display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:600;color:#0F172A}
.card-body{padding:18px}
.card-table{overflow-x:auto}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{border-radius:10px;padding:16px 18px}
.kpi-blue{background:#EFF6FF;border:1px solid #BFDBFE}
.kpi-green{background:#F0FDF4;border:1px solid #BBF7D0}
.kpi-amber{background:#FFFBEB;border:1px solid #FDE68A}
.kpi-red{background:#FEF2F2;border:1px solid #FECACA}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.kpi-blue .kpi-label{color:#1D4ED8}.kpi-green .kpi-label{color:#15803D}.kpi-amber .kpi-label{color:#92400E}.kpi-red .kpi-label{color:#B91C1C}
.kpi-value{font-size:22px;font-weight:700}
.kpi-blue .kpi-value{color:#1E40AF}.kpi-green .kpi-value{color:#166534}.kpi-amber .kpi-value{color:#78350F}.kpi-red .kpi-value{color:#991B1B}
.kpi-sub{font-size:11px;margin-top:3px;opacity:.75}
.btn{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all .15s;cursor:pointer}
.btn-primary{background:#1D4ED8;color:#fff;border:none}.btn-primary:hover{background:#1E40AF}
.btn-ghost{background:#fff;color:#475569;border:1px solid #CBD5E1}.btn-ghost:hover{background:#F1F4F9}
.btn-danger{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}.btn-danger:hover{background:#FEE2E2}
.btn-sm{padding:4px 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:#DCFCE7;color:#166534}.badge-red{background:#FEE2E2;color:#991B1B}
.badge-blue{background:#DBEAFE;color:#1E40AF}.badge-amber{background:#FEF3C7;color:#92400E}
.badge-gray{background:#F1F5F9;color:#475569}
.form-row{margin-bottom:12px}
.form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.form-label span{color:#EF4444}
.alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px}
.alert-error{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}
.alert-success{background:#DCFCE7;color:#166534;border:1px solid #BBF7D0}
.alert-warning{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:660px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.modal-lg{max-width:780px}
.modal-header{padding:16px 20px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:600;color:#0F172A}
.modal-close{background:none;border:none;cursor:pointer;color:#64748B;font-size:20px;line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:#F1F5F9}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:14px 20px;border-top:1px solid #E2E8F0;display:flex;justify-content:flex-end;gap:8px}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toolbar input,.toolbar select{width:auto;min-width:160px}
.mono{font-family:'Courier New',monospace;font-size:12px}
.text-right{text-align:right}
.text-center{text-align:center}
.entry-plus{color:#16A34A;font-weight:700}.entry-minus{color:#DC2626;font-weight:700}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:#0F172A}
.login-card{background:#fff;border-radius:14px;padding:40px 36px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-card h1{font-size:20px;font-weight:700;color:#0F172A;margin-bottom:4px}
.login-card p{color:#64748B;font-size:13px;margin-bottom:24px}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:#64748B;font-size:14px}
.empty{padding:32px;text-align:center;color:#94A3B8;font-size:13px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {useState,useEffect,useMemo,useCallback}=React;
const e=React.createElement;

// ── helpers ────────────────────────────────────────────────
const CLP=n=>new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(n||0);
const N=(n,d=1)=>new Intl.NumberFormat('es-CL',{maximumFractionDigits:d}).format(n||0);
const TODAY=new Date().toISOString().split('T')[0];

// ── API helper ─────────────────────────────────────────────
function api(path,method='GET',body,token){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token) opts.headers['Authorization']='Bearer '+token;
  if(body)  opts.body=JSON.stringify(body);
  return fetch('/api'+path,opts).then(async r=>{
    const data=await r.json();
    if(!r.ok) throw new Error(data.error||'Error del servidor');
    return data;
  });
}

// ── Login ──────────────────────────────────────────────────
function LoginPage({onLogin}){
  const [email,setEmail]=useState('admin@lpz.cl');
  const [pass,setPass]=useState('admin123');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async(ev)=>{
    ev.preventDefault();setErr('');setLoading(true);
    try{
      const r=await api('/auth/login','POST',{email,password:pass});
      localStorage.setItem('lpz_token',r.token);
      localStorage.setItem('lpz_user',JSON.stringify(r.usuario));
      onLogin(r.token,r.usuario);
    }catch(ex){setErr(ex.message);}
    finally{setLoading(false);}
  };
  return e('div',{className:'login-wrap'},
    e('div',{className:'login-card'},
      e('h1',null,'LPZ Bodegas'),
      e('p',null,'Leonidas Poo Zenteno y Cía. Ltda.'),
      err&&e('div',{className:'alert alert-error'},err),
      e('form',{onSubmit:submit},
        e('div',{className:'form-row'},e('label',{className:'form-label'},'Correo'),e('input',{type:'email',value:email,onChange:ev=>setEmail(ev.target.value),required:true})),
        e('div',{className:'form-row'},e('label',{className:'form-label'},'Contraseña'),e('input',{type:'password',value:pass,onChange:ev=>setPass(ev.target.value),required:true})),
        e('button',{type:'submit',className:'btn btn-primary',style:{width:'100%',justifyContent:'center',marginTop:8},disabled:loading},loading?'Ingresando...':'Ingresar')
      )
    )
  );
}

// ── Sidebar ────────────────────────────────────────────────
const NAVS=[
  {id:'dashboard',icon:'◉',label:'Panel de control'},
  {id:'ingresos',icon:'↓',label:'Ingresos'},
  {id:'salidas',icon:'↑',label:'Salidas'},
  {id:'stock',icon:'■',label:'Stock actual'},
  {id:'kardex',icon:'≡',label:'Kardex'},
  null,
  {id:'bodegas',icon:'▪',label:'Bodegas'},
  {id:'productos',icon:'▪',label:'Productos'},
  {id:'categorias',icon:'▪',label:'Categorías'},
  {id:'faenas',icon:'▪',label:'Faenas'},
  {id:'equipos',icon:'▪',label:'Equipos'},
  {id:'proveedores',icon:'▪',label:'Proveedores'},
  null,
  {id:'usuarios',icon:'▪',label:'Usuarios'},
];
function Sidebar({view,setView,alerts,user}){
  return e('div',{className:'sidebar'},
    e('div',{className:'sidebar-logo'},
      e('h1',null,'LPZ Bodegas'),
      e('p',null,'Control de Inventario')
    ),
    e('div',{style:{padding:'6px 0',flex:1}},
      e('div',{className:'nav-group-title'},'Principal'),
      NAVS.map((n,i)=>{
        if(!n)return e('hr',{key:i,style:{border:'none',borderTop:'1px solid #1E293B',margin:'6px 10px'}});
        const isA=view===n.id;
        const isSub=['bodegas','productos','categorias','faenas','equipos','proveedores','usuarios'].includes(n.id);
        if(isSub&&i>0&&NAVS[i-1]&&!['bodegas'].includes(n.id)&&n.id==='bodegas'){
          // group separator already added
        }
        if(n.id==='bodegas'||n.id==='usuarios'){
          return [
            n.id==='bodegas'&&e('div',{key:'grp-mae',className:'nav-group-title'},'Mantenedores'),
            n.id==='usuarios'&&e('div',{key:'grp-sys',className:'nav-group-title'},'Sistema'),
            e('div',{key:n.id,className:'nav-item '+(isA?'active':''),style:{paddingLeft:n.id==='usuarios'?14:22},onClick:()=>setView(n.id)},
              e('span',null,n.icon),' ',n.label
            )
          ];
        }
        return e('div',{key:n.id,className:'nav-item '+(isA?'active':''),
          style:{paddingLeft:isSub?22:14},onClick:()=>setView(n.id)},
          e('span',null,n.icon),' ',n.label,
          n.id==='stock'&&alerts>0&&e('span',{className:'badge'},alerts)
        );
      })
    ),
    user&&e('div',{style:{padding:'12px 14px',borderTop:'1px solid #1E293B',fontSize:11,color:'#64748B'}},
      e('div',null,user.nombre),
      e('div',{style:{color:'#475569',marginTop:2}},user.email)
    )
  );
}

// ── Modal ──────────────────────────────────────────────────
function Modal({title,onClose,children,lg}){
  return e('div',{className:'modal-overlay'},
    e('div',{className:'modal'+(lg?' modal-lg':'')},
      e('div',{className:'modal-header'},
        e('h3',null,title),
        e('button',{className:'modal-close',onClick:onClose},'×')
      ),
      children
    )
  );
}

// ── Dashboard ──────────────────────────────────────────────
function Dashboard({tok,alerts,setView}){
  const [stats,setStats]=useState(null);
  const [movs,setMovs]=useState([]);
  useEffect(()=>{
    api('/stock/consolidado','GET',null,tok).then(rows=>{
      const total=rows.reduce((s,r)=>s+parseFloat(r.valor_total||0),0);
      const alertCount=rows.filter(r=>parseFloat(r.cantidad_total)<=parseFloat(r.stock_minimo)).length;
      setStats({total,alertCount,prods:rows.length});
    }).catch(()=>{});
    api('/movimientos?','GET',null,tok).then(setMovs).catch(()=>{});
  },[]);
  const bodN=r=>r.bodega_nombre||'—';
  return e('div',null,
    stats&&e('div',{className:'kpi-grid'},
      e('div',{className:'kpi kpi-blue'},e('div',{className:'kpi-label'},'Valor total stock'),e('div',{className:'kpi-value'},CLP(stats.total)),e('div',{className:'kpi-sub'},'Costo promedio ponderado')),
      e('div',{className:'kpi kpi-amber',style:{cursor:'pointer'},onClick:()=>setView('stock')},e('div',{className:'kpi-label'},'Alertas stock'),e('div',{className:'kpi-value'},stats.alertCount||'0'),e('div',{className:'kpi-sub'},'Productos bajo mínimo')),
      e('div',{className:'kpi kpi-green'},e('div',{className:'kpi-label'},'Productos activos'),e('div',{className:'kpi-value'},stats.prods||'0'),e('div',{className:'kpi-sub'},'Con stock registrado')),
      e('div',{className:'kpi kpi-blue'},e('div',{className:'kpi-label'},'Movimientos'),e('div',{className:'kpi-value'},movs.length),e('div',{className:'kpi-sub'},'Total registrados')),
    ),
    alerts>0&&e('div',{className:'alert alert-warning',style:{cursor:'pointer',marginBottom:16},onClick:()=>setView('stock')},
      '⚠ '+alerts+' producto(s) con stock bajo el mínimo configurado — click para ver →'
    ),
    e('div',{className:'card'},
      e('div',{className:'card-header'},e('h3',null,'Últimos movimientos')),
      e('div',{className:'card-table'},
        e('table',null,
          e('thead',null,e('tr',null,...['N°','Fecha','Tipo','Bodega','Faena','Equipo','Total'].map((h,i)=>e('th',{key:i,style:{textAlign:i===6?'right':'left'}},h)))),
          e('tbody',null,...movs.slice(0,10).map((m,i)=>e('tr',{key:i},
            e('td',null,m.movimiento_id),
            e('td',null,m.fecha),
            e('td',null,e('span',{className:'badge badge-'+(m.tipo_movimiento==='INGRESO'?'green':m.tipo_movimiento==='SALIDA'?'red':'amber')},m.tipo_movimiento)),
            e('td',null,m.bodega_nombre||'—'),
            e('td',null,m.faena_nombre||'—'),
            e('td',null,m.equipo_nombre||'—'),
            e('td',{className:'text-right mono'},CLP(m.total||0))
          )))
        )
      )
    )
  );
}

// ── IngresoView ────────────────────────────────────────────
function IngresoView({tok,masters}){
  const {bodegas,provs,tdocs,prods}=masters;
  const [movs,setMovs]=useState([]);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({fecha:TODAY,bodega_id:'',prov_id:'',tdoc_id:'',ndoc:'',fdoc:TODAY,obs:'',lineas:[{prod_id:'',qty:1,cu:0}]});
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);

  const load=useCallback(()=>api('/movimientos?tipo=INGRESO','GET',null,tok).then(setMovs).catch(()=>{}),[tok]);
  useEffect(()=>{load();},[load]);

  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const addL=()=>setForm(f=>({...f,lineas:[...f.lineas,{prod_id:'',qty:1,cu:0}]}));
  const remL=(i)=>setForm(f=>({...f,lineas:f.lineas.filter((_,j)=>j!==i)}));
  const updL=(i,k,v)=>setForm(f=>({...f,lineas:f.lineas.map((l,j)=>j===i?{...l,[k]:v}:l)}));
  const pickProd=(i,pid)=>{
    const p=prods.find(x=>String(x.producto_id)===pid);
    setForm(f=>({...f,lineas:f.lineas.map((l,j)=>j===i?{...l,prod_id:pid,cu:p?p.costo_referencia:l.cu}:l)}));
  };
  const save=async()=>{
    setErr('');
    if(!form.bodega_id||!form.fecha){setErr('Bodega y fecha son obligatorios');return;}
    if(!form.prov_id){setErr('Proveedor es obligatorio');return;}
    if(form.lineas.some(l=>!l.prod_id||!l.qty||!l.cu)){setErr('Complete todas las líneas');return;}
    setSaving(true);
    try{
      await api('/movimientos','POST',{
        tipo_movimiento:'INGRESO',fecha:form.fecha,bodega_id:parseInt(form.bodega_id),
        proveedor_id:parseInt(form.prov_id),tipo_doc_id:form.tdoc_id?parseInt(form.tdoc_id):null,
        numero_documento:form.ndoc||null,fecha_documento:form.fdoc||null,oc_referencia:form.obs||null,
        observaciones:form.obs||null,
        lineas:form.lineas.map(l=>({producto_id:parseInt(l.prod_id),cantidad:parseFloat(l.qty),costo_unitario:parseFloat(l.cu)}))
      },tok);
      setModal(false);setErr('');
      setForm({fecha:TODAY,bodega_id:'',prov_id:'',tdoc_id:'',ndoc:'',fdoc:TODAY,obs:'',lineas:[{prod_id:'',qty:1,cu:0}]});
      load();
    }catch(ex){setErr(ex.message);}
    finally{setSaving(false);}
  };
  const grandTotal=form.lineas.reduce((s,l)=>s+parseFloat(l.qty||0)*parseFloat(l.cu||0),0);
  return e('div',null,
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
      e('span',null),
      e('button',{className:'btn btn-primary',onClick:()=>setModal(true)},'+ Nuevo Ingreso')
    ),
    e('div',{className:'card'},
      e('div',{className:'card-table'},
        e('table',null,
          e('thead',null,e('tr',null,...['N°','Fecha','Bodega','Proveedor','Documento','Ítems','Total','Estado'].map((h,i)=>e('th',{key:i,style:{textAlign:[5,6].includes(i)?'right':'left'}},h)))),
          e('tbody',null,movs.length===0?e('tr',null,e('td',{colSpan:8,className:'empty'},'No hay ingresos registrados')):movs.map((m,i)=>
            e('tr',{key:i},
              e('td',null,m.movimiento_id),
              e('td',null,m.fecha),
              e('td',null,m.bodega_nombre||'—'),
              e('td',null,m.proveedor_nombre||'—'),
              e('td',null,m.tipo_doc_nombre?(m.tipo_doc_nombre+' '+m.numero_documento):'—'),
              e('td',{className:'text-right'},m.num_lineas||'—'),
              e('td',{className:'text-right mono'},CLP(m.total_ingreso||0)),
              e('td',null,e('span',{className:'badge badge-'+(m.estado==='ACTIVO'?'green':'red')},m.estado))
            )
          ))
        )
      )
    ),
    modal&&e(Modal,{title:'Registrar Ingreso',onClose:()=>{setModal(false);setErr('');},lg:true},
      e('div',{className:'modal-body'},
        err&&e('div',{className:'alert alert-error'},err),
        e('div',{className:'grid-2'},
          e('div',{className:'form-row'},e('label',{className:'form-label'},'Fecha ',e('span',null,'*')),e('input',{type:'date',value:form.fecha,onChange:ev=>sf('fecha',ev.target.value)})),
          e('div',{className:'form-row'},e('label',{className:'form-label'},'Bodega ',e('span',null,'*')),e('select',{value:form.bodega_id,onChange:ev=>sf('bodega_id',ev.target.value)},e('option',{value:''},'Seleccione...'),bodegas.filter(b=>b.activo).map(b=>e('option',{key:b.bodega_id,value:b.bodega_id},b.nombre)))),
          e('div',{className:'form-row'},e('label',{className:'form-label'},'Proveedor ',e('span',null,'*')),e('select',{value:form.prov_id,onChange:ev=>sf('prov_id',ev.target.value)},e('option',{value:''},'Seleccione...'),provs.filter(p=>p.activo).map(p=>e('option',{key:p.proveedor_id,value:p.proveedor_id},p.nombre)))),
          e('div',{className:'form-row'},e('label',{className:'form-label'},'Tipo documento'),e('select',{value:form.tdoc_id,onChange:ev=>sf('tdoc_id',ev.target.value)},e('option',{value:''},'Sin especificar'),tdocs.map(t=>e('option',{key:t.tipo_doc_id,value:t.tipo_doc_id},t.nombre)))),
          e('div',{className:'form-row'},e('label',{className:'form-label'},'N° documento'),e('input',{value:form.ndoc,onChange:ev=>sf('ndoc',ev.target.value),placeholder:'Ej: 00045312'})),
          e('div',{className:'form-row'},e('label',{className:'form-label'},'Fecha documento'),e('input',{type:'date',value:form.fdoc,onChange:ev=>sf('fdoc',ev.target.value)})),

    if(!pid)return;
    setLoading(true);
    const qs='/kardex?producto_id='+pid+(bid?'&bodega_id='+bid:'');
    api(qs,'GET',null,tok).then(r=>{
      // calcular saldo acumulado
      let bal=0,cpp=0;
      const calc=r.map(row=>{
        const ent=parseFloat(row.entrada||0);
        const sal=parseFloat(row.salida||0);
        if(ent>0){const nq=bal+ent;cpp=nq>0?(bal*cpp+ent*parseFloat(row.costo_unitario))/nq:parseFloat(row.costo_unitario);bal=nq;}
        else if(sal>0){bal=Math.max(0,bal-sal);}
        return {...row,saldo:bal,cpp_calc:cpp};
      });
      setRows(calc);
    }).catch(()=>{}).finally(()=>setLoading(false));
  };

    if(pid){setProd(prods.find(p=>String(p.producto_id)===pid));load();}

      rows.length>0&&e('div',{style:{background:'#DCFCE7',borderRadius:8,padding:'8px 14px',fontSize:13,color:'#166534'}},e('strong',null,'Saldo: '),N(saldoFinal,2),' '+prod.unidad_medida+' @ '+CLP(cppFinal)),

            rows.map((r,i)=>e('tr',{key:i,style:{background:i%2===0?'transparent':'#F8FAFC'}},

      )
    ),
    modal&&e(Modal,{title:(modal[pk]?'Editar ':'Nuevo ')+titulo,onClose:()=>{setModal(null);setErr('');}},
      e('div',{className:'modal-body'},
        err&&e('div',{className:'alert alert-error'},err),
        e(FormComp,{item:modal,onChange:setModal,extraProps})
      ),
      e('div',{className:'modal-footer'},
        e('button',{className:'btn btn-ghost',onClick:()=>{setModal(null);setErr('');}},null,'Cancelar'),
        e('button',{className:'btn btn-primary',onClick:()=>save(modal)},'Guardar')
      )
    )
  );
}

// ── Simple forms ───────────────────────────────────────────
function FI({label,req,k,item,onChange,type,ph}){
  return e('div',{className:'form-row'},
    e('label',{className:'form-label'},label,req&&e('span',null,' *')),
    e('input',{type:type||'text',value:item[k]||'',onChange:ev=>onChange({...item,[k]:ev.target.value}),placeholder:ph||''})
  );
}
function FS({label,req,k,item,onChange,options}){
  return e('div',{className:'form-row'},
    e('label',{className:'form-label'},label,req&&e('span',null,' *')),
    e('select',{value:item[k]||'',onChange:ev=>onChange({...item,[k]:ev.target.value})},
      e('option',{value:''},'Seleccione...'),
      ...options.map(o=>e('option',{key:o.v,value:o.v},o.l))
    )
  );
}
const BodegaForm=({item,onChange})=>e('div',{className:'grid-2'},e(FI,{label:'Código',req:true,k:'codigo',item,onChange}),e(FI,{label:'Nombre',req:true,k:'nombre',item,onChange}),e(FI,{label:'Ubicación',k:'ubicacion',item,onChange}),e(FI,{label:'Responsable',k:'responsable',item,onChange}));
const FaenaForm=({item,onChange})=>e('div',{className:'grid-2'},e(FI,{label:'Código',req:true,k:'codigo',item,onChange}),e(FI,{label:'Nombre',req:true,k:'nombre',item,onChange}),e('div',{className:'form-row',style:{gridColumn:'1/-1'}},e('label',{className:'form-label'},'Descripción'),e('input',{value:item.descripcion||'',onChange:ev=>onChange({...item,descripcion:ev.target.value})})));
const ProvForm=({item,onChange})=>e('div',{className:'grid-2'},e(FI,{label:'RUT',req:true,k:'rut',item,onChange,ph:'76.543.210-5'}),e(FI,{label:'Razón social',req:true,k:'nombre',item,onChange}),e(FI,{label:'Contacto',k:'contacto',item,onChange}),e(FI,{label:'Teléfono',k:'telefono',item,onChange}),e(FI,{label:'Email',k:'email',item,onChange,type:'email'}));
const EquipoForm=({item,onChange,extraProps})=>{
  const faenas=extraProps?.faenas||[];
  return e('div',{className:'grid-2'},
    e(FI,{label:'Código',req:true,k:'codigo',item,onChange}),
    e(FI,{label:'Nombre',req:true,k:'nombre',item,onChange}),
    e(FI,{label:'Tipo',k:'tipo',item,onChange,ph:'Cosechador, Skidder...'}),
    e(FS,{label:'Faena habitual',k:'faena_id',item,onChange,options:faenas.map(f=>({v:f.faena_id,l:f.nombre}))})
  );
};
const ProdForm=({item,onChange,extraProps})=>{
  const {cats=[],subcats=[]}=extraProps||{};
  const scFlt=item.categoria_id?subcats.filter(s=>String(s.categoria_id)===String(item.categoria_id)&&s.activo):subcats.filter(s=>s.activo);
  return e('div',{className:'grid-2'},
    e(FI,{label:'Código',req:true,k:'codigo',item,onChange}),
    e(FI,{label:'Nombre',req:true,k:'nombre',item,onChange}),
    e(FS,{label:'Categoría',req:true,k:'categoria_id',item,onChange:v=>onChange({...v,subcategoria_id:''}),options:cats.filter(c=>c.activo).map(c=>({v:c.categoria_id,l:c.nombre}))}),
    e(FS,{label:'Subcategoría',req:true,k:'subcategoria_id',item,onChange,options:scFlt.map(s=>({v:s.subcategoria_id,l:s.nombre}))}),
    e(FI,{label:'UM',k:'unidad_medida',item,onChange,ph:'UN, KG, LT...'}),
    e(FI,{label:'Stock mínimo',k:'stock_minimo',item,onChange,type:'number'}),
    e(FI,{label:'Costo referencia $',k:'costo_referencia',item,onChange,type:'number'}),
  );
};
const CatForm=({item,onChange})=>e('div',null,e(FI,{label:'Nombre',req:true,k:'nombre',item,onChange}),e('div',{className:'form-row'},e('label',{className:'form-label'},'Descripción'),e('input',{value:item.descripcion||'',onChange:ev=>onChange({...item,descripcion:ev.target.value})})));
const SubcatForm=({item,onChange,extraProps})=>{
  const cats=extraProps?.cats||[];
  return e('div',null,e(FS,{label:'Categoría',req:true,k:'categoria_id',item,onChange,options:cats.filter(c=>c.activo).map(c=>({v:c.categoria_id,l:c.nombre}))}),e(FI,{label:'Nombre',req:true,k:'nombre',item,onChange}));
};

// ── View titles ────────────────────────────────────────────
const VIEW_TITLES={dashboard:'Panel de control',ingresos:'Ingresos de Bodega',salidas:'Salidas de Bodega',stock:'Stock Actual',kardex:'Kardex por Producto',bodegas:'Bodegas',productos:'Productos',categorias:'Categorías',faenas:'Faenas',equipos:'Equipos / Cargos',proveedores:'Proveedores',usuarios:'Usuarios'};

// ── Main App ───────────────────────────────────────────────
function App(){
  const savedTok=localStorage.getItem('lpz_token');
  const savedUsr=JSON.parse(localStorage.getItem('lpz_user')||'null');
  const [token,setToken]=useState(savedTok);
  const [user,setUser]=useState(savedUsr);
  const [view,setView]=useState('dashboard');
  const [masters,setMasters]=useState({bodegas:[],cats:[],subcats:[],prods:[],faenas:[],equipos:[],provs:[],tdocs:[],motivos:[]});
  const [alerts,setAlerts]=useState(0);

  const loadMasters=useCallback(async(tok)=>{
    try{
      const [bodegas,cats,subcats,prods,faenas,equipos,provs,tdocs,motivos,alertas]=await Promise.all([
        api('/bodegas','GET',null,tok),api('/categorias','GET',null,tok),api('/subcategorias','GET',null,tok),
        api('/productos','GET',null,tok),api('/faenas','GET',null,tok),api('/equipos','GET',null,tok),
        api('/proveedores','GET',null,tok),api('/tipos-documento','GET',null,tok),api('/motivos','GET',null,tok),
        api('/stock/alertas','GET',null,tok),
      ]);
      setMasters({bodegas,cats,subcats,prods,faenas,equipos,provs,tdocs,motivos});
      setAlerts(alertas.length);
    }catch(ex){if(ex.message.includes('401')||ex.message.includes('Token')){handleLogout();}}
  },[]);

  useEffect(()=>{if(token)loadMasters(token);},[token]);

  const handleLogin=(tok,usr)=>{setToken(tok);setUser(usr);};
  const handleLogout=()=>{localStorage.removeItem('lpz_token');localStorage.removeItem('lpz_user');setToken(null);setUser(null);};

  if(!token) return e(LoginPage,{onLogin:handleLogin});

  const ma={...masters,bodegas:masters.bodegas,provs:masters.provs,tdocs:masters.tdocs,prods:masters.prods,faenas:masters.faenas,equipos:masters.equipos,motivos:masters.motivos,cats:masters.cats,subcats:masters.subcats};

  return e('div',{id:'root'},
    e(Sidebar,{view,setView,alerts,user}),
    e('div',{className:'main'},
      e('div',{className:'topbar'},
        e('h2',null,VIEW_TITLES[view]||view),
        e('div',{className:'topbar-user'},
          e('span',null,user?.nombre),
          e('button',{className:'btn btn-ghost btn-sm',onClick:handleLogout},'Salir')
        )
      ),
      e('div',{className:'content'},
        view==='dashboard'&&e(Dashboard,{tok:token,alerts,setView}),
        view==='ingresos'&&e(IngresoView,{tok:token,masters:ma}),
        view==='salidas'&&e(SalidaView,{tok:token,masters:ma}),
        view==='stock'&&e(StockView,{tok:token,masters:ma}),
        view==='kardex'&&e(KardexView,{tok:token,masters:ma}),
        view==='bodegas'&&e(MasterView,{tok:token,titulo:'Bodega',endpoint:'bodegas',pk:'bodega_id',FormComp:BodegaForm,emptyItem:{codigo:'',nombre:'',ubicacion:'',responsable:'',activo:true},cols:[{k:'codigo',label:'Código',mono:true},{k:'nombre',label:'Nombre'},{k:'ubicacion',label:'Ubicación'},{k:'responsable',label:'Responsable'}]}),
        view==='productos'&&e(MasterView,{tok:token,titulo:'Producto',endpoint:'productos',pk:'producto_id',FormComp:ProdForm,emptyItem:{codigo:'',nombre:'',subcategoria_id:'',categoria_id:'',unidad_medida:'UN',stock_minimo:0,costo_referencia:0,activo:true},extraProps:{cats:masters.cats,subcats:masters.subcats},cols:[{k:'codigo',label:'Código',mono:true},{k:'nombre',label:'Nombre'},{k:'subcategoria_nombre',label:'Subcategoría'},{k:'unidad_medida',label:'UM'},{k:'stock_minimo',label:'Stk mín.'},{label:'Costo ref.',render:r=>CLP(r.costo_referencia)}]}),
        view==='categorias'&&e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
          e('div',null,e('h3',{style:{marginBottom:12,fontWeight:600}},'Categorías'),e(MasterView,{tok:token,titulo:'Categoría',endpoint:'categorias',pk:'categoria_id',FormComp:CatForm,emptyItem:{nombre:'',descripcion:'',activo:true},cols:[{k:'nombre',label:'Nombre'}]})),
          e('div',null,e('h3',{style:{marginBottom:12,fontWeight:600}},'Subcategorías'),e(MasterView,{tok:token,titulo:'Subcategoría',endpoint:'subcategorias',pk:'subcategoria_id',FormComp:SubcatForm,emptyItem:{nombre:'',categoria_id:'',activo:true},extraProps:{cats:masters.cats},cols:[{k:'nombre',label:'Nombre'},{label:'Categoría',render:(r,ep)=>{const cats=ep?.cats||[];return cats.find(c=>c.categoria_id===r.categoria_id)?.nombre||'—';}}]}))
        ),
        view==='faenas'&&e(MasterView,{tok:token,titulo:'Faena',endpoint:'faenas',pk:'faena_id',FormComp:FaenaForm,emptyItem:{codigo:'',nombre:'',descripcion:'',activo:true},cols:[{k:'codigo',label:'Código',mono:true},{k:'nombre',label:'Nombre'},{k:'descripcion',label:'Descripción'}]}),
        view==='equipos'&&e(MasterView,{tok:token,titulo:'Equipo',endpoint:'equipos',pk:'equipo_id',FormComp:EquipoForm,emptyItem:{codigo:'',nombre:'',tipo:'',faena_id:'',activo:true},extraProps:{faenas:masters.faenas},cols:[{k:'codigo',label:'Código',mono:true},{k:'nombre',label:'Nombre'},{k:'tipo',label:'Tipo'},{label:'Faena',render:(r,ep)=>{const fs=ep?.faenas||[];return fs.find(f=>f.faena_id===r.faena_id)?.nombre||'—';}}]}),
        view==='proveedores'&&e(MasterView,{tok:token,titulo:'Proveedor',endpoint:'proveedores',pk:'proveedor_id',FormComp:ProvForm,emptyItem:{rut:'',nombre:'',contacto:'',telefono:'',email:'',activo:true},cols:[{k:'rut',label:'RUT',mono:true},{k:'nombre',label:'Nombre'},{k:'contacto',label:'Contacto'},{k:'telefono',label:'Teléfono'}]}),
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
