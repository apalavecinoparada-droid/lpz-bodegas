<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
'use strict';
const {useState,useEffect,useMemo,useCallback,useRef,Component}=React;
const h=React.createElement;
const CLP=n=>new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(n||0);
function fmtD(s){if(!s)return '—';var d=(s+'').substring(0,10);var p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
const N=(n,d=2)=>new Intl.NumberFormat('es-CL',{maximumFractionDigits:d}).format(n||0);
const TODAY=new Date().toISOString().split('T')[0];
const str=v=>v===null||v===undefined?'':String(v);

// ── API ──
function api(path,method,body,token){
  method=method||'GET';
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token)opts.headers['Authorization']='Bearer '+token;
  if(body)opts.body=JSON.stringify(body);
  return fetch('/api'+path,opts).then(function(r){
    if(r.status===401){localStorage.removeItem('lpz_token');localStorage.removeItem('lpz_user');window.location.reload();throw new Error('Sesión expirada');}
    return r.text().then(function(txt){
      var d;
      try{d=JSON.parse(txt);}catch(_){throw new Error('Servidor respondio: '+r.status+' '+txt.substring(0,120));}
      if(!r.ok)throw new Error(d.error||'Error '+r.status);
      return d;
    });
  });
}

// ── ERROR BOUNDARY ──
class EB extends Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e.message||'Error inesperado'};}
  componentDidCatch(e,i){console.error('EB:',e,i);}
  render(){
    if(this.state.err)return h('div',{className:'err-box'},
      h('div',{style:{fontSize:22,marginBottom:8}},'⚠'),
      h('div',{style:{fontWeight:700,marginBottom:6}},'Error en esta seccion'),
      h('div',{style:{fontSize:12,color:'#64748B',marginBottom:12}},this.state.err),
      h('button',{className:'btn btn-g',onClick:()=>this.setState({err:null})},'Reintentar')
    );
    return this.props.children;
  }
}

// ── COMPONENTES BASE ──
const Bg=p=>h('span',{className:'bg bg-'+(p.c||'g')},p.children);
const Btn=p=>h('button',{type:p.type||'button',onClick:p.onClick,disabled:p.disabled,className:'btn btn-'+(p.v||'p')+(p.sm?' btn-sm':'')+(p.xs?' btn-xs':''),style:{opacity:p.disabled?.5:1}},p.children);
const FR=p=>h('div',{className:'fr'},h('label',{className:'fl'},p.label,p.req&&h('span',{className:'req'},' *')),p.children);
const Inp=p=>h('input',{value:str(p.value),onChange:e=>p.onChange(e.target.value),type:p.type||'text',placeholder:p.ph||'',min:p.min,step:p.step,style:p.style});
const Sel=p=>h('select',{value:str(p.value),onChange:e=>p.onChange(e.target.value),style:p.style},p.children);
const Chk=p=>h('input',{type:'checkbox',checked:!!p.checked,onChange:e=>p.onChange(e.target.checked),style:{cursor:'pointer'}});
const Modal=p=>h('div',{className:'ov'},h('div',{className:'modal'+(p.lg?' modal-lg':'')+(p.xl?' modal-xl':'')},h('div',{className:'mh'},h('h3',null,p.title),h('button',{className:'mc',onClick:p.onClose},'×')),p.children));
function TBL(p){
  const rows=p.rows||[];
  if(!rows.length)return h('div',{className:'empty'},p.empty||'Sin datos');
  return h('div',{style:{overflowX:'auto',WebkitOverflowScrolling:'touch'}},h('div',{className:'card-t'},h('table',null,
    h('thead',null,h('tr',null,...p.cols.map((c,i)=>h('th',{key:i,style:{textAlign:c.r?'right':c.c?'center':'left',width:c.w}},c.lbl)))),
    h('tbody',null,...rows.map((r,i)=>h('tr',{key:r[p.rowKey]||i},
      ...p.cols.map((c,j)=>h('td',{key:j,style:{textAlign:c.r?'right':c.c?'center':'left',fontFamily:c.mono?'Courier New':undefined,fontSize:c.mono?12:undefined}},
        c.render?c.render(r,i):str(r[c.k]||'—')
      ))
    )))
  )));
}

// ── EXCEL EXPORT ──
function exportXLSX(rows,cols,filename){
  try{
    const header=cols.map(c=>c.header);
    const data=rows.map(function(r){return cols.map(function(c){return c.value(r)||'';});});
    const ws=XLSX.utils.aoa_to_sheet([header,...data]);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Datos');
    XLSX.writeFile(wb,(filename||'reporte')+'.xlsx');
  }catch(e){alert('Error al exportar: '+e.message);}
}

// ── LOGIN ──
function LoginPage(p){
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const[slide,setSlide]=useState(0);
  const totalSlides=8;
  useEffect(function(){var t=setInterval(function(){setSlide(function(s){return(s+1)%totalSlides;});},7000);return function(){clearInterval(t);};},[]);
  function submit(e){e.preventDefault();setErr('');setLoading(true);
    api('/auth/login','POST',{email,password:pass}).then(function(r){localStorage.setItem('lpz_token',r.token);localStorage.setItem('lpz_user',JSON.stringify(r.usuario));p.onLogin(r.token,r.usuario);}).catch(function(ex){setErr(ex.message);}).finally(function(){setLoading(false);});
  }
  var origins=['center center','left center','right top','center bottom','left top','right center','center top','left bottom'];
  return h('div',{style:{position:'fixed',top:0,left:0,width:'100vw',height:'100vh',overflow:'hidden'}},
    Array.from({length:totalSlides},function(_,i){
      return h('img',{key:i,src:'/bg-login-'+(i+1)+'.jpg',style:{position:'absolute',top:0,left:0,width:'100%',height:'100%',objectFit:'cover',opacity:slide===i?1:0,transition:'opacity 1.5s ease-in-out',animation:slide===i?'loginZoom 20s ease-in-out infinite alternate':'none',transformOrigin:origins[i]||'center center'}});
    }),
    h('div',{style:{position:'absolute',top:0,left:0,width:'100%',height:'100%',background:'linear-gradient(135deg, rgba(30,58,45,0.85) 0%, rgba(30,58,45,0.5) 40%, rgba(0,0,0,0.3) 100%)'}}),
    h('div',{style:{position:'relative',zIndex:2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%'}},
      h('img',{src:'https://serviciosforestalespoo.cl/wp-content/uploads/2025/09/Logo.svg',alt:'Empresas Poo',style:{width:260,marginBottom:32},onError:function(e){e.target.style.display='none';}}),
      h('div',{style:{background:'rgba(255,255,255,0.95)',borderRadius:14,padding:'32px 28px',width:340,boxShadow:'0 20px 60px rgba(0,0,0,.4)',backdropFilter:'blur(10px)'}},
        h('h1',{style:{fontSize:17,fontWeight:700,marginBottom:16,color:'#1E3A2D',textAlign:'center'}},'Empresas Poo'),
        err&&h('div',{className:'al al-e'},err),
        h('form',{onSubmit:submit},
          h(FR,{label:'Correo o usuario'},h(Inp,{value:email,onChange:setEmail,type:'text',ph:'correo@empresa.cl o nombre de usuario'})),
          h(FR,{label:'Contraseña'},h(Inp,{value:pass,onChange:setPass,type:'password',ph:'Ingrese su contraseña'})),
          h('button',{type:'submit',style:{width:'100%',marginTop:10,background:'#1E3A2D',color:'#D4C5A9',border:'none',padding:'11px 0',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'},disabled:loading},loading?'Ingresando...':'Ingresar')

function CalcCombustible(p){
  var TASAS={diesel:1.5,gasolina:6.0};
  const[tipoComb,setTipoComb]=useState('diesel');
  const[modoCalc,setModoCalc]=useState('utm');

  const[totalGuia,setTotalGuia]=useState('');
  const[incluyeIVA,setIncluyeIVA]=useState(true);

  function fetchUTM(){
    setUtmLoading(true);
    fetch('https://mindicador.cl/api/utm')
      .then(function(r){return r.json();})
      .then(function(d){var val=d&&d.serie&&d.serie[0]&&d.serie[0].valor;if(val)setUtm(String(Math.round(val)));else alert('No se pudo obtener la UTM.');})

  var litrosNum=parseFloat(litros)||0;
  var totalNum=parseFloat(totalGuia)||0;

// ══ GENERADOR COMPROBANTE DE FERIADO (PDF) ══
function generarComprobantePDF(reg, persona, empresas){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({unit:'mm',format:'letter'});
  var W=216; var H=279;
  var ML=15; var MR=15; // márgenes laterales reducidos
  var pw=W-ML-MR;
  var fmtFecha=function(d){if(!d)return '';var s=(d+'').slice(0,10);return s.slice(8,10)+'/'+s.slice(5,7)+'/'+s.slice(0,4);};

  // Buscar empresa del trabajador
  var empresa=null;
  if(persona.empresa_id&&empresas){empresa=empresas.find(function(e){return e.empresa_id===persona.empresa_id||String(e.empresa_id)===String(persona.empresa_id);});}

  // Renderiza una copia del comprobante en la posición vertical indicada
  // y0 = margen superior, hMax = altura disponible
  function renderCopia(y0,etiqueta){
    var y=y0;
    // Etiqueta de copia (esquina superior derecha)
    doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.setTextColor(120);
    doc.text(etiqueta,W-MR,y,{align:'right'});
    doc.setTextColor(0);

    // ── HEADER EMPRESA ──
    doc.setFont('helvetica','normal');doc.setFontSize(9);
    var valX=ML+24;
    if(empresa){
      doc.text('Razón Social:',ML,y);doc.text(empresa.razon_social||'',valX,y);y+=4;
      doc.text('R.U.T.:',ML,y);doc.text(empresa.rut||'',valX,y);y+=4;
      doc.text('Dirección:',ML,y);doc.text(empresa.direccion||'',valX,y);y+=4;
      doc.text('Teléfono:',ML,y);doc.text(empresa.telefono||'',valX,y);
    }else{
      doc.text('Razón Social:',ML,y);doc.text('LEONIDAS POO ZENTENO Y CÍA. LTDA.',valX,y);y+=4;
      doc.text('R.U.T.:',ML,y);doc.text('76.033.889-6',valX,y);y+=4;
      doc.text('Dirección:',ML,y);doc.text('Los Ángeles',valX,y);y+=4;
      doc.text('Teléfono:',ML,y);doc.text('',valX,y);
    }
    // Fecha emisión (derecha, debajo de la etiqueta)
    var hoy=new Date();var fechaEmision=('0'+hoy.getDate()).slice(-2)+'/'+('0'+(hoy.getMonth()+1)).slice(-2)+'/'+hoy.getFullYear();
    doc.setFontSize(9);doc.text('Fecha: '+fechaEmision,W-MR,y0+5,{align:'right'});
    y+=8;

    // ── TÍTULO ──
    doc.setFont('helvetica','bold');doc.setFontSize(13);
    doc.text('COMPROBANTE DE FERIADO',W/2,y,{align:'center'});
    y+=8;

    // ── PERÍODO CONTRACTUAL ──
    doc.setFont('helvetica','bold');doc.setFontSize(9);
    doc.text('Correspondiente al Período Contractual:',ML,y);
    doc.setFont('helvetica','normal');
    doc.text('Del  '+fmtFecha(reg.periodo_desde),ML+72,y);
    doc.text('Al  '+fmtFecha(reg.periodo_hasta),ML+108,y);
    y+=7;

    // ── TEXTO LEGAL ──
    doc.setFont('helvetica','normal');doc.setFontSize(9);
    var textoLegal='En cumplimiento a las disposiciones legales vigentes se deja constancia que a contar de las fechas que se indican, el trabajador';
    var lines=doc.splitTextToSize(textoLegal,pw);
    doc.text(lines,ML,y);y+=lines.length*4+2;

    // ── DATOS TRABAJADOR ──
    doc.text('Don:',ML,y);doc.setFont('helvetica','bold');doc.text((persona.nombre_completo||'').toUpperCase(),ML+10,y);doc.setFont('helvetica','normal');y+=5;
    doc.text('RUT:',ML,y);doc.text(persona.rut||'',ML+10,y);y+=6;

    // ── USO TOTAL/PARCIAL ──
    var diasCorr=parseInt(reg.dias_correspondientes)||15;
    var diasProg=parseInt(reg.dias_progresivos)||0;
    var totalDisp=diasCorr+diasProg;
    var diasHab=parseInt(reg.dias_habiles)||0;
    var tipoUso=diasHab>=totalDisp?'TOTAL':'PARCIAL';
    var usoTexto='Hará uso   ';
    doc.text(usoTexto,ML,y);
    var usoX=ML+doc.getTextWidth(usoTexto);
    doc.setFont('helvetica','bold');doc.text(tipoUso,usoX,y);
    var afterTipo=usoX+doc.getTextWidth(tipoUso)+2;
    doc.setFont('helvetica','normal');
    var restTexto='de su feriado anual con remuneración íntegra de acuerdo al siguiente detalle:';
    var restLines=doc.splitTextToSize(restTexto,pw-(afterTipo-ML));
    doc.text(restLines[0],afterTipo,y);
    if(restLines.length>1){y+=4;doc.text(restLines.slice(1).join(' '),ML,y);}
    y+=6;

    // ── FECHAS VACACIONES ──
    doc.setFont('helvetica','bold');
    doc.text('DESCANSO EFECTIVO ENTRE LAS FECHAS QUE SE INDICAN',ML,y);y+=5;
    doc.text('DESDE EL  '+fmtFecha(reg.vacaciones_desde),ML,y);
    doc.text('AL  '+fmtFecha(reg.vacaciones_hasta),ML+55,y);
    y+=8;

    // ── DETALLE DEL FERIADO + FIRMAS (lado a lado) ──
    var colL=ML;var colR=ML+62;
    var detY=y;
    doc.setFont('helvetica','bold');doc.setFontSize(9);
    doc.text('DETALLE DEL FERIADO',colL,detY);doc.text('DIAS',colR,detY,{align:'right'});detY+=5;
    doc.setFont('helvetica','normal');
    doc.text('DIAS HABILES',colL,detY);doc.text(String(diasHab),colR,detY,{align:'right'});detY+=4;
    doc.text('VAC. PROGRESIVAS',colL,detY);doc.text(String(diasProg),colR,detY,{align:'right'});detY+=4;
    doc.text('DOMINGOS E INHABILES',colL,detY);doc.text(String(parseInt(reg.dias_no_habiles)||0),colR,detY,{align:'right'});detY+=4;
    doc.text('SALDO PENDIENTE',colL,detY);doc.text(String(parseInt(reg.saldo_pendiente)||0),colR,detY,{align:'right'});detY+=4;

    // FIRMAS lado derecho
    var firmaX=ML+105;var firmaW=55;
    if(empresa&&empresa.firma_representante){
      try{
        var firmaImgW=32,firmaImgH=14;
        doc.addImage(empresa.firma_representante,'PNG',firmaX+(firmaW-firmaImgW)/2,y-7,firmaImgW,firmaImgH);
      }catch(e){}
    }
    doc.line(firmaX,y+7,firmaX+firmaW,y+7);
    doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.text('Firma Empleador o Rep. Legal',firmaX+(firmaW/2),y+10,{align:'center'});
    if(empresa&&empresa.timbre_empresa){
      try{
        var timbreW=30,timbreH=12;
        doc.addImage(empresa.timbre_empresa,'PNG',firmaX+(firmaW-timbreW)/2,y+12,timbreW,timbreH);
      }catch(e){}
    }
    doc.line(firmaX,y+30,firmaX+firmaW,y+30);
    doc.text('Firma del trabajador',firmaX+(firmaW/2),y+33,{align:'center'});

    // ── NOTA AL PIE ──
    var yNota=Math.max(detY,y+36)+3;
    doc.setDrawColor(150);doc.setLineWidth(0.2);doc.line(ML,yNota,W-MR,yNota);yNota+=3;
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);
    var nota='NOTA: Para el cálculo del feriado, se consideran los días hábiles de trabajo, con cancelación de los días domingos o festivos que incidan en dicho período de descanso. En las Empresas que han distribuido la jornada de trabajo en menos de 6 días hábiles, uno de ellos será considerado inhábil para los efectos de feriado. Uno de estos ejemplares queda en poder del trabajador y otro en poder del empleador.';
    var notaLines=doc.splitTextToSize(nota,pw);
    doc.text(notaLines,ML,yNota);
  }

  // PRIMERA COPIA (mitad superior)
  renderCopia(10,'COPIA EMPLEADOR');
  // LÍNEA SEPARADORA al medio (punteada)
  doc.setDrawColor(120);doc.setLineDashPattern([2,1.5],0);doc.setLineWidth(0.3);
  doc.line(ML,H/2,W-MR,H/2);
  doc.setLineDashPattern([],0);
  // Texto "✂ Cortar por aquí" en el medio
  doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(120);
  doc.text('✂  cortar por aquí  ✂',W/2,H/2-1,{align:'center'});
  doc.setTextColor(0);
  // SEGUNDA COPIA (mitad inferior)
  renderCopia(H/2+5,'COPIA TRABAJADOR');

  // ── DESCARGAR ──
  var nombreArchivo='Comprobante_Feriado_'+(persona.rut||'').replace(/\./g,'')+'_'+fmtFecha(reg.vacaciones_desde).replace(/\//g,'-')+'.pdf';
  doc.save(nombreArchivo);
}

// ══ CONTROL DE VACACIONES ══
function VacacionesView(p){
  var allPersonal=(p.m.personal||[]).filter(function(x){return x.activo;});
  var empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  var[selEmpresa,setSelEmpresa]=useState('');
  var personal=selEmpresa?allPersonal.filter(function(x){return String(x.empresa_id)===String(selEmpresa);}):[];
  var[selPersona,setSelPersona]=useState(null);
  var[historial,setHistorial]=useState([]);
  var[editReg,setEditReg]=useState(null);
  var[msg,setMsg]=useState('');
  var[busqueda,setBusqueda]=useState('');
  var emptyForm={periodo_desde:'',periodo_hasta:'',dias_correspondientes:15,dias_progresivos:0,vacaciones_desde:'',vacaciones_hasta:'',dias_habiles:0,dias_no_habiles:0,saldo_pendiente:0,observaciones:''};
  var[form,setForm]=useState(emptyForm);
  var[calcLoading,setCalcLoading]=useState(false);

  function cambiarEmpresa(eid){setSelEmpresa(eid);setSelPersona(null);setHistorial([]);setEditReg(null);setForm(emptyForm);setMsg('');}

  function loadHistorial(pid,per){
    api('/vacaciones?persona_id='+pid,'GET',null,p.tok).then(function(r){
      var hist=Array.isArray(r)?r:[];
      setHistorial(hist);
      var prog=per?calcProgresivos(per):0;
      var disp=15+prog;

      if(hist.length>0&&per){
        // Agrupar por período y calcular saldo real de cada uno
        var periodos={};
        hist.forEach(function(h){
          var pk=(h.periodo_desde||'').slice(0,10);
          if(!periodos[pk])periodos[pk]={desde:pk,hasta:(h.periodo_hasta||'').slice(0,10),usado:0};
          periodos[pk].usado+=parseInt(h.dias_habiles)||0;
        });

        // Buscar período con saldo pendiente (más reciente primero)
        var keys=Object.keys(periodos).sort();
        var periodoConSaldo=null;
        for(var i=keys.length-1;i>=0;i--){
          var p2=periodos[keys[i]];
          if(disp-p2.usado>0){periodoConSaldo=p2;break;}
        }

        if(periodoConSaldo){
          // Hay un período con días pendientes → cargarlo
          var saldo=disp-periodoConSaldo.usado;
          setForm({periodo_desde:periodoConSaldo.desde,periodo_hasta:periodoConSaldo.hasta,dias_correspondientes:15,dias_progresivos:prog,vacaciones_desde:'',vacaciones_hasta:'',dias_habiles:0,dias_no_habiles:0,saldo_pendiente:saldo,observaciones:''});
        }else{
          // Todos los períodos están completos → calcular el SIGUIENTE período
          var ultimoKey=keys[keys.length-1];
          var ultimoPer=periodos[ultimoKey];
          // Siguiente período = último hasta + 1 día → hasta + 1 año
          var partsD=ultimoPer.hasta.split('-');
          var sigDesde=new Date(parseInt(partsD[0]),parseInt(partsD[1])-1,parseInt(partsD[2])+1);
          var sigHasta=new Date(parseInt(partsD[0])+1,parseInt(partsD[1])-1,parseInt(partsD[2]));
          var fmtISO=function(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);};
          setForm({periodo_desde:fmtISO(sigDesde),periodo_hasta:fmtISO(sigHasta),dias_correspondientes:15,dias_progresivos:prog,vacaciones_desde:'',vacaciones_hasta:'',dias_habiles:0,dias_no_habiles:0,saldo_pendiente:disp,observaciones:''});
        }
      }else if(per&&per.fecha_ingreso){
        // Sin historial: calcular primer período desde fecha de ingreso
        var fi=(per.fecha_ingreso+'').slice(0,10).split('-');
        var anioActual=new Date().getFullYear();
        var mesIngreso=parseInt(fi[1]);var diaIngreso=parseInt(fi[2]);var anioIngreso=parseInt(fi[0]);
        // Buscar el período aniversario vigente
        var pAnio=anioActual-1;
        var pDesde=new Date(pAnio,mesIngreso-1,diaIngreso);
        if(pDesde>new Date())pDesde=new Date(pAnio-1,mesIngreso-1,diaIngreso);
        var pHasta=new Date(pDesde.getFullYear()+1,pDesde.getMonth(),pDesde.getDate()-1);
        var fmtISO2=function(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);};
        setForm({periodo_desde:fmtISO2(pDesde),periodo_hasta:fmtISO2(pHasta),dias_correspondientes:15,dias_progresivos:prog,vacaciones_desde:'',vacaciones_hasta:'',dias_habiles:0,dias_no_habiles:0,saldo_pendiente:disp,observaciones:''});
      }else{
        setForm(Object.assign({},emptyForm,{dias_progresivos:prog}));
      }
    }).catch(function(){setHistorial([]);});
  }
  function selectPersona(per){
    setSelPersona(per);setEditReg(null);setMsg('');
    setForm(emptyForm); // reset temporal
    loadHistorial(per.persona_id,per);
  }

  // Calcular días progresivos según ley chilena
  // Art. 68 Código del Trabajo:
  // - Se requiere 10 años de trabajo total (incluye empleadores anteriores)
  // - Por cada 3 años NUEVOS con el empleador actual, después de completar 10 años totales, se suma 1 día
  // - Si tiene_antiguedad_previa=true (default), se reconocen 10 años previos → los años con empleador actual cuentan desde el día 1
  // - Si tiene_antiguedad_previa=false, solo cuentan los años con el empleador actual (necesita 10 años en la empresa primero)
  function parseFechaLocal(f){if(!f)return null;var s=(f+'').slice(0,10).split('-');if(s.length<3)return null;return new Date(parseInt(s[0]),parseInt(s[1])-1,parseInt(s[2]));}
  function aniosDesde(fecha){if(!fecha)return 0;var d=parseFechaLocal(fecha);if(!d||isNaN(d.getTime()))return 0;var hoy=new Date();var a=Math.floor((hoy-d)/(365.25*24*60*60*1000));return a<0?0:a;}
  function calcProgresivos(per){
    if(!per||!per.fecha_ingreso)return 0;
    var aniosEmpleador=aniosDesde(per.fecha_ingreso);
    // Si tiene antigüedad previa reconocida (default true), se suman 10 años
    var aniosPrevios=(per.tiene_antiguedad_previa!==false)?10:0;
    var aniosTotal=aniosPrevios+aniosEmpleador;
    if(aniosTotal<10)return 0;
    // Años para llegar a 10 totales (cuántos años del empleador actual se "gastan" en llegar a 10)
    var aniosParaLlegar10=Math.max(0,10-aniosPrevios);
    // Años contables = los que sobran después de llegar a 10
    var aniosContables=aniosEmpleador-aniosParaLlegar10;
    if(aniosContables<3)return 0;
    return Math.floor(aniosContables/3);
  }

  // Recalcular saldo cuando cambian correspondientes o progresivos
  function recalcSaldo(corr,prog){
    setForm(function(f){
      var totalDisp=(parseInt(corr)||15)+(parseInt(prog)||0);
      var usados=historial.filter(function(h){return h.periodo_desde&&f.periodo_desde&&(h.periodo_desde+'').slice(0,10)===f.periodo_desde&&(!editReg||h.registro_id!==editReg.registro_id);}).reduce(function(s,h){return s+(parseInt(h.dias_habiles)||0);},0);
      return Object.assign({},f,{dias_correspondientes:corr,dias_progresivos:prog,saldo_pendiente:totalDisp-usados-(parseInt(f.dias_habiles)||0)});
    });
  }

  // Ajustar días no hábiles manualmente (feriados no detectados)
  function adjustNoHabiles(nuevoNoHab){
    setForm(function(f){
      var totalCorridos=(parseInt(f.dias_habiles)||0)+(parseInt(f.dias_no_habiles)||0);
      if(totalCorridos===0)return Object.assign({},f,{dias_no_habiles:nuevoNoHab});
      var nuevoHab=totalCorridos-nuevoNoHab;
      if(nuevoHab<0)nuevoHab=0;
      var totalDisp=(parseInt(f.dias_correspondientes)||15)+(parseInt(f.dias_progresivos)||0);
      var usados=historial.filter(function(h){return h.periodo_desde&&f.periodo_desde&&(h.periodo_desde+'').slice(0,10)===f.periodo_desde&&(!editReg||h.registro_id!==editReg.registro_id);}).reduce(function(s,h){return s+(parseInt(h.dias_habiles)||0);},0);
      return Object.assign({},f,{dias_no_habiles:nuevoNoHab,dias_habiles:nuevoHab,saldo_pendiente:totalDisp-usados-nuevoHab});
    });
  }

  // Auto-calcular al cambiar fechas de vacaciones
  function calcDias(vDesde,vHasta){
    if(!vDesde||!vHasta)return;
    setCalcLoading(true);
    api('/vacaciones/calcular-dias?desde='+vDesde+'&hasta='+vHasta,'GET',null,p.tok).then(function(r){
      setForm(function(f){
        var totalDisp=(parseInt(f.dias_correspondientes)||15)+(parseInt(f.dias_progresivos)||0);
        var usadosPeriodo=historial.filter(function(h){
          return h.periodo_desde&&f.periodo_desde&&(h.periodo_desde+'').slice(0,10)===f.periodo_desde&&(!editReg||h.registro_id!==editReg.registro_id);
        }).reduce(function(s,h){return s+(parseInt(h.dias_habiles)||0);},0);
        var hab=r.dias_habiles||0;
        var saldo=totalDisp-usadosPeriodo-hab;
        return Object.assign({},f,{dias_habiles:hab,dias_no_habiles:r.dias_no_habiles||0,saldo_pendiente:saldo});
      });
      setCalcLoading(false);
    }).catch(function(){setCalcLoading(false);});
  }

  // Auto-calcular fecha término cuando cambia fecha inicio
  function calcFechaTermino(vDesde,diasHab){
    if(!vDesde||!diasHab||diasHab<=0)return;
    api('/vacaciones/fecha-termino?desde='+vDesde+'&dias_habiles='+diasHab,'GET',null,p.tok).then(function(r){
      if(r.fecha_termino){
        setForm(function(f){return Object.assign({},f,{vacaciones_hasta:r.fecha_termino});});
        calcDias(vDesde,r.fecha_termino);
      }
    }).catch(function(){});
  }

  function upd(k,v){setForm(function(f){var nf=Object.assign({},f,{[k]:v});return nf;});}

  function guardar(){
    if(!selPersona){setMsg('Error: Seleccione un trabajador');return;}
    if(!form.periodo_desde||!form.periodo_hasta){setMsg('Error: Período contractual es obligatorio');return;}
    if(!form.vacaciones_desde||!form.vacaciones_hasta){setMsg('Error: Fechas de vacaciones son obligatorias');return;}
    if(form.vacaciones_desde>form.vacaciones_hasta){setMsg('Error: Fecha inicio debe ser anterior a fecha término');return;}
    if(form.saldo_pendiente<0){setMsg('Error: No hay suficientes días disponibles para este período');return;}
    var data=Object.assign({},form,{persona_id:selPersona.persona_id});
    var method=editReg?'PUT':'POST';var url='/vacaciones'+(editReg?'/'+editReg.registro_id:'');
    api(url,method,data,p.tok).then(function(){loadHistorial(selPersona.persona_id,selPersona);setEditReg(null);setMsg(editReg?'Registro actualizado':'Vacaciones registradas');}).catch(function(e){setMsg('Error: '+e.message);});
  }

  function eliminar(id){
    if(!confirm('¿Eliminar este registro de vacaciones?'))return;
    api('/vacaciones/'+id,'DELETE',null,p.tok).then(function(){loadHistorial(selPersona.persona_id,selPersona);setMsg('Registro eliminado');}).catch(function(e){alert(e.message);});
  }

  function openEdit(r){
    setEditReg(r);
    setForm({periodo_desde:(r.periodo_desde||'').slice(0,10),periodo_hasta:(r.periodo_hasta||'').slice(0,10),dias_correspondientes:r.dias_correspondientes,dias_progresivos:r.dias_progresivos,vacaciones_desde:(r.vacaciones_desde||'').slice(0,10),vacaciones_hasta:(r.vacaciones_hasta||'').slice(0,10),dias_habiles:r.dias_habiles,dias_no_habiles:r.dias_no_habiles,saldo_pendiente:r.saldo_pendiente,observaciones:r.observaciones||''});
  }

  var filtrados=personal.filter(function(x){
    if(!busqueda)return true;
    var q=busqueda.toLowerCase();
    return(x.nombre_completo||'').toLowerCase().indexOf(q)>=0||(x.rut||'').toLowerCase().indexOf(q)>=0;
  });

  var progresivos=selPersona?calcProgresivos(selPersona):0;
  var totalDisponible=(parseInt(form.dias_correspondientes)||15)+(parseInt(form.dias_progresivos)||0);
  var usadosPeriodoActual=historial.filter(function(h){return h.periodo_desde&&form.periodo_desde&&(h.periodo_desde+'').slice(0,10)===form.periodo_desde&&(!editReg||h.registro_id!==editReg.registro_id);}).reduce(function(s,h){return s+(parseInt(h.dias_habiles)||0);},0);

  var inpS={width:'100%',padding:'6px 8px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:12,boxSizing:'border-box'};
  var lblS={fontSize:10,fontWeight:600,display:'block',marginBottom:2,color:'#475569'};

  return h('div',{style:{display:'flex',gap:10,height:'calc(100vh - 120px)',overflow:'hidden'}},
    // ── PANEL IZQUIERDO: Empresa + Trabajadores ──
    h('div',{style:{width:260,minWidth:220,flexShrink:0,display:'flex',flexDirection:'column',background:'#fff',borderRadius:8,border:'1px solid #E2E8F0',overflow:'hidden'}},
      h('div',{style:{padding:'10px 10px 6px',borderBottom:'1px solid #E2E8F0'}},
        h('div',{style:{fontSize:10,fontWeight:600,color:'#475569',marginBottom:3}},'Empresa'),
        h('select',{value:selEmpresa,onChange:function(e){cambiarEmpresa(e.target.value);},style:Object.assign({},inpS,{fontSize:11,fontWeight:600,marginBottom:6})},
          h('option',{value:''},'— Seleccione empresa —'),
          empresas.map(function(em){return h('option',{key:em.empresa_id,value:em.empresa_id},em.razon_social);})
        ),
        selEmpresa&&h('div',null,
          h('div',{style:{fontSize:13,fontWeight:700,color:'#1E3A2D',marginBottom:6}},'Trabajadores ('+filtrados.length+')'),
          h('input',{value:busqueda,onChange:function(e){setBusqueda(e.target.value);},style:Object.assign({},inpS,{fontSize:11}),placeholder:'Buscar por nombre o RUT...'})
        )
      ),
      h('div',{style:{flex:1,overflowY:'auto'}},
        !selEmpresa?h('div',{style:{textAlign:'center',padding:'30px 10px',color:'#94A3B8',fontSize:12}},'Seleccione una empresa para ver sus trabajadores'):
        filtrados.length===0?h('div',{style:{textAlign:'center',padding:'30px 10px',color:'#94A3B8',fontSize:12}},'Sin trabajadores en esta empresa'):
        filtrados.map(function(per){
          var isSel=selPersona&&selPersona.persona_id===per.persona_id;
          return h('div',{key:per.persona_id,onClick:function(){selectPersona(per);},style:{padding:'6px 10px',cursor:'pointer',borderBottom:'1px solid #F1F5F9',background:isSel?'#1E3A2D':'transparent',color:isSel?'#fff':'#1E293B',transition:'all .1s'}},
            h('div',{style:{fontSize:11,fontWeight:600}},per.nombre_completo),
            h('div',{style:{fontSize:10,opacity:.7,fontFamily:'monospace'}},per.rut||'—')
          );
        })
      )
    ),
    // ── PANEL CENTRAL: Formulario ──
    h('div',{style:{width:320,minWidth:280,flexShrink:0,background:'#fff',borderRadius:8,border:'1px solid #E2E8F0',padding:14,overflowY:'auto'}},
      !selPersona?h('div',{style:{textAlign:'center',padding:'40px 10px',color:'#94A3B8',fontSize:13}},'← Seleccione un trabajador para registrar vacaciones'):
      h('div',null,
        h('div',{style:{fontSize:13,fontWeight:700,color:'#1E3A2D',marginBottom:2}},editReg?'Editar registro':'Nuevo registro de vacaciones'),
        h('div',{style:{fontSize:11,color:'#475569',marginBottom:10}},selPersona.nombre_completo),
        selPersona.fecha_ingreso&&h('div',{style:{fontSize:10,color:'#64748B',marginBottom:8,padding:'6px 8px',background:'#F0FDF4',borderRadius:4,lineHeight:1.6}},
          'Ingreso: '+fmtD(selPersona.fecha_ingreso),
          (function(){
            var aniosEmp=aniosDesde(selPersona.fecha_ingreso);
            var tieneAnt=selPersona.tiene_antiguedad_previa!==false;
            var aniosPrev=tieneAnt?10:0;
            var total=aniosPrev+aniosEmp;
            var parts=[' | Antigüedad: '+aniosEmp+' año(s) en empresa'];
            if(tieneAnt)parts.push(' + 10 años reconocidos (Art. 68) = '+total+' total');
            else parts.push(' | Sin antigüedad previa reconocida');
            if(progresivos>0)parts.push(' | ✓ Progresivos: '+progresivos+' día(s)');
            else if(total>=10){var falta=3-((aniosEmp-Math.max(0,10-aniosPrev))%3);if(falta===3)falta=0;parts.push(' | Próximo progresivo en '+(falta>0?falta:3)+' año(s)');}
            else parts.push(' | Progresivos: 0 (faltan '+(10-total)+' año(s) para 10 totales)');
            return parts.join('');
          })()
        ),
        msg&&h('div',{className:'al '+(msg.startsWith('Error')?'al-e':'al-s'),style:{marginBottom:6,fontSize:11}},msg),
        // Período contractual
        h('div',{style:{background:'#F8FAFC',borderRadius:6,padding:8,marginBottom:8}},
          h('div',{style:{fontSize:11,fontWeight:700,color:'#1E3A2D',marginBottom:6}},'Período Contractual'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}},

            h('div',null,h('label',{style:lblS},'Hasta'),h('input',{type:'date',value:form.periodo_hasta,onChange:function(e){upd('periodo_hasta',e.target.value);},style:inpS}))
          ),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:6}},
            h('div',null,h('label',{style:lblS},'Días correspondientes'),h('input',{type:'number',value:form.dias_correspondientes,onChange:function(e){var v=parseInt(e.target.value)||15;upd('dias_correspondientes',v);recalcSaldo(v,parseInt(form.dias_progresivos)||0);},style:inpS})),
            h('div',null,h('label',{style:lblS},'Días progresivos'),h('input',{type:'number',value:form.dias_progresivos,onChange:function(e){var v=parseInt(e.target.value)||0;upd('dias_progresivos',v);recalcSaldo(parseInt(form.dias_correspondientes)||15,v);},style:inpS}))
          )
        ),
        // Período de feriado
        h('div',{style:{background:'#F8FAFC',borderRadius:6,padding:8,marginBottom:8}},
          h('div',{style:{fontSize:11,fontWeight:700,color:'#1E3A2D',marginBottom:6}},'Período de Feriado (Vacaciones)'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}},
            h('div',null,h('label',{style:lblS},'Desde'),h('input',{type:'date',value:form.vacaciones_desde,onChange:function(e){
              upd('vacaciones_desde',e.target.value);

            },style:inpS})),
            h('div',null,h('label',{style:lblS},'Hasta'),h('input',{type:'date',value:form.vacaciones_hasta,onChange:function(e){

          )
        ),
        // Detalle cálculo
        h('div',{style:{background:form.saldo_pendiente<0?'#FEF2F2':'#F0FDF4',borderRadius:6,padding:8,marginBottom:8,border:'1px solid '+(form.saldo_pendiente<0?'#FECACA':'#BBF7D0')}},
          h('div',{style:{fontSize:11,fontWeight:700,color:'#1E3A2D',marginBottom:6}},'Detalle de Vacaciones'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}},
            h('div',{style:{fontSize:11,color:'#475569'}},'Días hábiles usados:'),h('div',{style:{fontSize:12,fontWeight:700,textAlign:'right'}},form.dias_habiles),
            h('div',{style:{fontSize:11,color:'#475569'}},'Sáb, Dom y Festivos:'),
            h('div',{style:{textAlign:'right'}},
              h('input',{type:'number',value:form.dias_no_habiles,onChange:function(e){adjustNoHabiles(parseInt(e.target.value)||0);},style:{width:45,padding:'1px 4px',border:'1px solid #CBD5E1',borderRadius:3,fontSize:12,fontWeight:700,textAlign:'right',color:'#64748B'},title:'Ajuste manual: agregue feriados no detectados'})

        ),
        h('div',{style:{maxHeight:450,overflowY:'auto'}},

            {lbl:'',w:35,render:function(r){return h('input',{type:'checkbox',checked:!!sel[dteKey(r)],onChange:function(){toggleSel(dteKey(r));},style:{cursor:'pointer'}});}},
            {lbl:'Tipo',render:function(r){return h(Bg,{c:r.tipo_dte==='33'?'b':r.tipo_dte==='61'?'r':r.tipo_dte==='56'?'y':'gray'},r.tipo_doc);}},
            {lbl:'Folio',render:function(r){return h('span',{style:{fontFamily:'monospace',fontSize:11}},r.folio);}},
            {lbl:'Fecha',render:function(r){return fmtD(r.fecha_emision);}},
            {lbl:'Proveedor',render:function(r){return h('div',null,h('div',{style:{fontSize:12,fontWeight:500}},r.proveedor_nombre||'—'),h('div',{style:{fontSize:10,color:r.proveedor_match?'#10B981':'#F59E0B'}},r.proveedor_match?'✓ '+r.proveedor_match:'⚠ No registrado — se creará'));}},
            {lbl:'Líneas',r:true,render:function(r){return r.lineas.length;}},
            {lbl:'Neto',r:true,render:function(r){var isNC=r.tipo_dte==='61';return h('span',{style:{color:isNC?'#DC2626':'inherit'}},CLP(isNC?-r.neto:r.neto));}},
            {lbl:'Total',r:true,render:function(r){var isNC=r.tipo_dte==='61';return h('strong',{style:{color:isNC?'#DC2626':'inherit'}},CLP(isNC?-r.total:r.total));}}
          ],rows:filtered,empty:'Sin DTE'})
        )

            {lbl:'Proveedor',render:function(r){return r.proveedor||'—';}},

// ══ GUÍAS DE DESPACHO — FACTURACIÓN ══
function OCGuiasView(p){
  var provs=(p.m.provs||[]).filter(function(pr){return pr.activo;});
  var empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  var[provsPend,setProvsPend]=useState([]);
  var[selProv,setSelProv]=useState('');
  var[pendientes,setPendientes]=useState([]);
  var[facturas,setFacturas]=useState([]);
  var[selIds,setSelIds]=useState([]);
  var[showForm,setShowForm]=useState(false);
  var[form,setForm]=useState({numero_factura:'',fecha_factura:new Date().toISOString().slice(0,10),neto:'',iva:'',ie_total:'0',total:'',observaciones:'',empresa_id:''});
  var[msg,setMsg]=useState('');

  function loadProvsPend(){api('/oc-guias/proveedores-pendientes','GET',null,p.tok).then(function(r){setProvsPend(Array.isArray(r)?r:[]);}).catch(function(){});}
  function loadPendientes(pid){
    if(!pid){setPendientes([]);return;}
    api('/oc-guias/pendientes?proveedor_id='+pid,'GET',null,p.tok).then(function(r){setPendientes(Array.isArray(r)?r:[]);setSelIds([]);}).catch(function(){});
  }
  function loadFacturas(pid){
    var qs=pid?'?proveedor_id='+pid:'';
    api('/oc-guias/facturas'+qs,'GET',null,p.tok).then(function(r){setFacturas(Array.isArray(r)?r:[]);}).catch(function(){});
  }
  useEffect(function(){loadProvsPend();},[p.tok]);
  useEffect(function(){loadPendientes(selProv);loadFacturas(selProv);},[selProv]);

  function toggleSel(id){setSelIds(function(ids){return ids.includes(id)?ids.filter(function(x){return x!==id;}):ids.concat([id]);});}
  function selectAll(){setSelIds(pendientes.map(function(r){return r.oc_id;}));}
  function selectNone(){setSelIds([]);}

  var selOcs=pendientes.filter(function(r){return selIds.includes(r.oc_id);});
  var sumNeto=selOcs.reduce(function(s,r){return s+(parseFloat(r.neto)||0);},0);
  var sumTotal=selOcs.reduce(function(s,r){return s+(parseFloat(r.total)||0);},0);
  var sumLitros=selOcs.reduce(function(s,r){return s+(parseFloat(r.litros_comb)||0);},0);

  // Agrupar combustibles por CATEGORÍA (diesel/gasolina)
  var combPorCat={};
  selOcs.forEach(function(oc){
    var lineas=oc.comb_lineas||[];
    if(!Array.isArray(lineas))return;
    lineas.forEach(function(l){
      var cat=l.categoria;
      if(!cat||cat==='otro')return;
      if(!combPorCat[cat])combPorCat[cat]={categoria:cat,litros:0,precio_prov:0,count:0,sources:{stock:0,directo:0},tipos_nombres:{}};
      var lts=parseFloat(l.litros)||0;
      combPorCat[cat].litros+=lts;
      combPorCat[cat].precio_prov+=(parseFloat(l.precio_unitario)||0)*lts;
      combPorCat[cat].count++;
      if(l.source==='stock')combPorCat[cat].sources.stock++;
      else combPorCat[cat].sources.directo++;
      if(l.tipo_nombre)combPorCat[cat].tipos_nombres[l.tipo_nombre]=true;
      else if(l.descripcion)combPorCat[cat].tipos_nombres[l.descripcion.substring(0,20)]=true;
    });
  });
  var tiposComb=Object.values(combPorCat).map(function(t){
    return Object.assign({},t,{
      precio_prov_prom:t.litros>0?t.precio_prov/t.litros:0,
      tipo_id:t.categoria, // usamos categoría como ID
      tipo_nombre:t.categoria==='diesel'?'Diesel / Petróleo':'Gasolina / Bencina',
      nombres_str:Object.keys(t.tipos_nombres).join(', ')
    });
  }).sort(function(a,b){return b.litros-a.litros;});
  var tieneComb=tiposComb.length>0;

  // Estado de ajustes por tipo
  var[ajustesComb,setAjustesComb]=useState({});
  function updAjuste(tipoId,key,val){
    setAjustesComb(function(a){var k=String(tipoId);return Object.assign({},a,{[k]:Object.assign({},a[k]||{},{[key]:val})});});
  }
  // Estado: líneas OC cargadas bajo demanda
  var[ocLineasMap,setOcLineasMap]=useState({});
  var[expandedId,setExpandedId]=useState(null);
  function toggleExpand(ocId){
    if(expandedId===ocId){setExpandedId(null);return;}
    setExpandedId(ocId);
    if(!ocLineasMap[ocId]){
      api('/oc/'+ocId+'/lineas','GET',null,p.tok).then(function(r){
        setOcLineasMap(function(m){return Object.assign({},m,{[ocId]:Array.isArray(r)?r:[]});});
      }).catch(function(){});
    }
  }

  function openFacturar(){
    if(!selIds.length){alert('Seleccione al menos una guía');return;}
    var emp=selOcs[0]?selOcs[0].empresa_id:'';
    setForm({numero_factura:'',fecha_factura:new Date().toISOString().slice(0,10),neto:'',iva:'',ie_total:'',total:'',observaciones:'',empresa_id:String(emp||'')});
    // Dejar ajustes vacíos — el usuario transcribe los totales de la factura
    var init={};
    tiposComb.forEach(function(t){
      init[String(t.tipo_id)]={total_neto:'',total_ie:''};
    });
    setAjustesComb(init);
    setShowForm(true);setMsg('');
  }
  function guardar(){
    if(!form.numero_factura){setMsg('Ingrese N° de factura');return;}
    var ajustes=tiposComb.map(function(t){
      var aj=ajustesComb[String(t.tipo_id)]||{};
      var totalN=parseFloat(aj.total_neto)||0;
      var totalIE=parseFloat(aj.total_ie)||0;
      var netoLt=t.litros>0?totalN/t.litros:0;
      var ieLt=t.litros>0?totalIE/t.litros:0;
      return{categoria:t.categoria,neto_lt:netoLt,ie_lt:ieLt};
    }).filter(function(a){return a.neto_lt>0;});
    var body=Object.assign({},form,{proveedor_id:parseInt(selProv),oc_ids:selIds,combustible_ajustes:ajustes});
    api('/oc-guias/facturar','POST',body,p.tok).then(function(r){
      var msg2='Factura creada correctamente.';
      if(r.recalculados>0)msg2+=' '+r.recalculados+' movimiento(s) de combustible recalculado(s).';
      alert(msg2);
      setShowForm(false);setSelIds([]);setAjustesComb({});loadPendientes(selProv);loadFacturas(selProv);loadProvsPend();
    }).catch(function(e){setMsg('Error: '+e.message);});
  }
  function eliminarFactura(fid){
    if(!confirm('¿Eliminar esta factura? Las guías volverán a quedar pendientes.'))return;
    api('/oc-guias/facturas/'+fid,'DELETE',null,p.tok).then(function(){loadPendientes(selProv);loadFacturas(selProv);loadProvsPend();}).catch(function(e){alert(e.message);});
  }

  var inpS={width:'100%',padding:'7px 10px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:12,boxSizing:'border-box'};
  var lblS={fontSize:10,fontWeight:600,display:'block',marginBottom:3,color:'#64748B',textTransform:'uppercase',letterSpacing:'.5px'};

  return h('div',null,
    // Proveedores con guías pendientes
    h('div',{className:'card',style:{padding:16,marginBottom:16}},
      h('div',{style:{fontSize:14,fontWeight:700,marginBottom:12,color:'#1E3A2D'}},'Proveedores con guías pendientes de facturar'),
      provsPend.length===0?h('div',{style:{color:'#94A3B8',fontSize:12,padding:20,textAlign:'center'}},'No hay guías de despacho pendientes de facturar'):
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}},
        provsPend.map(function(pr){
          var isActive=String(pr.proveedor_id)===String(selProv);
          return h('div',{key:pr.proveedor_id,onClick:function(){setSelProv(String(pr.proveedor_id));},style:{padding:'12px 16px',borderRadius:8,border:'2px solid '+(isActive?'#1E3A2D':'#E2E8F0'),background:isActive?'#F0FDF4':'#fff',cursor:'pointer',transition:'all .2s'}},
            h('div',{style:{fontSize:13,fontWeight:600,color:'#1E3A2D'}},pr.nombre),
            h('div',{style:{fontSize:10,color:'#64748B',marginTop:2}},pr.rut||''),
            h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:6}},
              h('span',{style:{fontSize:11,color:'#F59E0B',fontWeight:600}},pr.guias_pendientes+' guía(s)'),
              h('span',{style:{fontSize:11,fontWeight:700,fontFamily:'monospace'}},CLP(Math.round(parseFloat(pr.monto_total)||0)))
            )
          );
        })
      )
    ),
    // Guías pendientes del proveedor seleccionado
    selProv&&h('div',{className:'card',style:{padding:16,marginBottom:16}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        h('div',{style:{fontSize:14,fontWeight:700,color:'#1E3A2D'}},'Guías pendientes — '+(provsPend.find(function(pr){return String(pr.proveedor_id)===String(selProv);})||{}).nombre),
        h('div',{style:{display:'flex',gap:6}},
          h('button',{onClick:selectAll,style:{padding:'4px 10px',borderRadius:4,border:'1px solid #CBD5E1',background:'#fff',fontSize:10,cursor:'pointer'}},'Seleccionar todas'),
          h('button',{onClick:selectNone,style:{padding:'4px 10px',borderRadius:4,border:'1px solid #CBD5E1',background:'#fff',fontSize:10,cursor:'pointer'}},'Deseleccionar'),
          selIds.length>0&&h(Btn,{onClick:openFacturar},'📄 Facturar '+selIds.length+' guía(s)')
        )
      ),
      pendientes.length===0?h('div',{style:{color:'#94A3B8',fontSize:12,textAlign:'center',padding:20}},'Sin guías pendientes para este proveedor'):
      h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:11}},
        h('thead',null,h('tr',null,
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'center',width:30}},''),
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'left'}},'N° OC'),
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'left'}},'Empresa'),
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'left'}},'Documento'),
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'left'}},'Fecha'),
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'right'}},'Neto'),
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'right'}},'Total'),
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'right'}},'Litros'),
          h('th',{style:{padding:'8px',background:'#F1F5F9',textAlign:'center',width:40}},'')
        )),
        h('tbody',null,
          pendientes.reduce(function(acc,oc){
            var isSel=selIds.includes(oc.oc_id);
            var hasComb=parseFloat(oc.litros_comb)>0;
            var isExp=expandedId===oc.oc_id;
            acc.push(h('tr',{key:oc.oc_id,style:{cursor:'pointer',background:isSel?'#F0FDF4':(isExp?'#F8FAFC':'')}},
              h('td',{onClick:function(){toggleSel(oc.oc_id);},style:{padding:'6px 8px',textAlign:'center'}},h('input',{type:'checkbox',checked:isSel,readOnly:true,style:{cursor:'pointer'}})),
              h('td',{onClick:function(){toggleSel(oc.oc_id);},style:{padding:'6px 8px',fontFamily:'monospace',fontWeight:600}},oc.numero_oc),
              h('td',{onClick:function(){toggleSel(oc.oc_id);},style:{padding:'6px 8px',color:'#64748B'}},oc.empresa_nombre||'—'),
              h('td',{onClick:function(){toggleSel(oc.oc_id);},style:{padding:'6px 8px'}},
                h('div',{style:{fontSize:10,color:'#475569'}},oc.tipo_doc_nombre||'Guía'),
                oc.numero_documento&&h('div',{style:{fontSize:9,fontFamily:'monospace',color:'#94A3B8'}},'#'+oc.numero_documento)
              ),
              h('td',{onClick:function(){toggleSel(oc.oc_id);},style:{padding:'6px 8px'}},fmtD(oc.fecha_documento||oc.fecha_emision)),
              h('td',{onClick:function(){toggleSel(oc.oc_id);},style:{padding:'6px 8px',textAlign:'right',fontFamily:'monospace'}},CLP(Math.round(parseFloat(oc.neto)||0))),
              h('td',{onClick:function(){toggleSel(oc.oc_id);},style:{padding:'6px 8px',textAlign:'right',fontFamily:'monospace',fontWeight:600}},CLP(Math.round(parseFloat(oc.total)||0))),
              h('td',{onClick:function(){toggleSel(oc.oc_id);},style:{padding:'6px 8px',textAlign:'right'}},hasComb?h('span',{style:{background:'#FEF3C7',color:'#92400E',padding:'2px 6px',borderRadius:10,fontSize:10,fontWeight:600}},parseFloat(oc.litros_comb).toFixed(0)+' lts'):h('span',{style:{color:'#CBD5E1',fontSize:10}},'—')),
              h('td',{style:{padding:'6px 8px',textAlign:'center'}},h('button',{onClick:function(e){e.stopPropagation();toggleExpand(oc.oc_id);},style:{border:'1px solid #CBD5E1',background:isExp?'#1E3A2D':'#fff',color:isExp?'#fff':'#475569',borderRadius:4,padding:'2px 8px',fontSize:10,cursor:'pointer'}},isExp?'▴':'▾'))
            ));
            if(isExp){
              var lineas=ocLineasMap[oc.oc_id];
              acc.push(h('tr',{key:oc.oc_id+'-exp',style:{background:'#F8FAFC'}},
                h('td',{colSpan:9,style:{padding:'8px 20px'}},
                  h('div',{style:{fontSize:10,fontWeight:700,color:'#475569',marginBottom:6,textTransform:'uppercase'}},'Líneas de la OC'),
                  !lineas?h('div',{style:{color:'#94A3B8',fontSize:11,padding:4}},'Cargando...'):
                  lineas.length===0?h('div',{style:{color:'#94A3B8',fontSize:11,padding:4}},'Sin líneas'):
                  h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:10,background:'#fff',border:'1px solid #E2E8F0'}},
                    h('thead',null,h('tr',null,
                      h('th',{style:{padding:'4px 8px',background:'#F1F5F9',textAlign:'left'}},'Descripción'),
                      h('th',{style:{padding:'4px 8px',background:'#F1F5F9',textAlign:'left'}},'Subcategoría'),
                      h('th',{style:{padding:'4px 8px',background:'#F1F5F9',textAlign:'left'}},'Producto'),
                      h('th',{style:{padding:'4px 8px',background:'#F1F5F9',textAlign:'right'}},'Cant.'),
                      h('th',{style:{padding:'4px 8px',background:'#F1F5F9',textAlign:'right'}},'P. Unit.'),
                      h('th',{style:{padding:'4px 8px',background:'#F1F5F9',textAlign:'right'}},'Total'),
                      h('th',{style:{padding:'4px 8px',background:'#F1F5F9',textAlign:'center'}},'¿Combustible?')
                    )),
                    h('tbody',null,lineas.map(function(l){
                      var txt=((l.descripcion||'')+' '+(l.subcat_nombre||l.subcategoria_nombre||'')+' '+(l.prod_nombre||l.producto_nombre||'')).toUpperCase();
                      var esDiesel=/DIESEL|PETR/.test(txt);
                      var esGasolina=/GASOLINA|BENCINA|NAFTA/.test(txt);
                      var esComb=esDiesel||esGasolina;
                      return h('tr',{key:l.detalle_id},
                        h('td',{style:{padding:'4px 8px'}},l.descripcion||'—'),
                        h('td',{style:{padding:'4px 8px',color:'#64748B'}},l.subcat_nombre||l.subcategoria_nombre||'—'),
                        h('td',{style:{padding:'4px 8px',color:'#64748B'}},l.prod_nombre||l.producto_nombre||'—'),

function OCRFactura(p){
  const[file,setFile]=useState(null);
  const[preview,setPreview]=useState(null);
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const[rawText,setRawText]=useState('');
  const[showRaw,setShowRaw]=useState(false);

  var provs=(p.m.provs||[]).filter(function(p2){return p2.activo;});
  var empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  var tdocs=(p.m.tdocs||[]);

  function onFileChange(e){
    var f=e.target.files[0];
    if(!f)return;
    setFile(f);setResult(null);setRawText('');
    var reader=new FileReader();
    reader.onload=function(ev){setPreview(ev.target.result);};
    reader.readAsDataURL(f);
  }

  function sendToOCR(b64,mimeType){
    var tok=p.tok;
    fetch('/api/ocr/factura',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body:JSON.stringify({base64:b64,mediaType:mimeType})
    }).then(function(r){return r.json();})
    .then(function(data){
      if(!data.ok&&!data.data){setLoading(false);p.onMsg&&p.onMsg('Error: '+(data.error||'Sin respuesta'));return;}
      setRawText(data.raw||'');setResult(data.data||{});
      p.onMsg&&p.onMsg('Documento analizado. Revise y confirme los datos.');
      setLoading(false);
    })
    .catch(function(ex){setLoading(false);p.onMsg&&p.onMsg('Error: '+ex.message);});
  }

  function extraer(){
    if(!file){alert('Seleccione un archivo primero');return;}
    setLoading(true);p.onMsg&&p.onMsg('Procesando documento...');
    // Send file directly as base64 — PDF goes as PDF, images as image
    if(file.name&&file.name.toLowerCase().endsWith('.xml')){
      // XML: read as text to preserve encoding, then base64 encode
      var rxml=new FileReader();
      rxml.onload=function(ev){
        var b64=btoa(unescape(encodeURIComponent(ev.target.result)));
        sendToOCR(b64,'text/xml');
      };
      rxml.readAsText(file,'ISO-8859-1');
    }else{
      var reader=new FileReader();
      reader.onload=function(ev){
        var b64=ev.target.result.split(',')[1];
        sendToOCR(b64,file.type);
      };
      reader.readAsDataURL(file);
    }
  }

  function aplicar(){
    if(!result)return;
    // Match proveedor by RUT
    var prov=result.proveedor_rut?provs.find(function(p2){
      var r1=(p2.rut||'').replace(/[\.\-]/g,'').toLowerCase();
      var r2=(result.proveedor_rut||'').replace(/[\.\-]/g,'').toLowerCase();
      return r1&&r2&&r1===r2;
    }):null;
    // Match empresa by RUT
    var emp=result.cliente_rut?empresas.find(function(e){
      var r1=(e.rut||'').replace(/[\.\-]/g,'').toLowerCase();
      var r2=(result.cliente_rut||'').replace(/[\.\-]/g,'').toLowerCase();
      return r1&&r2&&r1===r2;
    }):null;
    // Match tdoc — by DTE code first, then by name
    var tdoc=null;
    if(result.tipo_dte){tdoc=tdocs.find(function(t){return t.codigo===result.tipo_dte||t.codigo===String(result.tipo_dte);});}
    if(!tdoc&&result.tipo_doc){tdoc=tdocs.find(function(t){
      return result.tipo_doc.toUpperCase().includes(t.nombre?t.nombre.toUpperCase():'')
        ||(t.codigo&&result.tipo_doc.toUpperCase().includes(t.codigo.toUpperCase()));
    });}
    // Build lineas for OC
    var lineas=(result.lineas||[]).map(function(l,i){
      return {descripcion:l.descripcion||'',prod_id:'',subcategoria_id:'',faena_id:'',equipo_id:'',
        cantidad:l.cantidad||1,precio_unitario:l.precio_unitario||0,
        ingresa_bodega:false,bodega_destino_id:''};
    });
    p.onImport({
      proveedor_id:prov?prov.proveedor_id:null,
      empresa_id:emp?emp.empresa_id:null,
      fecha_emision:result.fecha_emision||null,
      numero_documento:result.numero_documento||null,
      tipo_doc_id:tdoc?tdoc.tipo_doc_id:null,
      lineas:lineas.length?lineas:null,
      _raw:result
    });
  }

  var inpStyle={padding:'6px 8px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:12};

  return h('div',{style:{background:'#F0F9FF',border:'2px solid #BAE6FD',borderRadius:8,padding:'14px',marginBottom:12}},
    h('div',{style:{fontWeight:600,fontSize:13,color:'#0369A1',marginBottom:10}},'📄 Importar datos desde factura o guía de despacho'),
    h('div',{style:{display:'flex',gap:10,alignItems:'flex-start',flexWrap:'wrap'}},
      h('div',{style:{flex:1,minWidth:200}},
        h('label',{style:{fontSize:11,fontWeight:600,display:'block',marginBottom:4,color:'#475569'}},'Seleccione archivo (XML recomendado · PDF · JPG · PNG)'),
        h('input',{type:'file',accept:'image/*,.pdf,.xml,text/xml,application/xml',onChange:onFileChange,style:{fontSize:11,width:'100%'}}),
        file&&h('div',{style:{fontSize:10,color:'#64748B',marginTop:2}},file.name+' ('+Math.round(file.size/1024)+' KB)')
      ),
      h(Btn,{v:'teal',sm:true,onClick:extraer,disabled:!file||loading},loading?'Analizando...':'🔍 Extraer datos')
    ),
    // Preview extracted data
    result&&h('div',{style:{marginTop:10}},
      h('div',{style:{fontSize:11,fontWeight:600,color:'#0369A1',marginBottom:6}},'Datos extraídos — revise antes de aplicar:'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:11,background:'#fff',borderRadius:5,padding:'8px 10px',border:'1px solid #BAE6FD'}},
        h('div',null,h('span',{style:{color:'#64748B'}},'Proveedor: '),h('span',{style:{fontWeight:600}},result.proveedor_nombre||'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'RUT prov.: '),h('span',{style:{fontWeight:600}},result.proveedor_rut||'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'N° doc.: '),h('span',{style:{fontWeight:600}},result.numero_documento||'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'Fecha: '),h('span',{style:{fontWeight:600}},result.fecha_emision||'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'Total: '),h('span',{style:{fontWeight:600}},result.total?CLP(result.total):'—')),

function ImportarDesdeFacto(p){
  var TODAY=new Date().toISOString().split('T')[0];
  var FIRST=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
  const[desde,setDesde]=useState(FIRST);
  const[hasta,setHasta]=useState(TODAY);
  const[tipo,setTipo]=useState('33');
  const[docs,setDocs]=useState([]);
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState('');
  const[selId,setSelId]=useState(null);
  const[loadingXml,setLoadingXml]=useState(false);

  function consultar(){
    setLoading(true);setMsg('');setDocs([]);
    api('/facto/dte-recibidos?desde='+desde+'&hasta='+hasta+'&tipo='+tipo,'GET',null,p.tok)
      .then(function(r){
        // Facto may return array directly or wrapped in data/items
        var items=Array.isArray(r)?r:(r.data||r.items||r.documentos||r.dte||[]);
        setDocs(items);
        if(!items.length)setMsg('No se encontraron documentos en el período seleccionado.');
      })
      .catch(function(ex){setMsg('Error: '+ex.message);})
      .finally(function(){setLoading(false);});
  }

  function importar(id){
    setLoadingXml(true);setMsg('Descargando XML...');
    api('/facto/dte/'+id+'/xml','GET',null,p.tok)
      .then(function(r){
        if(!r.ok||!r.data){setMsg('Error al procesar el XML');return;}
        p.onImport(r.data);
        setMsg('');
      })
      .catch(function(ex){setMsg('Error: '+ex.message);})
      .finally(function(){setLoadingXml(false);});
  }

  var TIPOS=[{v:'33',l:'Factura Electrónica'},{v:'52',l:'Guía de Despacho'},{v:'34',l:'Factura Exenta'},{v:'56',l:'Nota de Débito'},{v:'61',l:'Nota de Crédito'}];

  return h('div',{style:{background:'#F0FDF4',border:'2px solid #86EFAC',borderRadius:8,padding:'14px',marginBottom:12}},
    h('div',{style:{fontWeight:600,fontSize:13,color:'#15803D',marginBottom:10}},'🔗 Importar DTE desde Facto'),
    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10,alignItems:'flex-end'}},
      h('div',null,
        h('label',{style:{fontSize:11,fontWeight:600,display:'block',marginBottom:2}},'Tipo DTE'),
        h('select',{value:tipo,onChange:function(e){setTipo(e.target.value);},
          style:{padding:'6px 8px',border:'1px solid #86EFAC',borderRadius:5,fontSize:12,background:'#ECFDF5'}},
          TIPOS.map(function(t){return h('option',{key:t.v,value:t.v},t.l);})
        )
      ),
      h('div',null,
        h('label',{style:{fontSize:11,fontWeight:600,display:'block',marginBottom:2}},'Desde'),
        h('input',{type:'date',value:desde,onChange:function(e){setDesde(e.target.value);},
          style:{padding:'6px 8px',border:'1px solid #86EFAC',borderRadius:5,fontSize:12}})
      ),
      h('div',null,
        h('label',{style:{fontSize:11,fontWeight:600,display:'block',marginBottom:2}},'Hasta'),
        h('input',{type:'date',value:hasta,onChange:function(e){setHasta(e.target.value);},
          style:{padding:'6px 8px',border:'1px solid #86EFAC',borderRadius:5,fontSize:12}})
      ),
      h(Btn,{v:'g',sm:true,onClick:consultar,disabled:loading},loading?'Consultando...':'🔍 Consultar')
    ),
    msg&&h('div',{style:{fontSize:12,color:msg.startsWith('Error')?'#DC2626':'#16A34A',marginBottom:6}},msg),
    docs.length>0&&h('div',null,
      h('div',{style:{fontSize:11,color:'#475569',marginBottom:4}},docs.length+' documento(s) encontrado(s) — seleccione uno para importar:'),
      h('table',{style:{width:'100%',fontSize:11,borderCollapse:'collapse'}},
        h('thead',null,h('tr',null,
          h('th',{style:{padding:'4px 6px',background:'#DCFCE7',textAlign:'left'}},'N° Folio'),
          h('th',{style:{padding:'4px 6px',background:'#DCFCE7',textAlign:'left'}},'Fecha'),
          h('th',{style:{padding:'4px 6px',background:'#DCFCE7',textAlign:'left'}},'Proveedor'),
          h('th',{style:{padding:'4px 6px',background:'#DCFCE7',textAlign:'right'}},'Total'),
          h('th',{style:{padding:'4px 6px',background:'#DCFCE7'}})
        )),
        h('tbody',null,docs.map(function(d,i){
          // Facto may use different field names
          var id=d.id||d.dte_id||d.folio||i;
          var folio=d.folio||d.numero||d.nro||'—';
          var fecha=d.fecha_emision||d.fecha||d.date||'—';
          var prov=d.emisor_razon_social||d.razon_social_emisor||d.proveedor||d.emisor||'—';
          var total=d.monto_total||d.total||d.mnt_total||0;
          return h('tr',{key:i,style:{borderBottom:'1px solid #D1FAE5',background:i%2?'#F0FDF4':'#fff'}},
            h('td',{style:{padding:'4px 6px',fontFamily:'monospace'}},folio),
            h('td',{style:{padding:'4px 6px'}},fmtD(fecha)),
            h('td',{style:{padding:'4px 6px'}},typeof prov==='object'?JSON.stringify(prov):prov),
            h('td',{style:{padding:'4px 6px',textAlign:'right'}},total?CLP(total):'—'),
            h('td',{style:{padding:'4px 6px'}},
              h(Btn,{v:'g',sm:true,disabled:loadingXml,onClick:function(){importar(id);}},
                loadingXml?'..':'↓ Importar')
            )
          );
        }))
      )
    ),
    loadingXml&&h('div',{style:{fontSize:11,color:'#16A34A',marginTop:6}},'Descargando y procesando XML...')
  );
}

function CalcCombustibleInline(props){
  var onUsar=props.onUsar;
  var TASAS={diesel:1.5,gasolina:6.0};
  const[tipoComb,setTipoComb]=useState('diesel');
  const[modoCalc,setModoCalc]=useState('utm'); // 'utm' | 'directo'
  // Modo UTM
  const[utm,setUtm]=useState('');
  const[utmLoading,setUtmLoading]=useState(false);
  // Modo directo
  const[impEspDir,setImpEspDir]=useState(''); // monto total imp especifico
  const[modoImpDir,setModoImpDir]=useState('total'); // 'total' | 'por_litro'
  // Comunes
  const[litros,setLitros]=useState('');
  const[totalGuia,setTotalGuia]=useState('');
  const[incluyeIVA,setIncluyeIVA]=useState(true); // true=guía/factura Copec (incluye IVA+IE), false=doc sin IVA

  function fetchUTM(){
    setUtmLoading(true);
    fetch('https://mindicador.cl/api/utm')
      .then(function(r){return r.json();})
      .then(function(d){var val=d&&d.serie&&d.serie[0]&&d.serie[0].valor;if(val)setUtm(String(Math.round(val)));else alert('No se pudo obtener la UTM.');})

      .finally(function(){setUtmLoading(false);});

  var totalNum=parseFloat(totalGuia)||0;
  var tasa=TASAS[tipoComb]||1.5;
  var utmNum=parseFloat(utm)||0;
  var impEspDirNum=parseFloat(impEspDir)||0;

    ? utmNum*tasa/1000*litrosNum

  var baseIVA=totalNum-impEspTotal;
  var neto=incluyeIVA?baseIVA/1.19:baseIVA;

  var netoPorLitro=litrosNum>0?neto/litrosNum:0;
  var ok=litrosNum>0&&totalNum>0&&baseIVA>0&&(modoCalc==='utm'?utmNum>0:impEspDirNum>0);

  return h('div',null,
    // Tipo combustible
    h('div',{style:{display:'flex',gap:6,marginBottom:8}},
      h('button',{onClick:function(){setTipoComb('diesel');},style:{flex:1,padding:'5px',borderRadius:4,border:'2px solid '+(tipoComb==='diesel'?'#F59E0B':'#FDE68A'),background:tipoComb==='diesel'?'#FEF3C7':'transparent',fontWeight:600,fontSize:11,cursor:'pointer',color:tipoComb==='diesel'?'#92400E':'#78350F'}},'🚛 Diesel (1.5 UTM/m³)'),
      h('button',{onClick:function(){setTipoComb('gasolina');},style:{flex:1,padding:'5px',borderRadius:4,border:'2px solid '+(tipoComb==='gasolina'?'#3B82F6':'#FDE68A'),background:tipoComb==='gasolina'?'#EFF6FF':'transparent',fontWeight:600,fontSize:11,cursor:'pointer',color:tipoComb==='gasolina'?'#1D4ED8':'#78350F'}},'⛽ Gasolina (6 UTM/m³)')
    ),
    // Modo calculo
    h('div',{style:{display:'flex',gap:4,marginBottom:8,background:'#FEF3C7',borderRadius:5,padding:3}},
      h('button',{onClick:function(){setModoCalc('utm');},style:tabBtn(modoCalc==='utm')},'Calcular con UTM'),
      h('button',{onClick:function(){setModoCalc('directo');},style:tabBtn(modoCalc==='directo')},'Ingresar imp. específico')
    ),
    // Inputs comunes
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}},
      h('div',null,
        h('label',{style:{fontSize:10,fontWeight:600,display:'block',marginBottom:2,color:'#92400E'}},'Litros (guía)'),
        h('input',{type:'number',value:litros,onChange:function(e){setLitros(e.target.value);},style:inpS,placeholder:'Ej: 2899'})
      ),
      h('div',null,
        h('label',{style:{fontSize:10,fontWeight:600,display:'block',marginBottom:2,color:'#92400E'}},'Total documento ($)'),
        h('input',{type:'number',value:totalGuia,onChange:function(e){setTotalGuia(e.target.value);},style:inpS,placeholder:'Ej: 2.266.500'})
      )
    ),
    // Toggle IVA
    h('div',{style:{display:'flex',gap:8,marginBottom:8,alignItems:'center',padding:'4px 6px',background:incluyeIVA?'#FEF3C7':'#EFF6FF',borderRadius:5,border:'1px solid '+(incluyeIVA?'#FDE68A':'#BFDBFE')}},

      h('button',{onClick:function(){setIncluyeIVA(true);},style:{padding:'3px 8px',borderRadius:4,border:'1px solid '+(incluyeIVA?'#F59E0B':'#CBD5E1'),background:incluyeIVA?'#FEF3C7':'transparent',fontWeight:incluyeIVA?700:400,fontSize:10,cursor:'pointer',color:incluyeIVA?'#92400E':'#64748B'}},'Incluye IVA + IE (guía/factura Copec)'),
      h('button',{onClick:function(){setIncluyeIVA(false);},style:{padding:'3px 8px',borderRadius:4,border:'1px solid '+(incluyeIVA?'#CBD5E1':'#3B82F6'),background:incluyeIVA?'transparent':'#EFF6FF',fontWeight:incluyeIVA?400:700,fontSize:10,cursor:'pointer',color:incluyeIVA?'#64748B':'#1D4ED8'}},'Solo neto + IE (sin IVA)')
    ),
    // Modo-specific inputs
    modoCalc==='utm'?h('div',null,

        h('button',{onClick:fetchUTM,disabled:utmLoading,style:{padding:'4px 8px',background:'#FEF3C7',border:'1px solid #FDE68A',borderRadius:4,fontSize:10,cursor:'pointer',fontWeight:700,color:'#92400E',whiteSpace:'nowrap'}},utmLoading?'…':'↻ Obtener UTM')
      ),
      h('div',{style:{fontSize:9,color:'#78350F',marginTop:2}},'Fórmula: '+tasa+' UTM × $'+utmNum+' / 1000 × '+litrosNum+' lts = '+CLP(Math.round(impEspTotal))),
      // Resultado IE prominente
      impEspTotal>0&&h('div',{style:{background:'#FEF2F2',border:'2px solid #FECACA',borderRadius:8,padding:'12px 16px',marginTop:10}},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,textAlign:'center'}},
          h('div',null,
            h('div',{style:{fontSize:9,color:'#991B1B',textTransform:'uppercase',fontWeight:600,letterSpacing:1}},'Imp. Específico Total'),
            h('div',{style:{fontSize:24,fontWeight:700,color:'#DC2626'}},CLP(Math.round(impEspTotal))),
            litrosNum>0&&h('div',{style:{fontSize:10,color:'#991B1B'}},'$'+(impEspTotal/litrosNum).toFixed(2)+'/lt')
          ),
          h('div',null,
            h('div',{style:{fontSize:9,color:'#92400E',textTransform:'uppercase',fontWeight:600,letterSpacing:1}},'IVA 19%'),
            h('div',{style:{fontSize:20,fontWeight:700,color:'#B45309'}},CLP(Math.round(iva)))
          ),
          h('div',null,
            h('div',{style:{fontSize:9,color:'#166534',textTransform:'uppercase',fontWeight:600,letterSpacing:1}},'Neto (Base afecta)'),
            h('div',{style:{fontSize:20,fontWeight:700,color:'#15803D'}},CLP(Math.round(neto)))

        ),
        h('div',{style:{borderTop:'1px solid #FECACA',marginTop:10,paddingTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',{style:{fontSize:10,color:'#78350F',lineHeight:1.6}},
            'Total: '+CLP(totalNum)+' − IE: '+CLP(Math.round(impEspTotal))+' = '+(incluyeIVA?'Base IVA':'Neto')+': '+CLP(Math.round(baseIVA)),
            incluyeIVA?h('span',null,h('br'),'Base IVA: '+CLP(Math.round(baseIVA))+' / 1.19 = Neto: '+CLP(Math.round(neto))):null,
            h('br'),
            incluyeIVA?null:h('span',{style:{fontSize:9,color:'#06B6D4'}},'(Guía sin IVA → Neto = Total − IE directamente)'),
            h('br'),
            litrosNum>0?h('span',{style:{fontWeight:600}},'Neto/lt: '+CLP(Math.round(netoPorLitro))):null
          ),
          litrosNum>0&&h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontSize:9,color:'#166534',textTransform:'uppercase',fontWeight:600}},'Precio neto/litro'),
            h('div',{style:{fontSize:26,fontWeight:700,color:'#15803D'}},CLP(Math.round(netoPorLitro)))
          )
        ),
        // Verificación del total reconstruido
        litrosNum>0&&h('div',{style:{borderTop:'1px solid #FECACA',marginTop:8,paddingTop:8}},
          (function(){
            var netoRedondeado=Math.round(netoPorLitro)*litrosNum;
            var totalRedondeado=netoRedondeado+Math.round(netoRedondeado*0.19)+Math.round(impEspTotal);
            var diff=totalRedondeado-totalNum;
            var netoDecimal=Math.round(neto/litrosNum*10000)/10000;
            var netoDecTotal=Math.round(netoDecimal*litrosNum);
            var totalDecimal=netoDecTotal+Math.round(netoDecTotal*0.19)+Math.round(impEspTotal);

              h('div',{style:{color:'#15803D',fontWeight:600}},'✓ Con $'+netoDecimal.toFixed(4)+'/lt: total = '+CLP(totalDecimal)+(diffDec!==0?' (dif: '+CLP(Math.abs(diffDec))+')':' → cuadra exacto'))

        ),

        )

        h('div',{style:{fontSize:9,color:'#166534',textTransform:'uppercase'}},'Precio neto/litro'),
        h('div',{style:{fontSize:22,fontWeight:700,color:'#15803D'}},CLP(Math.round(netoPorLitro)))

        h('div',null,'Imp. esp. total: '+CLP(Math.round(impEspTotal))),
        h('div',null,'Imp. esp./lt: '+CLP(Math.round(impEspTotal/litrosNum))),
        h('div',null,'IVA: '+CLP(Math.round(iva))),
        h('div',null,'Neto: '+CLP(Math.round(neto)))
      )
    ):modoCalc==='directo'?h('div',{style:{fontSize:11,color:'#92400E',fontStyle:'italic',marginTop:6}},'Complete los campos para calcular'):null
  );
}

    var subcat=(l.subcategoria_nombre||'').toLowerCase();
