  const[bodega_id,setBodega]=useState('');

  // State for combustible lines: {detalle_id: [{estanque_id, litros}]}
  const initSplitMap={};lineasComb.forEach(function(l){initSplitMap[l.detalle_id]=[{estanque_id:'',litros:String(parseFloat(l.cantidad)||0)}];});
  const[splitMap,setSplitMap]=useState(initSplitMap);

  const[err,setErr]=useState('');const[saving,setSaving]=useState(false);

  function setProd(did,val){setProdMap(function(m){var n=Object.assign({},m);n[did]=val;return n;});}
  function setFactor(did,val){setFactorMap(function(m){var n=Object.assign({},m);n[did]=val;return n;});}
  function setSplit(did,idx,key,val){
    setSplitMap(function(m){
      var n=Object.assign({},m);
      var arr=(n[did]||[]).slice();
      arr[idx]=Object.assign({},arr[idx],{[key]:val});
      n[did]=arr;return n;
    });
  }
  function addSplit(did){
    setSplitMap(function(m){
      var n=Object.assign({},m);
      var arr=(n[did]||[]).slice();
      // Calcular litros restantes
      var linea=lineasComb.find(function(l){return l.detalle_id===did;});
      var totalLinea=parseFloat((linea||{}).cantidad)||0;
      var asignados=arr.reduce(function(s,a){return s+(parseFloat(a.litros)||0);},0);
      var rest=Math.max(0,totalLinea-asignados);
      arr.push({estanque_id:'',litros:String(rest)});
      n[did]=arr;return n;
    });
  }
  function removeSplit(did,idx){
    setSplitMap(function(m){
      var n=Object.assign({},m);
      var arr=(n[did]||[]).slice();
      if(arr.length<=1)return m; // mínimo 1
      arr.splice(idx,1);
      n[did]=arr;return n;
    });
  }

  function getEffectiveFactor(did,selProd){
    if(factorMap[did]!==undefined&&factorMap[did]!=='')return parseFloat(factorMap[did])||1;
    return parseFloat((selProd||{}).factor_conversion||1);
  }

  const lineasInvListas=lineasInv.filter(function(l){return !!prodMap[l.detalle_id];});
  const lineasCombListas=lineasComb.filter(function(l){
    var splits=splitMap[l.detalle_id]||[];
    return splits.some(function(s){return !!s.estanque_id;});
  });
  const totalListas=lineasInvListas.length+lineasCombListas.length;

  function save(){
    setErr('');
    if(totalListas===0){setErr('Debe asignar destino a al menos una linea.');return;}
    // Validar litros no excedan cantidad de línea
    for(var i=0;i<lineasComb.length;i++){
      var l=lineasComb[i];
      var splits=splitMap[l.detalle_id]||[];
      var totalAsig=splits.reduce(function(s,a){return s+(parseFloat(a.litros)||0);},0);
      var totalLinea=parseFloat(l.cantidad)||0;
      if(totalAsig>totalLinea+0.01){
        setErr('Línea "'+l.descripcion+'": asignó '+totalAsig.toFixed(0)+' lts pero la OC tiene '+totalLinea.toFixed(0)+' lts.');
        return;
      }
    }
    setSaving(true);
    // Construir comb_splits: {detalle_id: [{estanque_id, litros}]}
    var combSplits={};
    lineasComb.forEach(function(l){
      var splits=(splitMap[l.detalle_id]||[]).filter(function(s){return !!s.estanque_id&&parseFloat(s.litros)>0;});
      if(splits.length)combSplits[l.detalle_id]=splits.map(function(s){return{estanque_id:parseInt(s.estanque_id),litros:parseFloat(s.litros)};});
    });
    var payload={
      bodega_id:bodega_id||null,
      prod_map:prodMap,
      factor_map:factorMap,
      comb_splits:combSplits
    };
    api('/ordenes-compra/'+p.oc.oc_id+'/recibir-bodega','POST',payload,p.tok)
      .then(function(){p.onSave();})
      .catch(function(ex){setErr(ex.message);})
      .finally(function(){setSaving(false);});
  }

  var thStyle={textAlign:'left',padding:'4px 6px',background:'#F1F5F9',fontSize:11};
  var tdStyle={padding:'4px 6px',fontSize:11,borderBottom:'1px solid #E2E8F0'};

  return h(Modal,{title:'Recibir en Bodega — '+str(p.oc.numero_oc),onClose:p.onClose,lg:true},
    h(EB,null,
      h('div',{className:'mb'},
        h('div',{className:'al al-i',style:{marginBottom:10}},
          h('strong',null,'Proceso de recepcion: '),
          'Al confirmar se generaran los movimientos correspondientes usando la fecha del documento tributario ('+fmtD(p.oc.fecha_documento)+').'
        ),
        lineasBodega.length===0&&h('div',{className:'al al-e'},'No hay lineas marcadas con "A Bodega".'),

        // COMBUSTIBLE LINES — distribución multi-estanque
        lineasComb.length>0&&h('div',{style:{marginBottom:14}},
          h('div',{style:{fontWeight:600,fontSize:13,marginBottom:6,color:'#D97706'}},'⛽ Lineas de combustible ('+lineasComb.length+') — distribución a estanques'),
          h('div',{style:{fontSize:11,color:'#64748B',marginBottom:8}},'Distribuya los litros de cada línea entre uno o más estanques. Click "+ Estanque" para dividir la carga.'),
          lineasComb.map(function(l,li){
            var ct=getCombTipo(l);
            var estsFilt=ct?combEstanques.filter(function(e){return !e.tipo_combustible_id||e.tipo_combustible_id===ct.tipo_id;}):combEstanques;
            var splits=splitMap[l.detalle_id]||[];
            var totalLinea=parseFloat(l.cantidad)||0;
            var totalAsig=splits.reduce(function(s,a){return s+(parseFloat(a.litros)||0);},0);
            var restante=totalLinea-totalAsig;
            return h('div',{key:li,style:{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:8,padding:'10px 14px',marginBottom:8}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
                h('div',null,
                  h('span',{style:{fontWeight:600,fontSize:12}},l.descripcion||'Combustible'),
                  ct&&h(Bg,{c:'y'},ct.nombre),
                  h('span',{style:{fontFamily:'monospace',fontSize:12,marginLeft:8,fontWeight:700}},totalLinea.toFixed(0)+' lts'),
                  h('span',{style:{fontFamily:'monospace',fontSize:11,marginLeft:6,color:'#64748B'}},'@ '+CLP(Math.round(parseFloat(l.precio_unitario)||0))+'/lt')
                ),
                h('button',{onClick:function(){addSplit(l.detalle_id);},style:{padding:'3px 10px',fontSize:10,border:'1px solid #D97706',background:'#FEF3C7',borderRadius:4,cursor:'pointer',fontWeight:600,color:'#92400E'}},'+ Estanque')
              ),
              splits.map(function(sp,si){
                return h('div',{key:si,style:{display:'flex',gap:8,alignItems:'center',marginBottom:4}},
                  h('select',{value:sp.estanque_id||'',onChange:function(e){setSplit(l.detalle_id,si,'estanque_id',e.target.value);},
                    style:{flex:2,padding:'5px 8px',fontSize:11,border:'1px solid #CBD5E1',borderRadius:4}},
                    h('option',{value:''},'— Seleccione estanque —'),
                    estsFilt.map(function(e){
                      var cap=e.capacidad_max?parseFloat(e.capacidad_max):0;
                      var stk=e.litros_disponibles?parseFloat(e.litros_disponibles):0;
                      var disp=cap>0?cap-stk:0;
                      return h('option',{key:e.estanque_id,value:e.estanque_id},e.nombre+(cap>0?' ('+stk.toFixed(0)+'/'+cap.toFixed(0)+' lts — disp: '+disp.toFixed(0)+')':''));
                    })
                  ),
                  h('input',{type:'number',min:'0',step:'1',value:sp.litros,onChange:function(e){setSplit(l.detalle_id,si,'litros',e.target.value);},
                    style:{flex:0.7,padding:'5px 8px',fontSize:12,border:'1px solid #D97706',borderRadius:4,fontFamily:'monospace',fontWeight:600,textAlign:'right',background:'#FEFCE8'},placeholder:'Litros'}),
                  h('span',{style:{fontSize:10,color:'#64748B',width:20}},'lts'),
                  splits.length>1&&h('button',{onClick:function(){removeSplit(l.detalle_id,si);},style:{padding:'2px 6px',fontSize:10,border:'1px solid #EF4444',background:'#FEF2F2',borderRadius:3,cursor:'pointer',color:'#DC2626'}},'✕')
                );
              }),
              h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:10,fontWeight:600}},
                h('span',{style:{color:Math.abs(restante)<0.01?'#10B981':restante>0?'#D97706':'#DC2626'}},
                  Math.abs(restante)<0.01?'✓ Distribución completa':
                  restante>0?'⚠ Faltan '+restante.toFixed(0)+' lts por asignar':
                  '❌ Excede en '+Math.abs(restante).toFixed(0)+' lts'
                ),
                h('span',{style:{color:'#64748B'}},'Asignado: '+totalAsig.toFixed(0)+' / '+totalLinea.toFixed(0)+' lts')
              )
            );
          }),
          lineasCombListas.length>0&&h('div',{className:'al al-s',style:{marginTop:4}},lineasCombListas.length+' linea(s) de combustible listas.')
        ),

        // INVENTORY LINES
        lineasInv.length>0&&h('div',{style:{marginBottom:14}},
          h('div',{style:{fontWeight:600,fontSize:13,marginBottom:6}},'📦 Lineas de inventario ('+lineasInv.length+') — ingreso a bodega'),
          h('div',{style:{fontSize:11,color:'#64748B',marginBottom:6}},'Asigne el producto de inventario a cada linea.'),
          h('table',{style:{width:'100%',fontSize:11,borderCollapse:'collapse'}},
            h('thead',null,h('tr',null,
              h('th',{style:thStyle},'Detalle'),h('th',{style:thStyle},'Clasif.'),
              h('th',{style:Object.assign({},thStyle,{textAlign:'right'})},'Cant.'),
              h('th',{style:thStyle},'Producto inventario'),
              h('th',{style:Object.assign({},thStyle,{textAlign:'right'})},'Ing. stock')
            )),
            h('tbody',null,...lineasInv.map(function(l,i){
              return h('tr',{key:i,style:{borderBottom:'1px solid #E2E8F0'}},
                h('td',{style:tdStyle},l.descripcion||'—'),
                h('td',{style:tdStyle},l.subcategoria_nombre||'—'),
                h('td',{style:Object.assign({},tdStyle,{textAlign:'right',fontFamily:'monospace'})},l.cantidad),
                h('td',{style:tdStyle},
                  h('div',null,
                    h('select',{value:prodMap[l.detalle_id]||'',onChange:function(e){setProd(l.detalle_id,e.target.value);},
                      style:{width:'100%',padding:'3px 5px',fontSize:11,border:'1px solid #CBD5E1',borderRadius:4}},
                      h('option',{value:''},'— Seleccione producto —'),
                      prods.sort(function(a,b){return a.nombre.localeCompare(b.nombre);}).map(function(pr){
                        return h('option',{key:pr.producto_id,value:pr.producto_id},pr.codigo+' — '+pr.nombre.substring(0,35)+(parseFloat(pr.factor_conversion||1)>1?' ['+pr.unidad_compra+' x'+parseFloat(pr.factor_conversion)+']':''));
                      })
                    ),
                    (function(){
                      var sel=prods.find(function(pr){return String(pr.producto_id)===String(prodMap[l.detalle_id]);});
                      if(!sel)return null;
                      var defaultFc=parseFloat(sel.factor_conversion||1);
                      var fc=getEffectiveFactor(l.detalle_id,sel);
                      var qtyBase=(parseFloat(l.cantidad)||0)*fc;
                      var cuBase=(parseFloat(l.precio_unitario)||0)/(fc||1);
                      return h('div',{style:{marginTop:4}},
                        fc>1&&h('div',{style:{fontSize:10,color:'#1D4ED8',marginBottom:3}},
                          l.cantidad+' × '+fc+' = ',h('strong',null,qtyBase.toFixed(2)+' '+(sel.unidad_medida||'UN')),
                          '  CPP: '+CLP(Math.round(cuBase))+'/'+(sel.unidad_medida||'UN')
                        ),
                        h('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:10}},
                          h('span',{style:{color:'#64748B'}},'Factor:'),
                          h('input',{type:'number',min:'1',step:'any',
                            value:factorMap[l.detalle_id]!==undefined?factorMap[l.detalle_id]:defaultFc,
                            onChange:function(e){setFactor(l.detalle_id,e.target.value);},
                            style:{width:55,padding:'2px 4px',fontSize:10,border:'1px solid #CBD5E1',borderRadius:3}
                          }),
                          h('span',{style:{color:'#64748B'}},sel.unidad_compra?'('+defaultFc+' para '+sel.unidad_compra+')':'')
                        )
                      );
                    })()
                  )
                ),
                h('td',{style:Object.assign({},tdStyle,{textAlign:'right',color:'#0369A1'})},
                  (function(){
                    var selProd=prods.find(function(pr){return String(pr.producto_id)===String(prodMap[l.detalle_id]);});
                    if(!selProd)return '—';
                    var f=getEffectiveFactor(l.detalle_id,selProd);
                    return ((parseFloat(l.cantidad)||0)*f).toFixed(2)+' '+(selProd.unidad_medida||'UN');
                  })()
                )
              );
            }))
          ),
          lineasInvListas.length>0&&h('div',{className:'al al-s',style:{marginTop:4}},lineasInvListas.length+' linea(s) de inventario listas.'),
          h('div',{style:{marginTop:8}},
            h(FR,{label:'Bodega de recepcion'},
              h(Sel,{value:bodega_id,onChange:setBodega},
                h('option',{value:''},'Bodega por defecto de cada linea'),
                bodegas.map(function(b){return h('option',{key:b.bodega_id,value:b.bodega_id},b.nombre);})
              )
            )
          )
        ),

        h('hr',{className:'divider'}),
        err&&h('div',{className:'al al-e'},err)
      ),
      h('div',{className:'mf'},
        h(Btn,{v:'g',onClick:p.onClose},'Cancelar'),
        h(Btn,{v:'teal',onClick:save,disabled:saving||totalListas===0},
          saving?'Procesando...':'Recibir '+totalListas+' linea(s)'
        )
      )
    )
  );
}

// ══ IMPORTADOR DE PROVEEDORES DESDE XML/ZIP ══
function ImportProvXml(p){
  var[status,setStatus]=useState('idle');var[msg,setMsg]=useState('');
  var[provs,setProvs]=useState([]);var[sel,setSel]=useState({});var[results,setResults]=useState(null);
  function parseXml(xmlStr){
    function tag(name){var m=xmlStr.match(new RegExp('<'+name+'[^>]*>([^<]*)<\/'+name+'>'));return m?m[1].trim():null;}
    var rut=tag('RUTEmisor');var nombre=tag('RznSoc');var giro=tag('GiroEmis');
    var dir=tag('DirOrigen');var comuna=tag('CmnaOrigen');
    if(!rut||!nombre)return null;
    return{rut:rut,nombre:nombre,giro:giro||'',direccion:dir?(dir+(comuna?', '+comuna:'')):''};
  }
  function onFile(e){
    var file=e.target.files[0];if(!file)return;
    setStatus('loading');setMsg('Extrayendo proveedores...');setProvs([]);setSel({});setResults(null);
    var reader=new FileReader();
    reader.onload=function(ev){
      JSZip.loadAsync(ev.target.result).then(function(zip){
        var xmlFiles=[];
        zip.forEach(function(path,entry){if(path.toLowerCase().endsWith('.xml')&&!entry.dir)xmlFiles.push(entry);});
        var found={};var done=0;
        xmlFiles.forEach(function(entry){
          entry.async('string').then(function(content){
            var prov=parseXml(content);
            if(prov&&prov.rut&&!found[prov.rut]){found[prov.rut]=prov;}
            done++;
            if(done===xmlFiles.length){
              var lista=Object.values(found).sort(function(a,b){return a.nombre.localeCompare(b.nombre);});
              setProvs(lista);setStatus('preview');
              var s={};lista.forEach(function(pr){s[pr.rut]=true;});setSel(s);
              setMsg(lista.length+' proveedores únicos encontrados en '+xmlFiles.length+' archivos XML');
            }
          });
        });
        if(xmlFiles.length===0){setStatus('idle');setMsg('No se encontraron archivos XML en el ZIP');}
      }).catch(function(err){setStatus('idle');setMsg('Error: '+err.message);});
    };
    reader.readAsArrayBuffer(file);
  }
  function importar(){
    var items=provs.filter(function(pr){return sel[pr.rut];});
    if(!items.length){setMsg('Seleccione al menos un proveedor');return;}
    setStatus('importing');setMsg('Importando '+items.length+' proveedores...');
    api('/import/proveedores-xml','POST',{proveedores:items},p.tok).then(function(r){
      setResults(r.results||[]);setStatus('done');
      var creados=(r.results||[]).filter(function(x){return x.ok&&x.accion==='creado';}).length;
      var existentes=(r.results||[]).filter(function(x){return x.ok&&x.accion==='existente';}).length;
      var errores=(r.results||[]).filter(function(x){return !x.ok;}).length;
      setMsg('Importación completada: '+creados+' nuevos, '+existentes+' ya existían'+(errores?', '+errores+' con error':''));
      if(p.onRefresh)p.onRefresh();
    }).catch(function(e){setStatus('preview');setMsg('Error: '+e.message);});
  }
  var selCount=provs.filter(function(pr){return sel[pr.rut];}).length;
  return h(Modal,{title:'Importar proveedores desde XML/ZIP',onClose:p.onClose},
    h('div',{style:{padding:'0 4px',maxHeight:'70vh',overflowY:'auto'}},
      msg&&h('div',{className:'al '+(status==='done'?'al-s':'al-i'),style:{marginBottom:8}},msg),
      status==='idle'&&h('div',{style:{textAlign:'center',padding:20}},
        h('div',{style:{fontSize:13,color:'#475569',marginBottom:12}},'Seleccione un archivo ZIP con DTEs (facturas, guías, etc.) para extraer los datos de los proveedores (RUT, razón social, giro, dirección).'),
        h('input',{type:'file',accept:'.zip',onChange:onFile,style:{fontSize:12}})
      ),
      status==='loading'&&h('div',{style:{textAlign:'center',padding:20}},'Procesando...'),
      (status==='preview'||status==='done')&&provs.length>0&&h('div',null,
        status==='preview'&&h('div',{style:{display:'flex',gap:6,marginBottom:8}},
          h('button',{onClick:function(){var s={};provs.forEach(function(pr){s[pr.rut]=true;});setSel(s);},style:{fontSize:11,padding:'4px 10px',border:'1px solid #CBD5E1',borderRadius:4,cursor:'pointer'}},'Seleccionar todos'),
          h('button',{onClick:function(){setSel({});},style:{fontSize:11,padding:'4px 10px',border:'1px solid #CBD5E1',borderRadius:4,cursor:'pointer'}},'Ninguno')
        ),
        h(TBL,{cols:[
          status!=='done'&&{lbl:h('input',{type:'checkbox',checked:selCount===provs.length,onChange:function(){if(selCount===provs.length)setSel({});else{var s={};provs.forEach(function(pr){s[pr.rut]=true;});setSel(s);}}}),w:'30px',c:true,render:function(r){return h('input',{type:'checkbox',checked:!!sel[r.rut],onChange:function(){setSel(function(s){var n=Object.assign({},s);if(n[r.rut])delete n[r.rut];else n[r.rut]=true;return n;});}});}},
          {lbl:'RUT',render:function(r){return h('span',{style:{fontFamily:'monospace',fontSize:11}},r.rut);}},
          {lbl:'Razón Social',render:function(r){return h('strong',{style:{fontSize:12}},r.nombre);}},
          {lbl:'Giro',render:function(r){return h('span',{style:{fontSize:11}},r.giro||'—');}},
          {lbl:'Dirección',render:function(r){return h('span',{style:{fontSize:11}},r.direccion||'—');}},
          status==='done'&&{lbl:'Resultado',render:function(r){var res=results&&results.find(function(x){return x.rut===r.rut;});if(!res)return '—';return res.ok?h(Bg,{c:res.accion==='creado'?'g':'b'},res.accion):h(Bg,{c:'r'},res.error);}}
        ].filter(Boolean),rows:provs,empty:'Sin proveedores'}),
        status==='preview'&&h('div',{style:{display:'flex',justifyContent:'flex-end',gap:6,marginTop:10}},
          h('button',{onClick:p.onClose,style:{padding:'6px 14px',border:'1px solid #CBD5E1',borderRadius:5,cursor:'pointer',fontSize:12}},'Cancelar'),
          h(Btn,{onClick:importar},'Importar '+selCount+' proveedor(es)')
        ),
        status==='done'&&h('div',{style:{display:'flex',justifyContent:'flex-end',marginTop:10}},
          h(Btn,{onClick:p.onClose},'Cerrar')
        )
      )
    )
  );
}

function MasterV(p){
  const[items,setItems]=useState([]);const[modal,setModal]=useState(null);const[q,setQ]=useState('');const[err,setErr]=useState('');const[delErr,setDelErr]=useState('');const[showImport,setShowImport]=useState(false);
  function load(){api('/'+p.ep,'GET',null,p.tok).then(function(r){setItems(Array.isArray(r)?r:[]);}).catch(function(){});}
  useEffect(function(){load();},[p.ep,p.tok]);
  const filtered=useMemo(function(){return items.filter(function(x){return !q||JSON.stringify(Object.values(x)).toLowerCase().includes(q.toLowerCase());});},[items,q]);
  function save(item){
    setErr('');
    const method=item[p.pk]?'PUT':'POST';
    const path='/'+p.ep+(item[p.pk]?'/'+item[p.pk]:'');
    api(path,method,item,p.tok).then(function(){setModal(null);load();}).catch(function(ex){setErr(ex.message);});
  }
  function tog(id){api('/'+p.ep+'/'+id+'/activo','PATCH',{},p.tok).then(function(){load();}).catch(function(){});}
  function del(id){
    if(!window.confirm('Eliminar este registro? Esta accion no se puede deshacer.'))return;
    setDelErr('');
    api('/'+p.ep+'/'+id,'DELETE',null,p.tok).then(function(){load();}).catch(function(ex){setDelErr(ex.message);});
  }

function ImportModal(p){
  const[preview,setPreview]=useState([]);const[errors,setErrors]=useState([]);
  const[importing,setImporting]=useState(false);const[result,setResult]=useState(null);const[step,setStep]=useState('upload');
  function onFile(e){
    const f=e.target.files&&e.target.files[0];if(!f)return;
    setErrors([]);setPreview([]);setResult(null);setStep('upload');
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        if(!rows||rows.length<2){setErrors(['El archivo no tiene datos.']);return;}
        const headers=rows[0].map(function(h){return String(h||'').trim();});
        const campos=p.config.campos;
        const missing=campos.filter(function(c){return c.req&&!headers.includes(c.header);}).map(function(c){return c.header;});
        if(missing.length){setErrors(['Columnas obligatorias faltantes: '+missing.join(', ')]);return;}
        const parsed=rows.slice(1).map(function(row,i){
          const obj={__row:i+2};
          campos.forEach(function(c){const idx2=headers.indexOf(c.header);obj[c.k]=idx2>=0?String(row[idx2]||'').trim():'';});
          return obj;
        }).filter(function(r){return Object.values(r).some(function(v,i2){return i2>0&&v;});});
        const errs=[];const valid=[];
        parsed.forEach(function(r){
          const rowErrs=[];
          campos.forEach(function(c){if(c.req&&!r[c.k])rowErrs.push('Fila '+r.__row+': "'+c.header+'" es obligatorio.');});
          if(rowErrs.length)errs.push(...rowErrs);else valid.push(r);
        });
        setErrors(errs);setPreview(valid);setStep('preview');
      }catch(ex){setErrors(['Error al leer: '+ex.message]);}
    };
    reader.readAsArrayBuffer(f);
  }
  function downloadTemplate(){
    const hs=p.config.campos.map(function(c){return c.header;});
    const ex=p.config.campos.map(function(c){return c.example||'';});
    const ws=XLSX.utils.aoa_to_sheet([hs,[...ex]]);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Plantilla');
    XLSX.writeFile(wb,'plantilla_'+p.config.titulo.toLowerCase().replace(/ /g,'_')+'.xlsx');
  }
  function doImport(){
    setImporting(true);setResult(null);
    Promise.all(preview.map(function(row){
      var body={};
      p.config.campos.forEach(function(c){
        if(c.k==='empresa_rut')return;
        var v=row[c.k];
        if(v===''||v===undefined||v===null){body[c.k]=null;}
        else if(!isNaN(v)&&String(v).trim()!==''&&String(parseInt(v))===String(v).trim()){body[c.k]=parseInt(v);}
        else{body[c.k]=v;}
      });
      if(p.config.resolveEmpresa&&body.empresa_id){
        var empVal=String(body.empresa_id).trim();
        var isPureInt=/^\d+$/.test(empVal);
        if(!isPureInt){
          // It's a RUT — resolve to ID
          return api('/empresas/lookup/rut/'+encodeURIComponent(empVal),'GET',null,p.tok).then(function(r){
            body.empresa_id=r.empresa_id;
            return api('/'+p.config.endpoint,'POST',body,p.tok).then(function(){return{ok:true};});
          }).catch(function(ex){return{ok:false,msg:ex.message||String(ex),row:row.__row};});
        }
        // It's already a numeric ID — use as-is (already cast to int above)
      }
      return api('/'+p.config.endpoint,'POST',body,p.tok).then(function(){return{ok:true};}).catch(function(ex){return{ok:false,msg:ex.message||String(ex),row:row.__row};});
    })).then(function(results){
      const ok=results.filter(function(r){return r.ok;}).length;
      const fail=results.filter(function(r){return !r.ok;});
      setResult({ok,fail});setStep('done');p.onRefresh&&p.onRefresh();
    }).finally(function(){setImporting(false);});
  }
  return h(Modal,{title:'Importar — '+p.config.titulo,onClose:p.onClose},
    h(EB,null,
      h('div',{className:'mb'},
        step==='upload'&&h('div',null,
          h('div',{className:'al al-i',style:{marginBottom:10}},'Descargue la plantilla, completela y subala para importar masivamente.'),
          h(Btn,{v:'g',onClick:downloadTemplate},'⬇ Descargar plantilla Excel'),
          h('hr',{className:'divider'}),
          h(FR,{label:'Archivo Excel (.xlsx) o CSV'},h('input',{type:'file',accept:'.xlsx,.xls,.csv',onChange:onFile,style:{padding:'4px 0'}})),
          errors.length>0&&h('div',{className:'al al-e',style:{marginTop:8}},errors.slice(0,6).join('\n'))

function BarChart(p){
  var data=p.data||[];var ht=p.height||120;var w=p.width||'100%';
  if(!data.length)return h('div',{style:{color:'#94A3B8',fontSize:12,textAlign:'center',padding:16}},'Sin datos');
  var maxVal=Math.max.apply(null,data.map(function(d){return d.value||0;}));
  if(!maxVal)return h('div',{style:{color:'#94A3B8',fontSize:12,textAlign:'center',padding:16}},'Sin datos');
  var barW=Math.max(20,Math.min(60,Math.floor(300/data.length)));
  var gap=4;
  var totalW=data.length*(barW+gap);
  return h('div',{style:{overflowX:'auto'}},
    h('svg',{width:Math.max(totalW,200),height:ht+30,style:{display:'block'}},
      data.map(function(d,i){
        var bh=Math.round(((d.value||0)/maxVal)*ht);
        var x=i*(barW+gap);
        var y=ht-bh;
        var color=p.colors?p.colors[i%p.colors.length]:(d.color||'#3B82F6');
        return h('g',{key:i},
          h('rect',{x:x,y:y,width:barW,height:bh,fill:color,rx:3}),
          h('text',{x:x+barW/2,y:ht+12,textAnchor:'middle',fontSize:9,fill:'#64748B'},
            (d.label||'').substring(0,8)+(d.label&&d.label.length>8?'..':'')),
          bh>14&&h('text',{x:x+barW/2,y:y+11,textAnchor:'middle',fontSize:9,fill:'#fff',fontWeight:600},
            d.value>999?(d.value/1000).toFixed(1)+'k':Math.round(d.value))
        );
      })
    )
  );
}

function DonutChart(p){
  var data=(p.data||[]).filter(function(d){return d.value>0;});
  if(!data.length)return h('div',{style:{color:'#94A3B8',fontSize:12,textAlign:'center',padding:16}},'Sin datos');
  var total=data.reduce(function(s,d){return s+d.value;},0);
  var cx=70,cy=70,r=55,ri=32;
  var colors=['#3B82F6','#F59E0B','#10B981','#EF4444','#8B5CF6','#06B6D4','#F97316'];
  var paths=[];var angle=-Math.PI/2;
  data.forEach(function(d,i){
    var sweep=(d.value/total)*Math.PI*2;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    var xi1=cx+ri*Math.cos(angle-sweep),yi1=cy+ri*Math.sin(angle-sweep);
    var xi2=cx+ri*Math.cos(angle),yi2=cy+ri*Math.sin(angle);
    var large=sweep>Math.PI?1:0;
    paths.push({path:`M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${large},0 ${xi1},${yi1} Z`,color:colors[i%colors.length],label:d.label,pct:Math.round(d.value/total*100)});
  });
  return h('div',{style:{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}},
    h('svg',{width:140,height:140},
      paths.map(function(p2,i){return h('path',{key:i,d:p2.path,fill:p2.color});}),
      h('text',{x:cx,y:cy+5,textAnchor:'middle',fontSize:11,fontWeight:600,fill:'#1E293B'},total>999?(total/1000).toFixed(1)+'k':Math.round(total))
    ),
    h('div',{style:{fontSize:11}},
      paths.map(function(p2,i){return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:4,marginBottom:3}},
        h('div',{style:{width:10,height:10,borderRadius:2,background:p2.color,flexShrink:0}}),
        h('span',{style:{color:'#475569'}},p2.label+': '),
        h('span',{style:{fontWeight:600}},p2.pct+'%')
      );})
    )
  );
}

  const[items,setItems]=useState([]);

  const empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});

  function load(){
    api('/comb/estanques','GET',null,p.tok)
      .then(function(r){setItems(Array.isArray(r)?r:[]);})
      .catch(function(ex){setMsg('Error al cargar: '+ex.message);setIsErr(true);});
  }
  useEffect(load,[p.tok]);

  function openNew(){
    setEditing(null);setMsg('');setIsErr(false);

    setTipoComb('');setCapMax('');setUbic('');setObs('');

    setEditing(r);setMsg('');setIsErr(false);

          }},r.activo?'Inactivar':'Activar'),
          h(Btn,{v:'d',sm:true,onClick:function(){

          }},'Eliminar')
        );}}

function CombCierreQuincenal(p){
  var TODAY=new Date().toISOString().split('T')[0];

  }
  useEffect(function(){loadCierres();loadProvisiorios('');}, [p.tok]);

  function toggleSel(mid){
    setSelMovIds(function(ids){
      return ids.includes(mid)?ids.filter(function(x){return x!==mid;}):[...ids,mid];
    });
  }
  function selectAll(){setSelMovIds(provisorios.map(function(r){return r.mov_id;}));}

  var litrosSelec=provisorios.filter(function(r){return selMovIds.includes(r.mov_id);}).reduce(function(s,r){return s+parseFloat(r.litros||0);},0);

  function calcNetoPorLitro(){
    var ba=parseFloat(form.base_afecta)||0;
    var lts=litrosSelec||parseFloat(form.litros_manual)||0;
    return lts>0?ba/lts:0;
  }

  function crearCierre(){
    setMsg('');setIsErr(false);
    if(!selMovIds.length){setMsg('Seleccione al menos un ingreso provisorio');setIsErr(true);return;}
    if(!form.numero_factura){setMsg('Ingrese el número de factura');setIsErr(true);return;}

      proveedor_id:form.proveedor_id||null,

    });

      setShowForm(false);setSelMovIds([]);

  function loadBase(){

  function loadTraslados(){

    api('/trans/dashboard'+q,'GET',null,p.tok).then(function(r){setDash(r);}).catch(function(){});

  function openEdit(r){
    setSel(r);setForm({fecha:(r.fecha||'').slice(0,10),empresa_id:r.empresa_id||'',camion_id:r.camion_id||'',chofer_id:r.chofer_id||'',faena_id:r.faena_id||'',equipo_id:r.equipo_id||'',origen:r.origen||'',destino:r.destino||'',km_cargado:r.km_cargado||'',km_vacio:r.km_vacio||'0',odometro_inicio:r.odometro_inicio||'',odometro_fin:r.odometro_fin||'',estado:r.estado||'finalizado',observaciones:r.observaciones||'',litros_combustible:r.litros_combustible||'0',estanque_id:r.estanque_id||''});

// ══ PROGRAMACIÓN SEMANAL DE MANO DE OBRA MANTENCIÓN ══
function MantProgView(p){
  var faenas=p.m.faenas||[];
  var equipos=(p.m.equipos||[]).filter(function(e){return e.activo;});
  var DIAS_N=['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
  var MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var[vYear,setVYear]=useState(hoy.getFullYear());
  var[vMonth,setVMonth]=useState(hoy.getMonth());
  var[curWeek,setCurWeek]=useState(0);
  var[items,setItems]=useState([]);
  var[mecanicos,setMecanicos]=useState([]);
  var[showForm,setShowForm]=useState(false);
  var[sel,setSel]=useState(null);
  var[msg,setMsg]=useState('');
  var[fFaena,setFFaena]=useState('');
  var[fEstado,setFEstado]=useState('');
  var[fSearch,setFSearch]=useState('');
  var[conflictos,setConflictos]=useState({});
  var[vista,setVista]=useState('programacion');

  // Generar semanas del mes
  function getWeeks(y,m){
    var weeks=[];var first=new Date(y,m,1);var dow=first.getDay();
    var offset=dow===0?-6:1-dow;
    var startMon=new Date(first);startMon.setDate(first.getDate()+offset);
    for(var w=0;w<6;w++){
      var mon=new Date(startMon);mon.setDate(startMon.getDate()+w*7);
      var sun=new Date(mon);sun.setDate(mon.getDate()+6);
      if(mon.getMonth()>m&&mon.getFullYear()>=y)break;
      if(sun<new Date(y,m,1))continue;
      var days=[];
      for(var d=0;d<7;d++){
        var dt=new Date(mon);dt.setDate(mon.getDate()+d);
        days.push({n:DIAS_N[d],f:String(dt.getDate()).padStart(2,'0')+' '+MESES[dt.getMonth()].slice(0,3),w:dt.getDay()===0||dt.getDay()===6,date:new Date(dt),isPast:dt<hoy,isToday:dt.toISOString().slice(0,10)===hoy.toISOString().slice(0,10)});
      }
      // Número de semana ISO
      var dUTC=new Date(Date.UTC(mon.getFullYear(),mon.getMonth(),mon.getDate()));
      var dayN=dUTC.getUTCDay()||7;dUTC.setUTCDate(dUTC.getUTCDate()+4-dayN);
      var ys=new Date(Date.UTC(dUTC.getUTCFullYear(),0,1));
      var wnum=Math.ceil(((dUTC-ys)/86400000+1)/7);
      weeks.push({label:'S'+wnum+': '+days[0].f+' – '+days[6].f,short:'S'+wnum,days:days,monday:new Date(mon)});
    }
    return weeks;
  }
  var semanas=getWeeks(vYear,vMonth);
  // Find current week on first load
  useEffect(function(){
    var now=new Date();now.setHours(0,0,0,0);
    for(var i=0;i<semanas.length;i++){
      var s=semanas[i];var sun=new Date(s.monday);sun.setDate(s.monday.getDate()+6);
      if(now>=s.monday&&now<=sun){setCurWeek(i);return;}
    }
  },[vYear,vMonth]);

  function load(){
    api('/mant/prog-semanal?anio='+vYear+'&mes='+vMonth,'GET',null,p.tok).then(function(r){setItems(Array.isArray(r)?r:[]);}).catch(function(){});
  }
  function loadMecanicos(){api('/mant/mecanicos','GET',null,p.tok).then(function(r){setMecanicos(Array.isArray(r)?r:[]);}).catch(function(){});}
  useEffect(function(){load();loadMecanicos();},[p.tok,vYear,vMonth]);

  function prevMonth(){var nm=vMonth-1,ny=vYear;if(nm<0){nm=11;ny--;}setVMonth(nm);setVYear(ny);setCurWeek(0);}
  function nextMonth(){var nm=vMonth+1,ny=vYear;if(nm>11){nm=0;ny++;}setVMonth(nm);setVYear(ny);setCurWeek(0);}
  function goToday(){setVYear(hoy.getFullYear());setVMonth(hoy.getMonth());}

  // Crear default dias vacíos
  function emptyDias(){return [[[''],['']],[[''],['']],[[''],['']],[[''],['']],[[''],['']],[[''],['']],[[''],['']]];}
  var emptyForm={faena_id:'',faena_nombre:'',equipo_id:'',cargo_nombre:'',detalle:'',dias:emptyDias(),estado:'programado',semana_idx:curWeek};

  var[form,setForm]=useState(emptyForm);

  function openNew(){
    setSel(null);setForm(Object.assign({},emptyForm,{semana_idx:curWeek}));
    setShowForm(true);setMsg('');loadConflictos(curWeek,null);
  }
  function openEdit(row){
    setSel(row);
    var dias=row.dias||emptyDias();
    // Asegurar estructura correcta
    while(dias.length<7)dias.push([[''],['']]);
    dias=dias.map(function(d){if(!Array.isArray(d))return[[''],['']];while(d.length<2)d.push(['']);return d.map(function(t){return Array.isArray(t)?t:[''];});});
    setForm({faena_id:row.faena_id||'',faena_nombre:row.faena_nombre||'',equipo_id:row.equipo_id||'',cargo_nombre:row.cargo_nombre||row.equipo_codigo||'',detalle:row.detalle||'',dias:dias,estado:row.estado||'programado',semana_idx:row.semana_idx});
    setShowForm(true);setMsg('');loadConflictos(row.semana_idx,row.prog_id);
  }

  function loadConflictos(weekIdx,exclId){
    var q='?anio='+vYear+'&mes='+vMonth+'&semana_idx='+weekIdx;
    if(exclId)q+='&excluir_id='+exclId;
    api('/mant/prog-semanal/conflictos'+q,'GET',null,p.tok).then(function(r){setConflictos(r||{});}).catch(function(){});
  }

  function upd(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}
  function updDia(di,ti,mi,val){
    setForm(function(f){
      var dias=JSON.parse(JSON.stringify(f.dias));
      if(!dias[di])dias[di]=[[''],['']];
      if(!dias[di][ti])dias[di][ti]=[''];
      dias[di][ti][mi]=val;
      return Object.assign({},f,{dias:dias});
    });
  }
  function addMec(di,ti){
    setForm(function(f){
      var dias=JSON.parse(JSON.stringify(f.dias));
      if(!dias[di])dias[di]=[[''],['']];
      if(!dias[di][ti])dias[di][ti]=[''];
      dias[di][ti].push('');
      return Object.assign({},f,{dias:dias});
    });
  }
  function rmMec(di,ti,mi){
    setForm(function(f){
      var dias=JSON.parse(JSON.stringify(f.dias));
      dias[di][ti].splice(mi,1);
      if(dias[di][ti].length===0)dias[di][ti]=[''];
      return Object.assign({},f,{dias:dias});
    });
  }

  function guardar(){
    if(!form.cargo_nombre&&!form.equipo_id){setMsg('Seleccione un equipo o ingrese cargo');return;}
    var semInicio=semanas[form.semana_idx]?semanas[form.semana_idx].monday.toISOString().slice(0,10):null;
    // Limpiar dias: quitar entradas vacías
    var diasClean=form.dias.map(function(d){return d.map(function(t){return t.filter(function(m){return m&&m.trim();});});});
    var body=Object.assign({},form,{anio:vYear,mes:vMonth,semana_inicio:semInicio,dias:diasClean});
    // Auto-rellenar cargo_nombre desde equipo si vacío
    if(!body.cargo_nombre&&body.equipo_id){
      var eq=equipos.find(function(e){return String(e.equipo_id)===String(body.equipo_id);});
      if(eq)body.cargo_nombre=eq.nombre||eq.codigo;
    }
    // Auto-rellenar faena_nombre desde faena si vacío
    if(!body.faena_nombre&&body.faena_id){
      var fa=faenas.find(function(f){return String(f.faena_id)===String(body.faena_id);});
      if(fa)body.faena_nombre=fa.nombre;
    }
    var url=sel?'/mant/prog-semanal/'+sel.prog_id:'/mant/prog-semanal';
    var method=sel?'PUT':'POST';
    api(url,method,body,p.tok).then(function(){setShowForm(false);load();}).catch(function(e){setMsg('Error: '+e.message);});
  }
  function eliminar(id){if(!confirm('¿Eliminar esta tarea?'))return;api('/mant/prog-semanal/'+id,'DELETE',null,p.tok).then(load).catch(function(e){alert(e.message);});}
  function cambiarEstado(id,est){api('/mant/prog-semanal/'+id,'PUT',Object.assign({},items.find(function(t){return t.prog_id===id;}),{estado:est}),p.tok).then(load).catch(function(){});}

  // Filtrar por semana actual y filtros
  var filtered=items.filter(function(t){return parseInt(t.semana_idx)===curWeek;});
  if(fFaena)filtered=filtered.filter(function(t){return String(t.faena_id)===String(fFaena);});

// ══ PLANIFICACIÓN DE TRASLADOS ══
function PlanificacionView(p){
  var empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  var faenas=p.m.faenas||[];
  var personal=(p.m.personal||[]).filter(function(x){return x.activo;});
  var equipos=(p.m.equipos||[]).filter(function(e){return e.activo;});
  var camiones=equipos.filter(function(e){return e.es_transporte;});
  var choferes=personal.filter(function(x){return x.es_transporte;});

  var[vista,setVista]=useState('calendario'); // calendario | agenda
  var[mes,setMes]=useState(new Date().toISOString().slice(0,7)); // YYYY-MM
  var[items,setItems]=useState([]);
  var[filtChofer,setFiltChofer]=useState('');
  var[filtEstado,setFiltEstado]=useState('');
  var[showForm,setShowForm]=useState(false);
  var[sel,setSel]=useState(null);
  var[solape,setSolape]=useState(null);
  var[msg,setMsg]=useState('');

  var emptyForm={fecha_plan:'',hora_plan:'',empresa_id:'',camion_id:'',chofer_id:'',faena_id:'',equipo_id:'',origen:'',destino:'',km_cargado_plan:'',km_vacio_plan:'',prioridad:'normal',estado:'pendiente',observaciones:''};
  var[form,setForm]=useState(emptyForm);

  function load(){
    var y=parseInt(mes.slice(0,4)),mm=parseInt(mes.slice(5,7));
    var desde=mes+'-01';
    var ult=new Date(y,mm,0).getDate();
    var hasta=mes+'-'+String(ult).padStart(2,'0');
    var q='?desde='+desde+'&hasta='+hasta;
    if(filtChofer)q+='&chofer_id='+filtChofer;
    if(filtEstado)q+='&estado='+filtEstado;
    api('/trans/planificacion'+q,'GET',null,p.tok).then(function(r){setItems(Array.isArray(r)?r:[]);}).catch(function(){});
  }
  useEffect(load,[p.tok,mes,filtChofer,filtEstado]);

  function upd(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}
  function openNew(fechaPre){
    setSel(null);
    setForm(Object.assign({},emptyForm,{fecha_plan:fechaPre||new Date().toISOString().slice(0,10)}));
    setSolape(null);setMsg('');setShowForm(true);
  }
  function openEdit(row){
    setSel(row);
    setForm({
      fecha_plan:(row.fecha_plan+'').slice(0,10),
      hora_plan:row.hora_plan?row.hora_plan.slice(0,5):'',
      empresa_id:row.empresa_id||'',camion_id:row.camion_id||'',chofer_id:row.chofer_id||'',
      faena_id:row.faena_id||'',equipo_id:row.equipo_id||'',
      origen:row.origen||'',destino:row.destino||'',
      km_cargado_plan:row.km_cargado_plan||'',km_vacio_plan:row.km_vacio_plan||'',
      prioridad:row.prioridad||'normal',estado:row.estado||'pendiente',
      observaciones:row.observaciones||''
    });
    setSolape(null);setMsg('');setShowForm(true);
  }

  // Validar solape al cambiar chofer/fecha
  useEffect(function(){
    if(!form.chofer_id||!form.fecha_plan){setSolape(null);return;}
    var q='?fecha='+form.fecha_plan+'&chofer_id='+form.chofer_id;
    if(sel)q+='&plan_id='+sel.plan_id;
    api('/trans/planificacion/check-solape'+q,'GET',null,p.tok).then(function(r){
      if(r&&r.solape)setSolape(r.traslados);else setSolape(null);
    }).catch(function(){});
  },[form.chofer_id,form.fecha_plan]);

  function guardar(){
    if(!form.fecha_plan){setMsg('Fecha obligatoria');return;}
    if(!form.chofer_id||!form.camion_id){setMsg('Chofer y camión son obligatorios');return;}

    var tipoRaw=(pers.tipo_contrato||'').toUpperCase().trim();

// ── Vista de Anexos ──
function AnexosView(p){
  var lblS={fontSize:11,fontWeight:600,display:'block',marginBottom:3,color:'#475569'};
  var inpS={width:'100%',padding:'7px 10px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:12,boxSizing:'border-box'};
  var faenas=(p.m.faenas||[]).filter(function(f){return f.activo;});
  var[anexos,setAnexos]=useState([]);
  var[modo,setModo]=useState('individual'); // individual | masivo | listar
  var[showForm,setShowForm]=useState(false);
  var[fPersona,setFPersona]=useState('');
  // Form individual
  var emptyClausula={numero:'SEGUNDA',titulo:'Lugar de Trabajo',texto:''};
  var emptyForm={persona_id:'',empresa_id:'',fecha_anexo:new Date().toISOString().slice(0,10),lugar_firma:'Nacimiento',clausulas:[Object.assign({},emptyClausula)],observaciones:''};
  var[form,setForm]=useState(emptyForm);
  // Form masivo
  var[masivoForm,setMasivoForm]=useState({faena_id:'',empresa_id:'',fecha_anexo:new Date().toISOString().slice(0,10),lugar_firma:'Nacimiento',fundo:'',propiedad:'Forestal Mininco Spa.',comuna:'',region:''});
  var[selPersonas,setSelPersonas]=useState([]);
  var[formatoSalida,setFormatoSalida]=useState('word'); // 'word' o 'pdf'

  function loadAnexos(){
    var qs=fPersona?'?persona_id='+fPersona:'';
    api('/anexos'+qs,'GET',null,p.tok).then(function(r){setAnexos(Array.isArray(r)?r:[]);}).catch(function(){});
  }
  useEffect(function(){loadAnexos();},[p.tok,fPersona]);

  function uIndi(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}
  function uClausula(idx,k,v){setForm(function(f){var arr=f.clausulas.slice();arr[idx]=Object.assign({},arr[idx],{[k]:v});return Object.assign({},f,{clausulas:arr});});}
  function addClausula(){setForm(function(f){return Object.assign({},f,{clausulas:f.clausulas.concat([Object.assign({},emptyClausula,{numero:'',titulo:'',texto:''})])});});}
  function removeClausula(idx){setForm(function(f){var arr=f.clausulas.slice();arr.splice(idx,1);return Object.assign({},f,{clausulas:arr});});}
  function uMas(k,v){setMasivoForm(function(f){return Object.assign({},f,{[k]:v});});}

  // Personal filtrado por faena para selección masiva
  var personalFaena=masivoForm.faena_id?p.personal.filter(function(x){return String(x.faena_id)===String(masivoForm.faena_id);}):[];
  // Faenas filtradas por empresa seleccionada
  var faenasEmpresa=masivoForm.empresa_id?faenas.filter(function(f){return String(f.empresa_id)===String(masivoForm.empresa_id);}):[];

  function toggleSel(pid){setSelPersonas(function(arr){return arr.indexOf(pid)>=0?arr.filter(function(x){return x!==pid;}):arr.concat([pid]);});}
  function selectAll(){setSelPersonas(personalFaena.map(function(x){return x.persona_id;}));}
  function selectNone(){setSelPersonas([]);}

  function guardarIndividual(){
    if(!form.persona_id||!form.empresa_id){alert('Trabajador y empresa son obligatorios');return;}
    if(!form.clausulas.length||form.clausulas.some(function(c){return !c.numero||!c.texto;})){alert('Cada cláusula debe tener número y texto');return;}
    api('/anexos','POST',form,p.tok).then(function(r){
      alert('✅ Anexo creado');
      setShowForm(false);setForm(emptyForm);loadAnexos();
      // Auto-generar el documento en el formato seleccionado
      if(r.creados&&r.creados.length)setTimeout(function(){generarAnexoDoc(r.creados[0],formatoSalida);},300);
    }).catch(function(e){alert('Error: '+e.message);});
  }
  function guardarMasivo(){
    if(!masivoForm.faena_id||!masivoForm.empresa_id){alert('Faena y empresa son obligatorias');return;}
    if(!selPersonas.length){alert('Seleccione al menos un trabajador');return;}
    if(!masivoForm.fundo){alert('Ingrese el nombre del fundo');return;}
    var texto='Se establece como lugar de trabajo: Fundo '+masivoForm.fundo+', de propiedad '+masivoForm.propiedad+', comuna de '+masivoForm.comuna+', región de '+masivoForm.region+'.';
    var body={
      empresa_id:masivoForm.empresa_id,
      fecha_anexo:masivoForm.fecha_anexo,
      lugar_firma:masivoForm.lugar_firma,
      persona_ids:selPersonas,
      clausulas:[{numero:'SEGUNDA',titulo:'Lugar de Trabajo',texto:texto}],
      observaciones:'Generación masiva — Faena: '+(faenas.find(function(f){return String(f.faena_id)===String(masivoForm.faena_id);})||{}).nombre
    };
    api('/anexos','POST',body,p.tok).then(function(r){
      alert('✅ Se crearon '+r.total+' anexos. Generando documento combinado en '+(formatoSalida==='pdf'?'PDF':'Word')+'...');
      setSelPersonas([]);loadAnexos();
      if(r.creados&&r.creados.length){
        // Cargar todos los anexos creados y combinarlos en un solo documento
        Promise.all(r.creados.map(function(id){return api('/anexos/'+id,'GET',null,p.tok);}))
          .then(function(anexos){
            generarDocCombinado(anexos,formatoSalida);
          })
          .catch(function(e){alert('Error al generar combinado: '+e.message);});
      }
    }).catch(function(e){alert('Error: '+e.message);});
  }
  // Generar un solo archivo con todos los anexos (uno por página)
  function generarDocCombinado(anexos,formato){
    var bodies=anexos.map(function(a,i){
      var html=buildAnexoHTML(a);
      // Extraer solo el contenido entre <body> y </body>
      var m=html.match(/<body>([\s\S]*?)<\/body>/);
      var inner=m?m[1]:html;
      // Wrapper con salto de página entre anexos
      return '<div class="anexo-page" style="'+(i>0?'page-break-before:always;':'')+'">'+inner+'</div>';
    }).join('');
    var fullHTML='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Anexos combinados</title>'+
      '<style>body{font-family:Calibri,Arial,sans-serif;font-size:12pt;line-height:1.5;margin:2cm;color:#000}'+
      'h2{text-align:center;font-size:14pt;margin-bottom:20px}'+
      'p{text-align:justify;margin:8px 0}'+
      '.firmas{margin-top:60px;width:100%;border-collapse:collapse}'+
      '.firmas td{width:50%;text-align:center;padding:30px 10px 10px;border-top:1px solid #000;font-size:10pt;vertical-align:top}'+
      '.anexo-page{page-break-after:always}'+
      '.anexo-page:last-child{page-break-after:auto}'+
      '@media print{body{margin:1.5cm}}</style></head><body>'+
      bodies+
      '</body></html>';
    var fecha=new Date().toISOString().slice(0,10).replace(/-/g,'');
    var faenaNombre=((faenas.find(function(f){return String(f.faena_id)===String(masivoForm.faena_id);})||{}).nombre||'masivo').replace(/\s+/g,'_');
    var nombre='Anexos_'+faenaNombre+'_'+fecha;
    if(formato==='pdf'){
      var w=window.open('','_blank');
      if(!w){alert('Permita popups para generar el PDF');return;}
      w.document.write(fullHTML);w.document.close();
      w.document.title=nombre;
      setTimeout(function(){w.focus();w.print();},700);
    }else{
      var blob=new Blob(['\ufeff'+fullHTML],{type:'application/msword;charset=utf-8'});
      var url=URL.createObjectURL(blob);
      var link=document.createElement('a');
      link.href=url;link.download=nombre+'.doc';
      document.body.appendChild(link);link.click();
      setTimeout(function(){document.body.removeChild(link);URL.revokeObjectURL(url);},100);
    }
  }

  function eliminarAnexo(id){
    if(!confirm('¿Eliminar este anexo?'))return;
    api('/anexos/'+id,'DELETE',null,p.tok).then(function(){loadAnexos();}).catch(function(e){alert(e.message);});
  }

  function generarAnexoDoc(anexoId,formato){
    api('/anexos/'+anexoId,'GET',null,p.tok).then(function(a){
      var html=buildAnexoHTML(a);
      var nombre=(a.nombre_completo||'anexo').replace(/\s+/g,'_');
      var fecha=(a.fecha_anexo+'').slice(0,10).replace(/-/g,'');
      if(formato==='pdf'){
        var w=window.open('','_blank');
        if(!w){alert('Permita popups');return;}
        w.document.write(html);w.document.close();
        w.document.title='Anexo_'+nombre+'_'+fecha;
        setTimeout(function(){w.focus();w.print();},500);
      }else{
        var blob=new Blob(['\ufeff'+html],{type:'application/msword;charset=utf-8'});
        var url=URL.createObjectURL(blob);
        var link=document.createElement('a');
        link.href=url;link.download='Anexo_'+nombre+'_'+fecha+'.doc';
        document.body.appendChild(link);link.click();
        setTimeout(function(){document.body.removeChild(link);URL.revokeObjectURL(url);},100);
      }
    }).catch(function(e){alert(e.message);});
  }

  return h('div',null,
    // Sub-tabs
    h('div',{style:{display:'flex',gap:6,marginBottom:12}},
      [{k:'individual',l:'➕ Anexo Individual'},{k:'masivo',l:'📦 Generación Masiva'},{k:'listar',l:'📋 Listado de Anexos'}].map(function(t){
        return h('button',{key:t.k,onClick:function(){setModo(t.k);},
          style:{padding:'6px 14px',borderRadius:5,fontSize:11,cursor:'pointer',border:'1px solid #CBD5E1',background:modo===t.k?'#F59E0B':'#F8FAFC',color:modo===t.k?'#fff':'#475569',fontWeight:600}},t.l);
      })
    ),
    // INDIVIDUAL
    modo==='individual'&&h('div',{className:'card'},
      h('div',{style:{fontSize:13,fontWeight:700,marginBottom:10,color:'#92400E'}},'Generar anexo para un trabajador'),

// ── Builder HTML del anexo ──
function buildAnexoHTML(a){
  var cs=Array.isArray(a.clausulas)?a.clausulas:[];
  var fechaTxt=fmtFechaLarga(a.fecha_anexo);
  var nClausulas=cs.length===1?'la siguiente cláusula':'las siguientes cláusulas';
  var clausulasHTML=cs.map(function(c){
    return '<p><strong>Cláusula '+(c.numero||'')+(c.titulo?' — '+c.titulo:'')+':</strong></p><p>'+(c.texto||'')+'</p>';
  }).join('');
  var logo=a.logo_base64?'<img src="'+a.logo_base64+'" style="max-height:80px;max-width:200px;margin-bottom:10px"/>':'';
  // Firma del empleador encima de la línea
  var firmaEmp=a.firma_representante?'<img src="'+a.firma_representante+'" style="max-height:70px;max-width:160px;display:block;margin:0"/>':'';
  // Timbre debajo de los datos del empleador
  var timbreEmp=a.timbre_empresa?'<div style="margin-top:8px"><img src="'+a.timbre_empresa+'" style="max-height:70px;max-width:170px"/></div>':'';
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Anexo Contrato</title>'+
    '<style>body{font-family:Calibri,Arial,sans-serif;font-size:12pt;line-height:1.5;margin:2cm;color:#000}'+
    'h2{text-align:center;font-size:14pt;margin-bottom:20px}'+
    'p{text-align:justify;margin:8px 0}'+
    '.firmas-tbl{margin-top:20px;width:100%;border-collapse:collapse}'+
    '.firmas-tbl td{width:50%;vertical-align:top;padding:0 5px}'+
    '.firma-img-area{height:90px;display:block}'+
    '.firma-line{border-top:1px solid #000;padding-top:6px;font-size:11pt;line-height:1.4}'+
    '@media print{body{margin:1.5cm}}</style></head><body>'+
    logo+
    '<h2>ANEXO CONTRATO DE TRABAJO</h2>'+
    '<p>En <strong>'+(a.lugar_firma||'Nacimiento')+'</strong>, a <strong>'+fechaTxt+'</strong>, entre <strong>'+(a.empresa_nombre||'')+'</strong>, RUT <strong>'+(a.empresa_rut||'')+'</strong>'+
    (a.representante_nombre?', representada legalmente por don/a <strong>'+a.representante_nombre+'</strong>'+(a.representante_rut?', Cédula Nacional de Identidad <strong>'+a.representante_rut+'</strong>':''):'')+
    ', en adelante "el Empleador" o "la Empresa", y don/a <strong>'+(a.nombre_completo||'')+'</strong>, Cédula Nacional de Identidad <strong>'+(a.rut||'')+'</strong>, en adelante indistintamente el "trabajador", se acuerda lo siguiente:</p>'+
    '<p><strong>PRIMERO: Antecedentes</strong></p>'+
    '<p>Con fecha '+(a.fecha_contrato_original?fmtFechaLarga(a.fecha_contrato_original):fechaTxt)+' las partes celebraron un contrato de trabajo en virtud del cual don/a '+(a.nombre_completo||'')+' ha prestado sus servicios en calidad de '+((a.funcion_original||a.cargo||'').toUpperCase())+' para la Empresa, en adelante "el Contrato de Trabajo".</p>'+
    '<p><strong>SEGUNDO: Modificación al Contrato de Trabajo</strong></p>'+
    '<p>Las partes acuerdan que a contar de esta fecha modificar '+nClausulas+':</p>'+
    clausulasHTML+
    '<p><strong>TERCERO: Final</strong></p>'+
    '<p>En todo lo no modificado por el presente instrumento, seguirá rigiendo el Contrato de Trabajo.</p>'+
    '<p>El presente instrumento se firma en dos ejemplares del mismo tenor, quedando uno en poder de cada parte.</p>'+
    '<table class="firmas-tbl"><tr>'+
      '<td>'+

    '</tr></table>'+
    '</body></html>';

function fmtFechaLarga(f){
  if(!f)return'';
  if(f instanceof Date){
    if(isNaN(f.getTime()))return '';
    var meses0=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return f.getDate()+' de '+meses0[f.getMonth()]+' de '+f.getFullYear();
  }
  var s=String(f).slice(0,10); // toma solo YYYY-MM-DD aunque venga timestamp
  var d=new Date(s+'T00:00:00');
  if(isNaN(d.getTime()))return '';
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
}

      h('div',{style:{display:'flex',justifyContent:'flex-end',gap:6,marginTop:8}},
        h(Btn,{v:'g',onClick:function(){setShowForm(false);}},null,'Cancelar'),

        {lbl:'',render:function(r){return h('div',{style:{display:'flex',gap:4}},h(Btn,{v:'a',sm:true,onClick:function(){openEdit(r);}},null,'✏'),h(Btn,{v:'r',sm:true,onClick:function(){eliminar(r.funcion_id);}},null,'🗑'));}}

}

// ── Generador de HTML del contrato (convertible a Word) ──
function buildContratoHTML(c,empresa,persona){
  // Normalizar fecha a YYYY-MM-DD (maneja string, Date y objetos de PG)
  function norm(f){if(!f)return '';var s=(typeof f==='string')?f:(f.toISOString?f.toISOString():(f+''));return s.slice(0,10);}
  function fd(f){var s=norm(f);if(!s||s.length<10)return '';var y=parseInt(s.slice(0,4)),mo=parseInt(s.slice(5,7))-1,da=parseInt(s.slice(8,10));var m=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];if(isNaN(y)||isNaN(mo)||isNaN(da))return '';return da+' de '+m[mo]+' del año '+y;}
  function fc(f){var s=norm(f);if(!s||s.length<10)return '';return s.slice(8,10)+'/'+s.slice(5,7)+'/'+s.slice(0,4);}
  function num2palabras(n){
    if(!n||n==0)return 'Cero';
    var u=['','Uno','Dos','Tres','Cuatro','Cinco','Seis','Siete','Ocho','Nueve','Diez','Once','Doce','Trece','Catorce','Quince','Dieciséis','Diecisiete','Dieciocho','Diecinueve','Veinte'];
    var d=['','','Veinti','Treinta','Cuarenta','Cincuenta','Sesenta','Setenta','Ochenta','Noventa'];
    var cc=['','Ciento','Doscientos','Trescientos','Cuatrocientos','Quinientos','Seiscientos','Setecientos','Ochocientos','Novecientos'];
    function leer3(n){
      if(n===0)return '';if(n===100)return 'Cien';
      var r='';if(n>=100){r+=cc[Math.floor(n/100)]+(n%100?' ':'');n%=100;}
      if(n<=20){r+=u[n];}else if(n<30){r+=d[2]+(n%10?(u[n%10].toLowerCase()):'');}else{r+=d[Math.floor(n/10)]+(n%10?' y '+u[n%10]:'');}
      return r.trim();
    }
    n=Math.round(n);var r='';
    if(n>=1000000){var mill=Math.floor(n/1000000);r+=(mill===1?'Un Millón':leer3(mill)+' Millones')+' ';n%=1000000;}
    if(n>=1000){var mil=Math.floor(n/1000);r+=(mil===1?'Mil':leer3(mil)+' Mil')+' ';n%=1000;}
    if(n>0)r+=leer3(n);
    return r.trim()||'Cero';
  }
  function money(v){v=Math.round(parseFloat(v)||0);return '$'+v.toLocaleString('es-CL')+'.- ('+num2palabras(v)+' Pesos)';}

  // Empresa: datos por defecto del grupo si faltan
  var rep=empresa.representante_nombre||'LEONIDAS FERNANDO POO ZENTENO';
  var repRut=empresa.representante_rut||'8.413.067-2';
  var empDir=empresa.direccion||'Avda. Julio Hemmelmann N° 127';
  var empComuna=empresa.comuna||'Nacimiento';
  var empRegion=empresa.region||'VIII del Bio Bio';

  // Cláusula de duración según tipo
  var tipoTxt='';
  if(c.tipo_contrato==='indefinido'){
    tipoTxt='El presente contrato tendrá el carácter de <strong>INDEFINIDO</strong>, a partir del '+fd(c.fecha_inicio)+', pudiendo ponérsele término de conformidad a las causales señaladas en la legislación vigente.';
  } else if(c.tipo_contrato==='plazo_fijo'){
    tipoTxt='El presente contrato tendrá el carácter de <strong>PLAZO FIJO</strong>, con fecha de inicio el '+fd(c.fecha_inicio)+' y fecha de término el '+fd(c.fecha_termino)+', pudiendo ponérsele término de conformidad a las causales señaladas en la legislación vigente.';
  } else {
    tipoTxt='El presente contrato tendrá el carácter de <strong>POR OBRA O FAENA</strong>, con fecha de inicio el '+fd(c.fecha_inicio)+' y hasta el término de la faena forestal para la cual el Trabajador ha sido contratado según anexo de contrato de trabajo. Podrá ponérsele término de conformidad a las causales señaladas en la legislación vigente.';
  }

  // Cláusula de jornada según tipo
  var jornadaTxt='';
  var jt=c.jornada_tipo||'normal';
  if(jt==='art22'){
    jornadaTxt='En conformidad con lo dispuesto en el artículo 22 inciso segundo del Código del Trabajo, las partes declaran que el Trabajador se encuentra excluido de la limitación de jornada ordinaria de trabajo, por cuanto ejerce sus funciones sin fiscalización inmediata respecto del cumplimiento de su horario, debido a la naturaleza de sus labores, las cuales se desarrollan con autonomía y sin sujeción a un horario fijo.';
  } else if(jt==='excepcional'){
    jornadaTxt=c.jornada_texto||'La jornada de trabajo será en turnos rotativos de 7 días de trabajo por 7 días de descanso, en horario de 07:00 a 12:00 hrs. en la mañana y de 14:00 a 19:00 hrs. en la tarde. Esta podrá modificarse de acuerdo a las necesidades de la mandante.';
  } else {
    jornadaTxt='La jornada de trabajo será de '+(c.jornada_horas||44)+' horas semanales, distribuidas '+(c.jornada_texto||'de lunes a jueves de 07:00 a 12:00 hrs. y de 14:00 a 18:00 hrs., y viernes de 07:00 a 12:00 hrs. y de 14:00 a 17:00 hrs., destinando 60 minutos diarios para colación')+'. Esta podrá modificarse de acuerdo a las necesidades de la mandante.';
  }

  var lugarPrestacion=c.lugar_prestacion||('las dependencias de la empresa, ubicadas en '+empDir+', comuna de '+empComuna+'. El Trabajador, además, prestará servicios en los distintos predios o fundos donde la empresa ejecute faenas forestales dentro de la Región del Biobío u otras zonas similares. El fundo específico será informado mediante anexo de contrato, pudiendo actualizarse de igual forma según los cambios operativos, sin que ello constituya modificación esencial del contrato');

  // Remuneración — tabla compacta con columnas de ancho fijo
  var remuRows=[];
  remuRows.push('<tr><td style="width:55%"><strong>Sueldo Base Mensual</strong></td><td style="width:45%;text-align:right">'+money(c.sueldo_base)+'</td></tr>');
  if(parseFloat(c.bono_responsabilidad)>0)remuRows.push('<tr><td style="width:55%"><strong>Bono de Responsabilidad</strong></td><td style="width:45%;text-align:right">'+money(c.bono_responsabilidad)+'</td></tr>');
  if(parseFloat(c.bono_produccion_fijo)>0)remuRows.push('<tr><td style="width:55%"><strong>Bono de Producción Fijo</strong></td><td style="width:45%;text-align:right">'+money(c.bono_produccion_fijo)+'</td></tr>');
  var remuTable='<table style="width:100%;border-collapse:collapse;margin:4px 0;table-layout:fixed"><colgroup><col style="width:55%"><col style="width:45%"></colgroup><tbody>'+remuRows.join('')+'</tbody></table>';

  var bonoVarTxt='';
  if(c.bono_produccion_variable){
    var detalle=c.bono_produccion_detalle||'la producción mensual efectivamente realizada';
    var tarifa=parseFloat(c.bono_produccion_tarifa)||0;
    bonoVarTxt='<p><strong>Bono de Producción Variable:</strong> se pagará según '+detalle+', a razón de '+money(tarifa)+' por unidad producida, liquidándose mensualmente según la producción efectiva del trabajador.</p>';
    if(c.semana_corrida){
      bonoVarTxt+='<p><strong>Semana Corrida:</strong> dado que el trabajador percibe remuneración variable, se le pagará la semana corrida conforme al artículo 45 del Código del Trabajo, calculada sobre las remuneraciones variables devengadas en el período de pago.</p>';
    }
  }

  // No imponibles — inline compacto
  var noImp=[];
  if(parseFloat(c.asig_colacion)>0)noImp.push('Colación '+money(c.asig_colacion));
  if(parseFloat(c.asig_movilizacion)>0)noImp.push('Movilización '+money(c.asig_movilizacion));
  if(parseFloat(c.asig_viatico)>0)noImp.push('Viático '+money(c.asig_viatico));
  var noImpTxt=noImp.length>0?'<p><strong>Haberes no imponibles:</strong> '+noImp.join('; ')+'.</p>':'';

  // Beneficios — compactos
  var benefs=[];
  if(c.tiene_alimentacion){
    // Limpiar detalle de frases de costo previamente guardadas para evitar duplicación
    var ali=(c.alimentacion_detalle||'tres comidas preparadas según dieta');
    ali=ali.replace(/[,.]?\s*(esta\s+no\s+tendr[aá]\s+costo[^.,]*|sin\s+costo\s+para\s+el\s+trabajador)[.,]?/gi,'').replace(/[,.\s]+$/,'').trim();
    benefs.push('El Trabajador recibirá alimentación diaria consistente en '+ali+', sin costo para el trabajador.');
  }
  if(c.otros_beneficios)benefs.push(c.otros_beneficios);

  // Numeración dinámica de cláusulas
  var n=4;var cNum=['CUARTA','QUINTA','SEXTA','SÉPTIMA','OCTAVA'];
  var numRemu=cNum[0];n++;
  var numBen=benefs.length>0?cNum[n-4]:null;if(benefs.length>0)n++;
  var numDur=cNum[n-4];n++;
  var numRegl=cNum[n-4];n++;
  var numFirma=cNum[n-4];

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Contrato de Trabajo</title>'+
    '<style>'+
    '@page{size:letter;margin:1.8cm 2cm}'+
    'body{font-family:Arial,sans-serif;font-size:10.5pt;line-height:1.35;margin:0;color:#000}'+
    '.hdr{display:table;width:100%;margin-bottom:10px;border-bottom:2px solid #1E3A2D;padding-bottom:8px}'+
    '.hdr-logo{display:table-cell;width:90px;vertical-align:middle}'+
    '.hdr-logo img{max-width:80px;max-height:80px}'+
    '.hdr-title{display:table-cell;vertical-align:middle;text-align:center}'+
    '.hdr-title h1{font-size:14pt;margin:0;letter-spacing:2px;color:#1E3A2D}'+
    '.hdr-title .sub{font-size:11pt;font-weight:700;color:#9A3412;margin-top:4px;letter-spacing:1px}'+
    '.hdr-right{display:table-cell;width:90px}'+
    'p{text-align:justify;margin:5px 0;text-indent:0}'+
    'table{margin:3px 0}td{padding:2px 0;font-size:10.5pt}'+
    '.sig{margin-top:36px;width:100%;border-collapse:collapse}'+
    '.sig td{width:50%;text-align:center;vertical-align:top;padding:30px 10px 0}'+
    '.sig .line{border-top:1px solid #000;padding-top:4px;margin-top:30px;font-size:9.5pt}'+
    '</style></head><body>'+
    '<div class="hdr">'+
      '<div class="hdr-logo">'+(empresa.logo_base64?'<img src="'+empresa.logo_base64+'" alt="logo">':'<div style="width:80px;height:80px;background:#1E3A2D;border-radius:10px;color:#D4C5A9;text-align:center;line-height:80px;font-size:32px;font-weight:700">LP</div>')+'</div>'+
      '<div class="hdr-title"><h1>CONTRATO DE TRABAJO</h1>'+(c.es_actualizacion?'<div class="sub">ACTUALIZACIÓN DE CONTRATO</div>':'')+'</div>'+
      '<div class="hdr-right"></div>'+
    '</div>'+
    '<p>En '+(c.lugar_firma||'Nacimiento')+', a '+fd(c.fecha_contrato)+', entre la empresa <strong>'+(empresa.razon_social||'')+'</strong>, Rol Único Tributario N° '+(empresa.rut||'')+', representada por don <strong>'+rep+'</strong>, cédula nacional de identidad N° '+repRut+', con domicilio en '+empDir+', comuna de '+empComuna+', Región de '+empRegion+', en adelante «el Empleador»; y don/doña <strong>'+(persona.nombre_completo||'')+'</strong>, de nacionalidad '+(persona.nacionalidad||'Chileno(a)')+', cédula nacional de identidad N° '+(persona.rut||'')+', de estado civil '+(persona.estado_civil||'')+', fecha de nacimiento '+fc(persona.fecha_nacimiento)+', domiciliado en '+(persona.direccion||'')+', comuna de '+(persona.comuna||'')+', Región '+(persona.region||'VIII del Bio Bio')+', en adelante «el Trabajador»; capaces de celebrar contrato de trabajo, han convenido lo siguiente:</p>'+
    '<p><strong>PRIMERA. FUNCIÓN O LABOR.</strong> El Trabajador se compromete a desempeñar el cargo de <strong>'+(persona.cargo||'')+'</strong>. El Trabajador deberá ejecutar la labor de '+(c.funcion_texto||'').replace(/\.$/,'')+'. Se eleva a la calidad de esencial del presente contrato la condición de que el Trabajador sea considerado una persona íntegra e intachable, de modo tal que cualquier falta de honestidad o probidad se considerará falta gravísima y causal de terminación inmediata del contrato.</p>'+
    '<p><strong>SEGUNDA. LUGAR DE PRESTACIÓN DE SERVICIOS.</strong> El Trabajador prestará sus servicios en '+lugarPrestacion+'.</p>'+
    '<p><strong>TERCERA. JORNADA DE TRABAJO.</strong> '+jornadaTxt+'</p>'+
    '<p><strong>'+numRemu+'. REMUNERACIONES.</strong> La remuneración mensual del Trabajador será la siguiente:</p>'+
    remuTable+
    bonoVarTxt+
    noImpTxt+
    '<p>Las remuneraciones serán liquidadas y pagadas por períodos vencidos, mediante transferencia electrónica a la cuenta bancaria del Trabajador, los días 15 del mes siguiente al que se devengaron.</p>'+
    '<p>El Trabajador recibirá una gratificación legal anual, pagada mensualmente en la forma establecida en el artículo 50 del Código del Trabajo, equivalente a una doceava parte de 4,75 ingresos mínimos mensuales. El Empleador hace uso expreso de esta modalidad, no procediendo el pago de gratificación conforme al artículo 47 del mismo Código.</p>'+
    '<p>El Empleador podrá otorgar extraordinariamente premios o bonos ocasionales, los cuales no formarán parte del sueldo ni de la remuneración ordinaria. El Trabajador autoriza al Empleador a descontar de sus remuneraciones el tiempo no trabajado por atrasos, inasistencias o permisos. De las sumas pagadas se descontarán las cotizaciones de seguridad social e impuestos correspondientes.</p>'+
    (benefs.length>0?'<p><strong>'+numBen+'. BENEFICIOS.</strong> '+benefs.join(' ')+' Cualquier otra prestación o beneficio, ocasional o periódico, que el Empleador conceda al Trabajador distinto de los señalados en este contrato y sus ajustes legales o contractuales se entenderá conferido a título de mera liberalidad y podrá ser suspendido o modificado a su arbitrio.</p>':'')+
    '<p><strong>'+numDur+'. DURACIÓN Y VIGENCIA.</strong> '+tipoTxt+' Se deja constancia que el Trabajador ingresó al servicio del Empleador con fecha '+fd(c.fecha_inicio)+'.</p>'+
    '<p><strong>'+numRegl+'. REGLAMENTO INTERNO.</strong> Las demás estipulaciones se encuentran contempladas en el Reglamento Interno de la Empresa, el que forma parte integrante del presente contrato.</p>'+
    '<p><strong>'+numFirma+'. FIRMA Y EJEMPLARES.</strong> El presente contrato se firma en dos ejemplares de igual tenor y fecha, quedando uno en poder del Empleador y otro en poder del Trabajador.</p>'+
    '<table class="sig"><tr>'+
      '<td>'+
        '<div style="height:75px;display:block">'+
          (empresa.firma_representante?'<img src="'+empresa.firma_representante+'" style="max-height:70px;max-width:160px;display:block;margin:0 0 0 20px"/>':'')+
        '</div>'+
        '<div class="line"><strong>EL EMPLEADOR</strong><br>'+rep+'<br>'+(empresa.razon_social||'')+'</div>'+
        (empresa.timbre_empresa?'<div style="margin-top:8px;text-align:center"><img src="'+empresa.timbre_empresa+'" style="max-height:65px;max-width:160px"/></div>':'')+
      '</td>'+
      '<td>'+
        '<div style="height:75px"></div>'+
        '<div class="line"><strong>EL TRABAJADOR</strong><br>'+(persona.nombre_completo||'')+'<br>RUT: '+(persona.rut||'')+'</div>'+
      '</td>'+
    '</tr></table>'+
    '</body></html>';
}

];

function FiniquitosView(p){
  var lblS={fontSize:11,fontWeight:600,display:'block',marginBottom:3,color:'#475569'};
  var inpS={width:'100%',padding:'7px 10px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:12,boxSizing:'border-box'};
  var inpRO={width:'100%',padding:'7px 10px',border:'1px solid #E2E8F0',borderRadius:5,fontSize:12,boxSizing:'border-box',background:'#F1F5F9',color:'#475569',fontWeight:600};
  var personal=(p.m.personal||[]);
  var empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  var[modo,setModo]=useState('carta'); // carta | calcular | listar
  var[finiquitos,setFiniquitos]=useState([]);
  var[feriados,setFeriados]=useState([]); // lista de fechas YYYY-MM-DD
  var hoy=new Date().toISOString().slice(0,10);
  var emptyForm={
    persona_id:'',empresa_id:'',causal:'Art. 161-1: Necesidades de la empresa',
    fecha_inicio:'',fecha_termino:hoy,fecha_aviso:hoy,
    es_zona_extrema:false,
    valor_sueldo_minimo:539000,valor_uf:39267.07,
    tipo_sueldo:'Fijo',
    sueldo_base:0,gratificacion_mensual:true,asignacion_colacion:0,asignacion_movilizacion:0,
    haber_var_mes1:0,haber_var_mes2:0,haber_var_mes3:0,
    dias_feriado_tomados:0,dias_inhabiles:0,
    remuneracion_pendiente:0,descuentos:0,saldo_afc_empleador:0,observaciones:''
  };
  var[form,setForm]=useState(emptyForm);
  // Carta de término
  var emptyCarta={
    persona_id:'',empresa_id:'',
    fecha_carta:hoy,fecha_contrato:'',fecha_termino:hoy,
    causal:'Art. 159-5: Conclusión del trabajo que dio origen al contrato (obra o faena)',
    causal_hecho:'',cargo:'',
    indem_anios_servicio:0,indem_vacaciones:0,indem_tiempo_servido:0,indem_aviso_previo:0,
    observaciones:''
  };
  var[carta,setCarta]=useState(emptyCarta);
  var[cartas,setCartas]=useState([]);

  function load(){
    api('/finiquitos','GET',null,p.tok).then(function(r){setFiniquitos(Array.isArray(r)?r:[]);}).catch(function(){});
    api('/cartas-termino','GET',null,p.tok).then(function(r){setCartas(Array.isArray(r)?r:[]);}).catch(function(){});
  }
  useEffect(function(){load();},[p.tok]);
  // Auto-cargar UF y sueldo mínimo desde mindicador.cl al montar
  useEffect(function(){
    api('/indicadores-cl','GET',null,p.tok).then(function(r){
      if(r.uf||r.sueldo_minimo){
        setForm(function(f){
          var nf=Object.assign({},f);
          if(r.uf)nf.valor_uf=r.uf;
          if(r.sueldo_minimo)nf.valor_sueldo_minimo=r.sueldo_minimo;
          return nf;
        });
      }
    }).catch(function(){});
    // Cargar feriados del año actual y del próximo (por si el cálculo cruza años)
    var year=new Date().getFullYear();
    Promise.all([
      api('/feriados-cl?year='+year,'GET',null,p.tok),
      api('/feriados-cl?year='+(year+1),'GET',null,p.tok).catch(function(){return{feriados:[]};})
    ]).then(function(rs){
      var all=[];
      rs.forEach(function(r){if(r&&r.feriados)all=all.concat(r.feriados.map(function(f){return f.fecha;}));});
      setFeriados(all);
    }).catch(function(){});
  },[p.tok]);

  function upd(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}
  function updC(k,v){setCarta(function(f){return Object.assign({},f,{[k]:v});});}
  // Auto-llenar al seleccionar trabajador
  function onPersonaChange(pid){
    upd('persona_id',pid);
    var per=personal.find(function(x){return String(x.persona_id)===String(pid);});
    if(per){
      if(per.empresa_id&&!form.empresa_id)upd('empresa_id',per.empresa_id);
      if(per.fecha_ingreso)upd('fecha_inicio',(per.fecha_ingreso+'').slice(0,10));
      if(per.sueldo_base&&!form.sueldo_base)upd('sueldo_base',parseFloat(per.sueldo_base)||0);
    }

  // ── CÁLCULOS (replican fórmulas Excel) ──
  // Total días trabajados
  var diasTrabajados=0;

  if(form.fecha_inicio&&form.fecha_termino){

    diasD=d2.getDate()-d1.getDate()+1;
    if(diasD<=0){

    var frac=aniosFrac-entero;
    // Fracción > 6 meses (0.5 año) → cuenta como año completo
    if(frac>0.5)aniosServicio=entero+1;
    else aniosServicio=entero;
    if(aniosServicio>11)aniosServicio=11; // tope legal 11 años
  }

  var promVar=((parseFloat(form.haber_var_mes1)||0)+(parseFloat(form.haber_var_mes2)||0)+(parseFloat(form.haber_var_mes3)||0))/3;
  // Gratificación
  var grat=0;
  var sueldoMin=parseFloat(form.valor_sueldo_minimo)||0;

    var baseGrat=form.tipo_sueldo==='Fijo'?(parseFloat(form.sueldo_base)||0):((parseFloat(form.sueldo_base)||0)+promVar);
    grat=Math.min(baseGrat*0.25,topeGrat);
  }
  // Total haberes
  var totalHaberes=0;

  // Calcula días inhábiles (sábados, domingos y festivos) que caen en el rango

  function calcularInhabiles(){
    var pend=Math.ceil(diasPendientes);
    if(pend<=0||!form.fecha_termino){alert('No hay días pendientes para calcular');return;}
    // Helper: formato YYYY-MM-DD en hora local (evita bug de timezone con toISOString)
    function fmtLocal(d){
      var y=d.getFullYear();
      var m=d.getMonth()+1;
      var dd=d.getDate();
      return y+'-'+(m<10?'0':'')+m+'-'+(dd<10?'0':'')+dd;
    }
    var inicio=new Date(form.fecha_termino+'T00:00:00');
    inicio.setDate(inicio.getDate()+1); // empieza el día siguiente al término
    var feriadosSet={};feriados.forEach(function(f){feriadosSet[(f+'').slice(0,10)]=true;});
    var habilesContados=0,inhabiles=0,cur=new Date(inicio),fin=null;
    var maxIter=pend*3+30; // tope de seguridad
    while(habilesContados<pend&&maxIter-->0){
      var dow=cur.getDay(); // 0=dom, 6=sab
      var iso=fmtLocal(cur);
      var esFeriado=!!feriadosSet[iso];
      if(dow===0||dow===6||esFeriado){inhabiles++;}
      else{habilesContados++;fin=new Date(cur);}
      cur.setDate(cur.getDate()+1);
    }
    upd('dias_inhabiles',inhabiles);
    var finStr=fin?fmtLocal(fin):'—';
    setTimeout(function(){
      alert('✅ Cálculo automático:\n\nDesde: '+fmtLocal(inicio)+' (día siguiente al término)\nDías hábiles pendientes: '+pend+'\nDías inhábiles encontrados: '+inhabiles+' (sábados, domingos y festivos)\nÚltimo día de vacaciones: '+finStr+'\n\nTotal días pendientes (hábiles + inhábiles): '+(pend+inhabiles));
    },50);
  }

  var causalSel=CAUSALES_FINIQUITO.find(function(c){return c.k===form.causal;})||{};
  // Aviso previo (Art. 161-1): 1 mes de remuneración (Total haberes base)
  var indemAviso=0;
  if(form.causal==='Art. 161-1: Necesidades de la empresa'){
    var diff=0;
    if(form.fecha_aviso&&form.fecha_termino){
      var fa=new Date(form.fecha_aviso+'T00:00:00');
      var ft=new Date(form.fecha_termino+'T00:00:00');
      diff=Math.floor((ft-fa)/(1000*3600*24));
    }
    // Si no se dio aviso o el aviso es menor a 30 días antes, corresponde el mes completo
    if(!form.fecha_aviso||(diff>=0&&diff<=29))indemAviso=totalHaberes;
  }
  // Indem años de servicio (Art. 161-1 o 161-2)
  var indemAnios=0;
  if(causalSel.pago&&aniosServicio>0)indemAnios=totalHaberes*aniosServicio;
  // Vacaciones proporcionales — feriado pendiente sin contar gratificación
  var baseVac=form.tipo_sueldo==='Fijo'?sb:(sb+promVar);

  // Indem por tiempo servido (solo Art. 159-5 obra/faena, contratos posteriores a 01-01-2019, 2.5 días por mes + 1 si fracción >=15 días)
  var indemTiempoServ=0;
  if(form.causal==='Art. 159-5: Conclusión del trabajo que dio origen al contrato (obra o faena)'){
    var fechaTermino=new Date(form.fecha_termino+'T00:00:00');
    var lim2019=new Date('2019-01-01T00:00:00');

    var lim2021=new Date('2021-07-01T00:00:00');

    if(fechaTermino>=lim2022)diasPorMes=2.5;
