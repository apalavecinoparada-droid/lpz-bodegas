<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LPZ Bodegas v2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#F1F4F9;color:#1E293B;height:100vh;overflow:hidden}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #CBD5E1;border-radius:6px;width:100%;background:#fff;outline:none;transition:border .15s}
input:focus,select:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
button{font-family:inherit;cursor:pointer;border:none;transition:all .15s}
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748B;background:#F8FAFC;border-bottom:1px solid #E2E8F0;text-align:left;white-space:nowrap}
td{padding:8px 12px;font-size:13px;border-bottom:1px solid #F1F4F9;vertical-align:middle}
tr:hover>td{background:#F8FAFC}
#root{display:flex;height:100vh;overflow:hidden}
.sb{width:224px;background:#0F172A;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid #1E293B}
.sb-logo h1{color:#F8FAFC;font-size:13px;font-weight:700;line-height:1.3}
.sb-logo p{color:#475569;font-size:11px;margin-top:2px}
.sb-sep{height:1px;background:#1E293B;margin:4px 10px}
.sb-grp{padding:8px 12px 2px;color:#94A3B8;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sb-grp:hover{color:#E2E8F0}
.sb-grp-arrow{font-size:10px;transition:transform .2s}
.sb-grp-arrow.open{transform:rotate(90deg)}
.nav{display:flex;align-items:center;gap:7px;padding:6px 12px;color:#94A3B8;cursor:pointer;font-size:13px;border-radius:6px;margin:1px 5px;transition:all .12s}
.nav:hover{background:#1E293B;color:#E2E8F0}
.nav.on{background:#1D4ED8;color:#EFF6FF;font-weight:500}
.nav .cnt{margin-left:auto;background:#EF4444;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:10px 20px;background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:15px;font-weight:700;color:#0F172A}
.topbar-r{display:flex;align-items:center;gap:8px;font-size:12px;color:#64748B}
.content{flex:1;overflow-y:auto;padding:18px 20px}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin-bottom:14px}
.card-h{padding:12px 16px;border-bottom:1px solid #F1F4F9;display:flex;align-items:center;justify-content:space-between}
.card-h h3{font-size:14px;font-weight:600}
.card-t{overflow-x:auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{border-radius:10px;padding:14px 16px}
.kpi-b{background:#EFF6FF;border:1px solid #BFDBFE}
.kpi-g{background:#F0FDF4;border:1px solid #BBF7D0}
.kpi-a{background:#FFFBEB;border:1px solid #FDE68A}
.kpi-r{background:#FEF2F2;border:1px solid #FECACA}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-b .kpi-lbl{color:#1D4ED8}.kpi-g .kpi-lbl{color:#15803D}.kpi-a .kpi-lbl{color:#92400E}.kpi-r .kpi-lbl{color:#B91C1C}
.kpi-val{font-size:21px;font-weight:700}
.kpi-b .kpi-val{color:#1E40AF}.kpi-g .kpi-val{color:#166534}.kpi-a .kpi-val{color:#78350F}.kpi-r .kpi-val{color:#991B1B}
.kpi-sub{font-size:11px;margin-top:2px;opacity:.7}
.btn{padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
.btn-p{background:#1D4ED8;color:#fff}.btn-p:hover{background:#1E40AF}
.btn-g{background:#fff;color:#475569;border:1px solid #CBD5E1}.btn-g:hover{background:#F8FAFC}
.btn-d{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}.btn-d:hover{background:#FEE2E2}
.btn-a{background:#FFF7ED;color:#92400E;border:1px solid #FDE68A}.btn-a:hover{background:#FEF3C7}
.btn-teal{background:#F0FDFA;color:#0F766E;border:1px solid #99F6E4}.btn-teal:hover{background:#CCFBF1}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-xs{padding:2px 6px;font-size:10px}
.bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.bg-g{background:#DCFCE7;color:#166534}.bg-r{background:#FEE2E2;color:#991B1B}
.bg-b{background:#DBEAFE;color:#1E40AF}.bg-a{background:#FEF3C7;color:#92400E}
.bg-gray{background:#F1F5F9;color:#475569}.bg-teal{background:#CCFBF1;color:#0F766E}
.fr{margin-bottom:10px}
.fl{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:3px}
.req{color:#EF4444}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:28px 14px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:640px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.modal-lg{max-width:900px}
.modal-xl{max-width:1100px}
.mh{padding:14px 18px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:15px;font-weight:700}
.mc{font-size:22px;background:none;border:none;cursor:pointer;color:#64748B;padding:2px 6px;border-radius:4px}
.mc:hover{background:#F1F5F9}
.mb{padding:18px;max-height:72vh;overflow-y:auto}
.mf{padding:12px 18px;border-top:1px solid #E2E8F0;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.al{padding:9px 13px;border-radius:7px;font-size:13px;margin-bottom:10px}
.al-e{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}
.al-w{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;cursor:pointer}
.al-s{background:#DCFCE7;color:#166534;border:1px solid #BBF7D0}
.al-i{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.tb{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.tb input,.tb select{width:auto;min-width:140px}
.mono{font-family:'Courier New',monospace;font-size:12px}
.tr{text-align:right!important}.tc{text-align:center!important}
.ep{color:#16A34A;font-weight:700}.em{color:#DC2626;font-weight:700}
.empty{padding:28px;text-align:center;color:#94A3B8;font-size:13px}
.spin{display:flex;align-items:center;justify-content:center;height:180px;color:#64748B}
.err-box{padding:24px;text-align:center;background:#FEF2F2;border-radius:10px;margin:14px;color:#991B1B}
.tab-bar{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid #E2E8F0;flex-wrap:wrap}
.tab{padding:7px 14px;font-size:13px;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;color:#64748B}
.tab.on{font-weight:700;border-bottom-color:#1D4ED8;color:#1D4ED8}
.divider{border:none;border-top:1px solid #E2E8F0;margin:12px 0}
.totals-box{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:14px;margin-top:10px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px}
.total-final{border-top:2px solid #1D4ED8;margin-top:6px;padding-top:6px;font-weight:700;font-size:15px;color:#1D4ED8}
.print-only{display:none}
@media print{.sb,.topbar,.no-print{display:none!important}.print-only{display:block!important}.content{padding:0}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';
const {useState,useEffect,useMemo,useCallback,useRef,Component}=React;
const h=React.createElement;
const CLP=n=>new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(n||0);
function fmtD(s){if(!s)return '—';var d=(s+'').substring(0,10);var p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
const N=(n,d=2)=>new Intl.NumberFormat('es-CL',{maximumFractionDigits:d}).format(n||0);
const TODAY=new Date().toISOString().split('T')[0];
const str=v=>v===null||v===undefined?'':String(v);

// ── API ──
function api(path,method,body,token){
  method=method||'GET';
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token)opts.headers['Authorization']='Bearer '+token;
  if(body)opts.body=JSON.stringify(body);
  return fetch('/api'+path,opts).then(function(r){
    return r.text().then(function(txt){
      var d;
      try{d=JSON.parse(txt);}catch(_){throw new Error('Servidor respondio: '+r.status+' '+txt.substring(0,120));}
      if(!r.ok)throw new Error(d.error||'Error '+r.status);
      return d;
    });
  });
}

// ── ERROR BOUNDARY ──
class EB extends Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e.message||'Error inesperado'};}
  componentDidCatch(e,i){console.error('EB:',e,i);}
  render(){
    if(this.state.err)return h('div',{className:'err-box'},
      h('div',{style:{fontSize:22,marginBottom:8}},'⚠'),
      h('div',{style:{fontWeight:700,marginBottom:6}},'Error en esta seccion'),
      h('div',{style:{fontSize:12,color:'#64748B',marginBottom:12}},this.state.err),
      h('button',{className:'btn btn-g',onClick:()=>this.setState({err:null})},'Reintentar')
    );
    return this.props.children;
  }
}

// ── COMPONENTES BASE ──
const Bg=p=>h('span',{className:'bg bg-'+(p.c||'g')},p.children);
const Btn=p=>h('button',{type:p.type||'button',onClick:p.onClick,disabled:p.disabled,className:'btn btn-'+(p.v||'p')+(p.sm?' btn-sm':'')+(p.xs?' btn-xs':''),style:{opacity:p.disabled?.5:1}},p.children);
const FR=p=>h('div',{className:'fr'},h('label',{className:'fl'},p.label,p.req&&h('span',{className:'req'},' *')),p.children);
const Inp=p=>h('input',{value:str(p.value),onChange:e=>p.onChange(e.target.value),type:p.type||'text',placeholder:p.ph||'',min:p.min,step:p.step,style:p.style});
const Sel=p=>h('select',{value:str(p.value),onChange:e=>p.onChange(e.target.value),style:p.style},p.children);
const Chk=p=>h('input',{type:'checkbox',checked:!!p.checked,onChange:e=>p.onChange(e.target.checked),style:{cursor:'pointer'}});
const Modal=p=>h('div',{className:'ov'},h('div',{className:'modal'+(p.lg?' modal-lg':'')+(p.xl?' modal-xl':'')},h('div',{className:'mh'},h('h3',null,p.title),h('button',{className:'mc',onClick:p.onClose},'×')),p.children));
function TBL(p){
  const rows=p.rows||[];
  if(!rows.length)return h('div',{className:'empty'},p.empty||'Sin datos');
  return h('div',{className:'card-t'},h('table',null,
    h('thead',null,h('tr',null,...p.cols.map((c,i)=>h('th',{key:i,style:{textAlign:c.r?'right':c.c?'center':'left',width:c.w}},c.lbl)))),
    h('tbody',null,...rows.map((r,i)=>h('tr',{key:r[p.rowKey]||i},
      ...p.cols.map((c,j)=>h('td',{key:j,style:{textAlign:c.r?'right':c.c?'center':'left',fontFamily:c.mono?'Courier New':undefined,fontSize:c.mono?12:undefined}},
        c.render?c.render(r,i):str(r[c.k]||'—')
      ))
    )))
  ));
}

// ── EXCEL EXPORT ──
function exportXLSX(rows,cols,filename){
  try{
    const header=cols.map(c=>c.header);
    const data=rows.map(function(r){return cols.map(function(c){return c.value(r)||'';});});
    const ws=XLSX.utils.aoa_to_sheet([header,...data]);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Datos');
    XLSX.writeFile(wb,(filename||'reporte')+'.xlsx');
  }catch(e){alert('Error al exportar: '+e.message);}
}

// ── LOGIN ──
function LoginPage(p){
  const[email,setEmail]=useState('admin@lpz.cl');
  const[pass,setPass]=useState('admin123');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  function submit(e){e.preventDefault();setErr('');setLoading(true);
    api('/auth/login','POST',{email,password:pass}).then(function(r){localStorage.setItem('lpz_token',r.token);localStorage.setItem('lpz_user',JSON.stringify(r.usuario));p.onLogin(r.token,r.usuario);}).catch(function(ex){setErr(ex.message);}).finally(function(){setLoading(false);});
  }
  return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0F172A'}},
    h('div',{style:{background:'#fff',borderRadius:14,padding:'36px 32px',width:340,boxShadow:'0 20px 60px rgba(0,0,0,.3)'}},
      h('h1',{style:{fontSize:20,fontWeight:700,marginBottom:3}},'LPZ Bodegas v2.0'),
      h('p',{style:{color:'#64748B',fontSize:13,marginBottom:20}},'Leonidas Poo Zenteno y Cia. Ltda.'),
      err&&h('div',{className:'al al-e'},err),
      h('form',{onSubmit:submit},
        h(FR,{label:'Correo'},h(Inp,{value:email,onChange:setEmail,type:'email'})),
        h(FR,{label:'Contrasena'},h(Inp,{value:pass,onChange:setPass,type:'password'})),
        h('button',{type:'submit',className:'btn btn-p',style:{width:'100%',justifyContent:'center',marginTop:8},disabled:loading},loading?'Ingresando...':'Ingresar')
      )
    )
  );
}

// ── DASHBOARD ──
function Dashboard(p){
  const[stats,setStats]=useState(null);const[movs,setMovs]=useState([]);const[load,setLoad]=useState(true);
  useEffect(function(){
    Promise.all([api('/stock/consolidado','GET',null,p.tok),api('/movimientos','GET',null,p.tok)]).then(function(res){
      const rows=res[0]||[],ms=res[1]||[];
      setStats({total:rows.reduce(function(s,r){return s+parseFloat(r.valor_total||0);},0),prods:rows.length});
      setMovs(ms);
    }).catch(function(){}).finally(function(){setLoad(false);});
  },[p.tok]);
  if(load)return h('div',{className:'spin'},'Cargando...');
  return h('div',null,
    h('div',{className:'kpis'},
      h('div',{className:'kpi kpi-b'},h('div',{className:'kpi-lbl'},'Valor total stock'),h('div',{className:'kpi-val'},CLP(stats&&stats.total||0)),h('div',{className:'kpi-sub'},'Costo promedio ponderado')),
      h('div',{className:'kpi kpi-'+(p.alerts>0?'a':'g'),style:{cursor:'pointer'},onClick:function(){p.setView('stock');}},h('div',{className:'kpi-lbl'},'Alertas stock'),h('div',{className:'kpi-val'},p.alerts),h('div',{className:'kpi-sub'},'Bajo minimo')),
      h('div',{className:'kpi kpi-g'},h('div',{className:'kpi-lbl'},'Productos en stock'),h('div',{className:'kpi-val'},stats&&stats.prods||0),h('div',{className:'kpi-sub'},'Con existencias')),
      h('div',{className:'kpi kpi-b'},h('div',{className:'kpi-lbl'},'Movimientos'),h('div',{className:'kpi-val'},movs.length),h('div',{className:'kpi-sub'},'Registrados'))
    ),
    p.alerts>0&&h('div',{className:'al al-w',onClick:function(){p.setView('stock');}},null,'⚠ '+p.alerts+' producto(s) bajo el minimo — click para ver →'),
    h('div',{className:'card'},
      h('div',{className:'card-h'},h('h3',null,'Ultimos movimientos')),
      h(TBL,{cols:[
        {lbl:'N°',k:'movimiento_id',w:60},{lbl:'Fecha',render:function(r){return fmtD(r.fecha);}},{lbl:'Tipo',render:r=>h(Bg,{c:r.tipo_movimiento==='INGRESO'?'g':r.tipo_movimiento==='SALIDA'?'r':'gray'},r.tipo_movimiento)},
        {lbl:'Bodega',k:'bodega_nombre'},{lbl:'Faena',k:'faena_nombre'},{lbl:'Equipo',k:'equipo_nombre'},
        {lbl:'Estado',render:r=>h(Bg,{c:r.estado==='ACTIVO'?'g':'r'},r.estado)},
        {lbl:'Total',r:true,render:r=>CLP(r.total||0)}
      ],rows:movs.slice(0,10),empty:'Sin movimientos'})
    )
  );
}

// ── MODAL ANULAR MOVIMIENTO ──
function AnularMovModal(p){
  const[motivo,setMotivo]=useState('');const[err,setErr]=useState('');const[saving,setSaving]=useState(false);
  function save(){
    if(!motivo.trim()){setErr('Ingrese el motivo de anulacion');return;}
    setSaving(true);
    api('/movimientos/'+p.movId+'/anular','PATCH',{motivo_anulacion:motivo},p.tok).then(function(){p.onDone();p.onClose();}).catch(function(ex){setErr(ex.message);}).finally(function(){setSaving(false);});
  }
  return h(Modal,{title:'Anular Movimiento N° '+p.movId,onClose:p.onClose},
    h(EB,null,
      h('div',{className:'mb'},
        h('div',{className:'al al-e',style:{marginBottom:12}},'Esta accion revertira el stock afectado y no se puede deshacer.'),
        err&&h('div',{className:'al al-e'},err),
        h(FR,{label:'Motivo de anulacion',req:true},h('textarea',{value:motivo,onChange:e=>setMotivo(e.target.value),rows:3,style:{width:'100%',padding:'7px 10px',border:'1px solid #CBD5E1',borderRadius:6,resize:'vertical'},placeholder:'Describa el motivo...'}))
      ),
      h('div',{className:'mf'},h(Btn,{v:'g',onClick:p.onClose},'Cancelar'),h(Btn,{v:'d',onClick:save,disabled:saving},saving?'Anulando...':'Confirmar Anulacion'))
    )
  );
}

// ── INGRESO VIEW ──
function IngresoView(p){
  const bodegas=p.m&&Array.isArray(p.m.bodegas)?p.m.bodegas:[];
  const prods=p.m&&Array.isArray(p.m.prods)?p.m.prods:[];
  const provs=p.m&&Array.isArray(p.m.provs)?p.m.provs:[];
  const tdocs=p.m&&Array.isArray(p.m.tdocs)?p.m.tdocs:[];
  const[movs,setMovs]=useState([]);const[modal,setModal]=useState(false);
  const[anularId,setAnularId]=useState(null);const[err,setErr]=useState('');const[saving,setSaving]=useState(false);
  const blank={fecha:TODAY,bodega_id:'',prov_id:'',tdoc_id:'',ndoc:'',fdoc:TODAY,obs:'',lineas:[{prod_id:'',qty:'1',cu:'0'}]};
  const[form,setForm]=useState(blank);
  function load(){api('/movimientos?tipo=INGRESO','GET',null,p.tok).then(function(r){setMovs(Array.isArray(r)?r:[]);}).catch(function(){});}
  useEffect(function(){load();},[p.tok]);
  function sf(k,v){setForm(function(f){var x=Object.assign({},f);x[k]=v;return x;});}
  function addL(){setForm(function(f){return Object.assign({},f,{lineas:f.lineas.concat([{prod_id:'',qty:'1',cu:'0'}])});});}
  function remL(i){setForm(function(f){return Object.assign({},f,{lineas:f.lineas.filter(function(_,j){return j!==i;})});});}
  function pickP(i,pid){
    const prod=prods.find(function(x){return String(x.producto_id)===pid;});
    setForm(function(f){return Object.assign({},f,{lineas:f.lineas.map(function(l,j){return j===i?Object.assign({},l,{prod_id:pid,cu:String(prod&&prod.costo_referencia||0)}):l;})});});
  }
  function updL(i,k,v){setForm(function(f){return Object.assign({},f,{lineas:f.lineas.map(function(l,j){return j===i?Object.assign({},l,{[k]:v}):l;})});});}
  function save(){
    setErr('');
    if(!form.bodega_id||!form.fecha){setErr('Bodega y fecha son obligatorios');return;}
    if(!form.prov_id){setErr('Proveedor es obligatorio');return;}
    for(var i=0;i<form.lineas.length;i++){var l=form.lineas[i];if(!l.prod_id||!parseFloat(l.qty)||!parseFloat(l.cu)){setErr('Complete todas las lineas');return;}}
    setSaving(true);

  }

  const bodegas=p.m&&Array.isArray(p.m.bodegas)?p.m.bodegas:[];
  const[pid,setPid]=useState('');const[bid,setBid]=useState('');const[rows,setRows]=useState([]);const[load,setLoad]=useState(false);
  useEffect(function(){
    if(!pid)return;
    setLoad(true);
    api('/kardex?producto_id='+pid+(bid?'&bodega_id='+bid:''),'GET',null,p.tok).then(function(r){
      var bal=0,cpp=0;
      const calc=(Array.isArray(r)?r:[]).map(function(row){
        const ent=parseFloat(row.entrada||0),sal=parseFloat(row.salida||0);
        if(ent>0){const nq=bal+ent;cpp=nq>0?(bal*cpp+ent*parseFloat(row.costo_unitario))/nq:parseFloat(row.costo_unitario);bal=nq;}
        else if(sal>0){bal=Math.max(0,bal-sal);}
        return Object.assign({},row,{saldo:bal,cpp_calc:cpp});
      });
      setRows(calc);
    }).catch(function(){}).finally(function(){setLoad(false);});
  },[pid,bid]);
  const prod=prods.find(function(q){return String(q.producto_id)===pid;});
  const last=rows.length?rows[rows.length-1]:null;
  return h('div',null,
    h('div',{className:'tb'},
      h('select',{value:pid,onChange:e=>setPid(e.target.value),style:{minWidth:320}},h('option',{value:''},'Seleccione un producto...'),prods.filter(q=>q.activo).map(q=>h('option',{key:q.producto_id,value:q.producto_id},q.codigo+' - '+q.nombre))),
      h('select',{value:bid,onChange:e=>setBid(e.target.value),style:{minWidth:180}},h('option',{value:''},'Todas las bodegas'),bodegas.map(b=>h('option',{key:b.bodega_id,value:b.bodega_id},b.nombre))),
      pid&&h(Btn,{v:'g',onClick:function(){exportXLSX(rows,[{header:'N° Mov',value:r=>r.movimiento_id},{header:'Tipo',value:r=>r.tipo_movimiento},{header:'Fecha',value:r=>r.fecha},{header:'Bodega',value:r=>r.bodega_nombre},{header:'Faena',value:r=>r.faena_nombre},{header:'Equipo',value:r=>r.equipo_nombre},{header:'Entrada',value:r=>r.entrada||''},{header:'Salida',value:r=>r.salida||''},{header:'Saldo',value:r=>r.saldo},{header:'CPP',value:r=>r.cpp_calc}],'kardex_'+(prod&&prod.codigo||pid));}},null,'Excel')
    ),
    pid&&prod&&h('div',{style:{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}},
      h('span',{style:{background:'#DBEAFE',borderRadius:7,padding:'5px 12px',fontSize:13,color:'#1D4ED8'}},h('strong',null,'Producto: '),prod.nombre),
      last&&h('span',{style:{background:'#DCFCE7',borderRadius:7,padding:'5px 12px',fontSize:13,color:'#166534'}},h('strong',null,'Saldo: '),N(last.saldo)+' '+str(prod.unidad_medida)+' @ '+CLP(last.cpp_calc))
    ),
    pid&&(load?h('div',{className:'spin'},'Cargando...'):
      h('div',{className:'card'},h(TBL,{cols:[
        {lbl:'N°',render:r=>r.movimiento_id,w:60},{lbl:'Fecha',render:function(r){return fmtD(r.fecha);}},
        {lbl:'Tipo',render:r=>h(Bg,{c:r.tipo_movimiento==='INGRESO'?'g':'r'},r.tipo_movimiento)},
        {lbl:'Bodega',k:'bodega_nombre'},{lbl:'Faena',k:'faena_nombre'},{lbl:'Equipo',k:'equipo_nombre'},
        {lbl:'Entrada',r:true,render:r=>r.entrada>0?h('span',{className:'ep'},'+'+N(r.entrada)):'—'},
        {lbl:'Salida',r:true,render:r=>r.salida>0?h('span',{className:'em'},'-'+N(r.salida)):'—'},
        {lbl:'Saldo',r:true,render:r=>h('strong',null,N(r.saldo))},
        {lbl:'CPP',r:true,mono:true,render:r=>CLP(r.cpp_calc)}

}

// ── CALCULADORA LITRO NETO COMBUSTIBLE ──
function CalcCombustible(p){
  var TASAS={diesel:1.5,gasolina:6.0};
  const[tipoComb,setTipoComb]=useState('diesel');
  const[modoCalc,setModoCalc]=useState('utm');
  const[utm,setUtm]=useState('');
  const[utmLoading,setUtmLoading]=useState(false);
  const[impEspDir,setImpEspDir]=useState('');
  const[modoImpDir,setModoImpDir]=useState('total');
  const[litros,setLitros]=useState('');
  const[totalGuia,setTotalGuia]=useState('');

  function fetchUTM(){
    setUtmLoading(true);
    fetch('https://mindicador.cl/api/utm')
      .then(function(r){return r.json();})
      .then(function(d){var val=d&&d.serie&&d.serie[0]&&d.serie[0].valor;if(val)setUtm(String(Math.round(val)));else alert('No se pudo obtener la UTM.');})
      .catch(function(){alert('Error al conectar con mindicador.cl');})
      .finally(function(){setUtmLoading(false);});
  }

  var litrosNum=parseFloat(litros)||0;
  var totalNum=parseFloat(totalGuia)||0;
  var tasa=TASAS[tipoComb]||1.5;
  var utmNum=parseFloat(utm)||0;
  var impEspDirNum=parseFloat(impEspDir)||0;
  var impEspTotal=modoCalc==='utm'
    ? utmNum*tasa/1000*litrosNum
    : (modoImpDir==='por_litro'?impEspDirNum*litrosNum:impEspDirNum);
  var baseIVA=totalNum-impEspTotal;
  var neto=baseIVA/1.19;
  var iva=neto*0.19;
  var netoPorLitro=litrosNum>0?neto/litrosNum:0;
  var ok=litrosNum>0&&totalNum>0&&baseIVA>0&&(modoCalc==='utm'?utmNum>0:impEspDirNum>0);

  var rowS={display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #F1F5F9',fontSize:13};
  var tabBtn=function(active){return {flex:1,padding:'7px',borderRadius:5,border:'1px solid '+(active?'#3B82F6':'#E2E8F0'),background:active?'#EFF6FF':'#F8FAFC',fontWeight:active?700:400,fontSize:12,cursor:'pointer',color:active?'#1D4ED8':'#64748B'};};

  return h(Modal,{title:'Calculadora — Precio Neto del Litro',onClose:p.onClose,lg:false},
    h('div',{style:{padding:'4px 0'}},
      // Tipo combustible
      h('div',{style:{display:'flex',gap:8,marginBottom:12}},
        h('button',{onClick:function(){setTipoComb('diesel');},style:{flex:1,padding:'8px',borderRadius:6,border:'2px solid '+(tipoComb==='diesel'?'#F59E0B':'#E2E8F0'),background:tipoComb==='diesel'?'#FEF3C7':'#F8FAFC',fontWeight:600,fontSize:13,cursor:'pointer',color:tipoComb==='diesel'?'#92400E':'#64748B'}},'🚛 Diesel  (1.5 UTM/m³)'),
        h('button',{onClick:function(){setTipoComb('gasolina');},style:{flex:1,padding:'8px',borderRadius:6,border:'2px solid '+(tipoComb==='gasolina'?'#3B82F6':'#E2E8F0'),background:tipoComb==='gasolina'?'#EFF6FF':'#F8FAFC',fontWeight:600,fontSize:13,cursor:'pointer',color:tipoComb==='gasolina'?'#1D4ED8':'#64748B'}},'⛽ Gasolina  (6 UTM/m³)')
      ),
      // Modo calculo
      h('div',{style:{display:'flex',gap:4,marginBottom:12,background:'#F1F5F9',borderRadius:6,padding:3}},
        h('button',{onClick:function(){setModoCalc('utm');},style:tabBtn(modoCalc==='utm')},'Calcular con UTM (sin desglose)'),
        h('button',{onClick:function(){setModoCalc('directo');},style:tabBtn(modoCalc==='directo')},'Tengo el imp. específico')
      ),
      // Inputs comunes
      h('div',{className:'g2',style:{marginBottom:10}},
        h(FI,{k:'litros',l:'Litros (guía)',type:'number',item:{litros},onChange:function(v){setLitros(v.litros);},ph:'Ej: 2899'}),
        h(FI,{k:'totalGuia',l:'Total guía ($)',type:'number',item:{totalGuia},onChange:function(v){setTotalGuia(v.totalGuia);},ph:'Ej: 4.380.389'})
      ),
      // Modo-specific
      modoCalc==='utm'?h('div',{style:{marginBottom:10}},
        h(FR,{label:'UTM vigente ($)'},
          h('div',{style:{display:'flex',gap:6}},
            h('input',{type:'number',value:utm,onChange:function(e){setUtm(e.target.value);},style:{flex:1,padding:'8px 10px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:13},placeholder:'Ej: 67.294'}),
            h(Btn,{v:'a',sm:true,onClick:fetchUTM,disabled:utmLoading},utmLoading?'…':'↻ Obtener UTM')
          )
        ),
        utmNum>0&&litrosNum>0&&h('div',{style:{fontSize:11,color:'#64748B',marginTop:2}},'Imp. esp. calculado: '+CLP(Math.round(impEspTotal))+' ('+tasa+' UTM × $'+utmNum+' / 1000 × '+litrosNum+' lts)')
      ):h('div',{style:{marginBottom:10}},
        h(FR,{label:'Impuesto específico'},
          h('div',null,
            h('div',{style:{display:'flex',gap:12,marginBottom:6}},
              h('label',{style:{fontSize:12,display:'flex',alignItems:'center',gap:4,cursor:'pointer'}},
                h('input',{type:'radio',name:'modoImpDir2',checked:modoImpDir==='total',onChange:function(){setModoImpDir('total');}}),
                'Monto total ($)'
              ),
              h('label',{style:{fontSize:12,display:'flex',alignItems:'center',gap:4,cursor:'pointer'}},
                h('input',{type:'radio',name:'modoImpDir2',checked:modoImpDir==='por_litro',onChange:function(){setModoImpDir('por_litro');}}),
                'Por litro ($/lt)'
              )
            ),
            h('input',{type:'number',value:impEspDir,onChange:function(e){setImpEspDir(e.target.value);},style:{width:'100%',padding:'8px 10px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:13,boxSizing:'border-box'},
              placeholder:modoImpDir==='total'?'Monto total del imp. específico de la factura':'$/lt de imp. específico'}),
            litrosNum>0&&modoImpDir==='por_litro'&&impEspDirNum>0&&h('div',{style:{fontSize:11,color:'#64748B',marginTop:2}},'Total imp. esp.: '+CLP(Math.round(impEspTotal)))
          )
        )
      ),
      h('hr',{className:'divider'}),
      // Result
      h('div',{style:{background:ok?'#F0FDF4':'#F8FAFC',border:'1px solid '+(ok?'#BBF7D0':'#E2E8F0'),borderRadius:8,padding:'12px 16px'}},
        ok?h('div',null,
          h('div',{style:{marginBottom:8}},
            h('div',{style:{fontSize:11,fontWeight:600,color:'#64748B',marginBottom:4,textTransform:'uppercase',letterSpacing:'.5px'}},'Desglose'),
            h('div',{style:rowS},h('span',{style:{color:'#64748B'}},'Total guía'),h('span',{style:{fontWeight:600}},CLP(Math.round(totalNum)))),
            h('div',{style:rowS},h('span',{style:{color:'#64748B'}},'− Imp. específico'),h('span',{style:{fontWeight:600,color:'#DC2626'}},'-'+CLP(Math.round(impEspTotal)))),
            h('div',{style:rowS},h('span',{style:{color:'#64748B'}},'= Base IVA'),h('span',{style:{fontWeight:600}},CLP(Math.round(baseIVA)))),
            h('div',{style:rowS},h('span',{style:{color:'#64748B'}},'− IVA 19%'),h('span',{style:{fontWeight:600,color:'#DC2626'}},'-'+CLP(Math.round(iva)))),
            h('div',{style:{display:'flex',justifyContent:'space-between',padding:'5px 0',fontSize:13}},h('span',{style:{color:'#64748B'}},'= Neto total'),h('span',{style:{fontWeight:600}},CLP(Math.round(neto))))
          ),
          h('div',{style:{background:'#DCFCE7',borderRadius:6,padding:'10px 14px',textAlign:'center'}},
            h('div',{style:{fontSize:11,color:'#166534'}},'PRECIO NETO POR LITRO'),
            h('div',{style:{fontSize:28,fontWeight:700,color:'#15803D'}},CLP(Math.round(netoPorLitro))),
            h('div',{style:{fontSize:11,color:'#166534',marginTop:2}},
              'Imp. esp./lt: '+CLP(Math.round(impEspTotal/litrosNum))+'  |  IVA/lt: '+CLP(Math.round(iva/litrosNum))
            ),
            p.onUsar&&h('div',{style:{marginTop:8}},h(Btn,{v:'g',onClick:function(){p.onUsar(Math.round(netoPorLitro));}},'Usar este valor en la OC'))
          )
        ):h('div',{style:{color:'#94A3B8',fontSize:13,textAlign:'center'}},'Complete los campos para ver el resultado')
      ),
      h('div',{style:{fontSize:10,color:'#94A3B8',marginTop:8}},'Modo UTM: Imp. esp. = UTM × tasa / 1000 × lts. Modo directo: use el valor de la factura. Neto = (Total − Imp. esp.) ÷ 1.19 ÷ lts.')
    )
  );
}

function OCRFactura(p){
  const[file,setFile]=useState(null);
  const[preview,setPreview]=useState(null);
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const[rawText,setRawText]=useState('');
  const[showRaw,setShowRaw]=useState(false);

  var provs=(p.m.provs||[]).filter(function(p2){return p2.activo;});
  var empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  var tdocs=(p.m.tdocs||[]);

  function onFileChange(e){
    var f=e.target.files[0];
    if(!f)return;
    setFile(f);setResult(null);setRawText('');
    var reader=new FileReader();
    reader.onload=function(ev){setPreview(ev.target.result);};
    reader.readAsDataURL(f);
  }

  function sendToOCR(b64,mimeType){
    var tok=p.tok;
    fetch('/api/ocr/factura',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body:JSON.stringify({base64:b64,mediaType:mimeType})
    }).then(function(r){return r.json();})
    .then(function(data){
      if(!data.ok&&!data.data){setLoading(false);p.onMsg&&p.onMsg('Error: '+(data.error||'Sin respuesta'));return;}
      setRawText(data.raw||'');setResult(data.data||{});
      p.onMsg&&p.onMsg('Documento analizado. Revise y confirme los datos.');
      setLoading(false);
    })
    .catch(function(ex){setLoading(false);p.onMsg&&p.onMsg('Error: '+ex.message);});
  }

  function extraer(){
    if(!file){alert('Seleccione un archivo primero');return;}
    setLoading(true);p.onMsg&&p.onMsg('Procesando documento...');
    // Send file directly as base64 — PDF goes as PDF, images as image
    if(file.name&&file.name.toLowerCase().endsWith('.xml')){
      // XML: read as text to preserve encoding, then base64 encode
      var rxml=new FileReader();
      rxml.onload=function(ev){
        var b64=btoa(unescape(encodeURIComponent(ev.target.result)));
        sendToOCR(b64,'text/xml');
      };
      rxml.readAsText(file,'ISO-8859-1');
    }else{
      var reader=new FileReader();
      reader.onload=function(ev){
        var b64=ev.target.result.split(',')[1];
        sendToOCR(b64,file.type);
      };
      reader.readAsDataURL(file);
    }
  }

  function aplicar(){
    if(!result)return;
    // Match proveedor by RUT
    var prov=result.proveedor_rut?provs.find(function(p2){
      var r1=(p2.rut||'').replace(/[\.\-]/g,'').toLowerCase();
      var r2=(result.proveedor_rut||'').replace(/[\.\-]/g,'').toLowerCase();
      return r1&&r2&&r1===r2;
    }):null;
    // Match empresa by RUT
    var emp=result.cliente_rut?empresas.find(function(e){
      var r1=(e.rut||'').replace(/[\.\-]/g,'').toLowerCase();
      var r2=(result.cliente_rut||'').replace(/[\.\-]/g,'').toLowerCase();
      return r1&&r2&&r1===r2;
    }):null;
    // Match tdoc
    var tdoc=result.tipo_doc?tdocs.find(function(t){
      return result.tipo_doc.toUpperCase().includes(t.nombre?t.nombre.toUpperCase():'')
        ||(t.codigo&&result.tipo_doc.toUpperCase().includes(t.codigo.toUpperCase()));
    }):null;
    // Build lineas for OC
    var lineas=(result.lineas||[]).map(function(l,i){
      return {descripcion:l.descripcion||'',prod_id:'',subcategoria_id:'',faena_id:'',equipo_id:'',
        cantidad:l.cantidad||1,precio_unitario:l.precio_unitario||0,
        ingresa_bodega:false,bodega_destino_id:''};
    });
    p.onImport({
      proveedor_id:prov?prov.proveedor_id:null,
      empresa_id:emp?emp.empresa_id:null,
      fecha_emision:result.fecha_emision||null,
      numero_documento:result.numero_documento||null,
      tipo_doc_id:tdoc?tdoc.tipo_doc_id:null,
      lineas:lineas.length?lineas:null,
      _raw:result
    });
  }

  var inpStyle={padding:'6px 8px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:12};

  return h('div',{style:{background:'#F0F9FF',border:'2px solid #BAE6FD',borderRadius:8,padding:'14px',marginBottom:12}},
    h('div',{style:{fontWeight:600,fontSize:13,color:'#0369A1',marginBottom:10}},'📄 Importar datos desde factura o guía de despacho'),
    h('div',{style:{display:'flex',gap:10,alignItems:'flex-start',flexWrap:'wrap'}},
      h('div',{style:{flex:1,minWidth:200}},
        h('label',{style:{fontSize:11,fontWeight:600,display:'block',marginBottom:4,color:'#475569'}},'Seleccione archivo (XML recomendado · PDF · JPG · PNG)'),
        h('input',{type:'file',accept:'image/*,.pdf,.xml,text/xml,application/xml',onChange:onFileChange,style:{fontSize:11,width:'100%'}}),
        file&&h('div',{style:{fontSize:10,color:'#64748B',marginTop:2}},file.name+' ('+Math.round(file.size/1024)+' KB)')
      ),
      h(Btn,{v:'teal',sm:true,onClick:extraer,disabled:!file||loading},loading?'Analizando...':'🔍 Extraer datos')
    ),
    // Preview extracted data
    result&&h('div',{style:{marginTop:10}},
      h('div',{style:{fontSize:11,fontWeight:600,color:'#0369A1',marginBottom:6}},'Datos extraídos — revise antes de aplicar:'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:11,background:'#fff',borderRadius:5,padding:'8px 10px',border:'1px solid #BAE6FD'}},
        h('div',null,h('span',{style:{color:'#64748B'}},'Proveedor: '),h('span',{style:{fontWeight:600}},result.proveedor_nombre||'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'RUT prov.: '),h('span',{style:{fontWeight:600}},result.proveedor_rut||'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'N° doc.: '),h('span',{style:{fontWeight:600}},result.numero_documento||'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'Fecha: '),h('span',{style:{fontWeight:600}},result.fecha_emision||'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'Total: '),h('span',{style:{fontWeight:600}},result.total?CLP(result.total):'—')),
        h('div',null,h('span',{style:{color:'#64748B'}},'Líneas: '),h('span',{style:{fontWeight:600}},(result.lineas||[]).length))
      ),
      (result.lineas||[]).length>0&&h('div',{style:{marginTop:6,fontSize:10,color:'#475569'}},
        h('div',{style:{fontWeight:600,marginBottom:3}},'Líneas detectadas:'),
        (result.lineas||[]).slice(0,3).map(function(l,i){
          return h('div',{key:i,style:{padding:'2px 0',borderBottom:'1px solid #E0F2FE'}},
            (i+1)+'. '+l.descripcion+' — '+l.cantidad+' × '+CLP(l.precio_unitario||0));
        }),
        (result.lineas||[]).length>3&&h('div',{style:{color:'#64748B'}},'... y '+(result.lineas.length-3)+' más')
      ),
      h('div',{style:{marginTop:6}},
        h('button',{onClick:function(){setShowRaw(!showRaw);},style:{fontSize:10,color:'#64748B',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}},showRaw?'Ocultar texto extraído':'Ver texto extraído del PDF'),
        showRaw&&h('pre',{style:{fontSize:9,maxHeight:120,overflow:'auto',background:'#F8FAFC',padding:6,borderRadius:4,marginTop:4,whiteSpace:'pre-wrap',wordBreak:'break-word',border:'1px solid #E2E8F0'}},rawText)
      ),
      h('div',{style:{marginTop:8,display:'flex',gap:6,alignItems:'center'}},
        h(Btn,{v:'g',sm:true,onClick:aplicar},'✓ Aplicar al formulario'),
        h('span',{style:{fontSize:10,color:'#64748B'}},'Los datos se pre-rellenarán. Puede editarlos antes de guardar.')
      )
    )
  );
}

function CalcCombustibleInline(){
  var TASAS={diesel:1.5,gasolina:6.0};
  const[tipoComb,setTipoComb]=useState('diesel');
  const[modoCalc,setModoCalc]=useState('utm'); // 'utm' | 'directo'
  // Modo UTM
  const[utm,setUtm]=useState('');
  const[utmLoading,setUtmLoading]=useState(false);
  // Modo directo
  const[impEspDir,setImpEspDir]=useState(''); // monto total imp especifico
  const[modoImpDir,setModoImpDir]=useState('total'); // 'total' | 'por_litro'
  // Comunes
  const[litros,setLitros]=useState('');
  const[totalGuia,setTotalGuia]=useState('');

  function fetchUTM(){
    setUtmLoading(true);
    fetch('https://mindicador.cl/api/utm')
      .then(function(r){return r.json();})
      .then(function(d){var val=d&&d.serie&&d.serie[0]&&d.serie[0].valor;if(val)setUtm(String(Math.round(val)));else alert('No se pudo obtener la UTM.');})
      .catch(function(){alert('Error al conectar con mindicador.cl');})
      .finally(function(){setUtmLoading(false);});
  }

  var litrosNum=parseFloat(litros)||0;
  var totalNum=parseFloat(totalGuia)||0;
  var tasa=TASAS[tipoComb]||1.5;
  var utmNum=parseFloat(utm)||0;
  var impEspDirNum=parseFloat(impEspDir)||0;

  // Calculate specific tax based on mode
  var impEspTotal=modoCalc==='utm'
    ? utmNum*tasa/1000*litrosNum
    : (modoImpDir==='por_litro'?impEspDirNum*litrosNum:impEspDirNum);

  var baseIVA=totalNum-impEspTotal;
  var neto=baseIVA/1.19;
  var iva=neto*0.19;
  var netoPorLitro=litrosNum>0?neto/litrosNum:0;
  var ok=litrosNum>0&&totalNum>0&&baseIVA>0&&(modoCalc==='utm'?utmNum>0:impEspDirNum>0);

  var inpS={width:'100%',padding:'6px 8px',border:'1px solid #FDE68A',borderRadius:4,fontSize:12,boxSizing:'border-box',background:'#FFFDE7'};
  var tabBtn=function(active){return {padding:'5px 10px',borderRadius:4,border:'1px solid '+(active?'#F59E0B':'#FDE68A'),background:active?'#FEF3C7':'transparent',fontWeight:active?700:400,fontSize:11,cursor:'pointer',color:active?'#92400E':'#78350F'};};

  return h('div',null,
    // Tipo combustible
    h('div',{style:{display:'flex',gap:6,marginBottom:8}},
      h('button',{onClick:function(){setTipoComb('diesel');},style:{flex:1,padding:'5px',borderRadius:4,border:'2px solid '+(tipoComb==='diesel'?'#F59E0B':'#FDE68A'),background:tipoComb==='diesel'?'#FEF3C7':'transparent',fontWeight:600,fontSize:11,cursor:'pointer',color:tipoComb==='diesel'?'#92400E':'#78350F'}},'🚛 Diesel (1.5 UTM/m³)'),
      h('button',{onClick:function(){setTipoComb('gasolina');},style:{flex:1,padding:'5px',borderRadius:4,border:'2px solid '+(tipoComb==='gasolina'?'#3B82F6':'#FDE68A'),background:tipoComb==='gasolina'?'#EFF6FF':'transparent',fontWeight:600,fontSize:11,cursor:'pointer',color:tipoComb==='gasolina'?'#1D4ED8':'#78350F'}},'⛽ Gasolina (6 UTM/m³)')
    ),
    // Modo calculo
    h('div',{style:{display:'flex',gap:4,marginBottom:8,background:'#FEF3C7',borderRadius:5,padding:3}},
      h('button',{onClick:function(){setModoCalc('utm');},style:tabBtn(modoCalc==='utm')},'Calcular con UTM'),
      h('button',{onClick:function(){setModoCalc('directo');},style:tabBtn(modoCalc==='directo')},'Ingresar imp. específico')
    ),
    // Inputs comunes
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}},
      h('div',null,
        h('label',{style:{fontSize:10,fontWeight:600,display:'block',marginBottom:2,color:'#92400E'}},'Litros (guía)'),
        h('input',{type:'number',value:litros,onChange:function(e){setLitros(e.target.value);},style:inpS,placeholder:'Ej: 2899'})
      ),
      h('div',null,
        h('label',{style:{fontSize:10,fontWeight:600,display:'block',marginBottom:2,color:'#92400E'}},'Total guía ($)'),
        h('input',{type:'number',value:totalGuia,onChange:function(e){setTotalGuia(e.target.value);},style:inpS,placeholder:'Ej: 4.380.389'})
      )
    ),
    // Modo-specific inputs
    modoCalc==='utm'?h('div',null,
      h('label',{style:{fontSize:10,fontWeight:600,display:'block',marginBottom:2,color:'#92400E'}},'UTM vigente ($)'),
      h('div',{style:{display:'flex',gap:4}},
        h('input',{type:'number',value:utm,onChange:function(e){setUtm(e.target.value);},style:inpS,placeholder:'Ej: 67.294'}),
        h('button',{onClick:fetchUTM,disabled:utmLoading,style:{padding:'4px 8px',background:'#FEF3C7',border:'1px solid #FDE68A',borderRadius:4,fontSize:10,cursor:'pointer',fontWeight:700,color:'#92400E'}},utmLoading?'…':'↻ Obtener UTM')
      ),
      h('div',{style:{fontSize:9,color:'#78350F',marginTop:2}},'Fórmula: '+tasa+' UTM × $'+utmNum+' / 1000 × '+litrosNum+' lts = '+CLP(Math.round(impEspTotal)))
    ):h('div',null,
      h('div',{style:{display:'flex',gap:8,marginBottom:4,alignItems:'center'}},
        h('label',{style:{fontSize:10,fontWeight:600,color:'#92400E'}},'Impuesto específico:'),
        h('label',{style:{fontSize:10,display:'flex',alignItems:'center',gap:3,cursor:'pointer'}},
          h('input',{type:'radio',name:'modoImpDir',checked:modoImpDir==='total',onChange:function(){setModoImpDir('total');}}),
          'Monto total ($)'

        h('label',{style:{fontSize:10,display:'flex',alignItems:'center',gap:3,cursor:'pointer'}},

        )
      ),
      h('input',{type:'number',value:impEspDir,onChange:function(e){setImpEspDir(e.target.value);},style:inpS,
        placeholder:modoImpDir==='total'?'Monto total del imp. específico':'$/lt de imp. específico'}),
      litrosNum>0&&modoImpDir==='por_litro'&&impEspDirNum>0&&h('div',{style:{fontSize:9,color:'#78350F',marginTop:2}},'Total imp. esp.: '+CLP(Math.round(impEspTotal)))
    ),
    // Result
    ok?h('div',{style:{background:'#DCFCE7',borderRadius:6,padding:'8px 12px',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',marginTop:8}},
      h('div',null,
        h('div',{style:{fontSize:9,color:'#166534',textTransform:'uppercase'}},'Precio neto/litro'),
        h('div',{style:{fontSize:22,fontWeight:700,color:'#15803D'}},CLP(Math.round(netoPorLitro)))
      ),
      h('div',{style:{fontSize:10,color:'#166534',lineHeight:1.6}},
        h('div',null,'Imp. esp./lt: '+CLP(Math.round(impEspTotal/litrosNum))),
        h('div',null,'IVA/lt: '+CLP(Math.round(iva/litrosNum))),
        h('div',null,'Base IVA total: '+CLP(Math.round(baseIVA)))
      )
    ):h('div',{style:{fontSize:11,color:'#92400E',fontStyle:'italic',marginTop:6}},'Complete los campos para calcular')
  );
}

// ── OC RECIBIR BODEGA MODAL ──
function OCRecibirModal(p){
  const bodegas=(p.m.bodegas||[]).filter(function(b){return b.activo;});
  const prods=(p.m.prods||[]).filter(function(x){return x.activo;});
  const combTipos=(p.m.combTipos||[]).filter(function(t){return t.activo;});
  const combEstanques=(p.m.combEstanques||[]).filter(function(e){return e.activo;});
  const lineas=Array.isArray(p.oc&&p.oc.lineas)?p.oc.lineas:[];
  const lineasBodega=lineas.filter(function(l){return l.ingresa_bodega||l.ingresa_bodega===null;});

  // Detect if a line is combustible by matching subcategoria or description with comb_tipos
  function esCombustible(l){
    var nombres=combTipos.map(function(t){return t.nombre.toLowerCase();});
    var desc=(l.descripcion||'').toLowerCase();
    var subcat=(l.subcategoria_nombre||'').toLowerCase();
    return nombres.some(function(n){return desc.includes(n)||subcat.includes(n)||n.includes(desc);});
  }

  // Find matching comb tipo for a line
  function getCombTipo(l){
    var desc=(l.descripcion||'').toLowerCase();
    var subcat=(l.subcategoria_nombre||'').toLowerCase();
    return combTipos.find(function(t){
      var n=t.nombre.toLowerCase();
      return desc.includes(n)||subcat.includes(n)||n.includes(desc);
    });
  }

  // Separate lines
  const lineasComb=lineasBodega.filter(esCombustible);
  const lineasInv=lineasBodega.filter(function(l){return !esCombustible(l);});

  // State for inventory lines
  const initMap={};lineasInv.forEach(function(l){initMap[l.detalle_id]=str(l.producto_id||'');});
  const[prodMap,setProdMap]=useState(initMap);
  const[factorMap,setFactorMap]=useState({});
  const[bodega_id,setBodega]=useState('');

  // State for combustible lines: {detalle_id: estanque_id}
  const initEstMap={};lineasComb.forEach(function(l){initEstMap[l.detalle_id]='';});
  const[estMap,setEstMap]=useState(initEstMap);

  const[err,setErr]=useState('');const[saving,setSaving]=useState(false);

  function setProd(did,val){setProdMap(function(m){var n=Object.assign({},m);n[did]=val;return n;});}
  function setFactor(did,val){setFactorMap(function(m){var n=Object.assign({},m);n[did]=val;return n;});}
  function setEst(did,val){setEstMap(function(m){var n=Object.assign({},m);n[did]=val;return n;});}

  function getEffectiveFactor(did,selProd){
    if(factorMap[did]!==undefined&&factorMap[did]!=='')return parseFloat(factorMap[did])||1;
    return parseFloat((selProd||{}).factor_conversion||1);
  }

  const lineasInvListas=lineasInv.filter(function(l){return !!prodMap[l.detalle_id];});
  const lineasCombListas=lineasComb.filter(function(l){return !!estMap[l.detalle_id];});
  const totalListas=lineasInvListas.length+lineasCombListas.length;

  function save(){
    setErr('');
    if(totalListas===0){setErr('Debe asignar destino a al menos una linea.');return;}
    setSaving(true);
    var payload={
      bodega_id:bodega_id||null,
      prod_map:prodMap,
      factor_map:factorMap,
      comb_map:estMap  // {detalle_id: estanque_id}
    };
    api('/ordenes-compra/'+p.oc.oc_id+'/recibir-bodega','POST',payload,p.tok)
      .then(function(){p.onSave();})
      .catch(function(ex){setErr(ex.message);})
      .finally(function(){setSaving(false);});
  }

  var thStyle={textAlign:'left',padding:'4px 6px',background:'#F1F5F9',fontSize:11};
  var tdStyle={padding:'4px 6px',fontSize:11,borderBottom:'1px solid #E2E8F0'};

  return h(Modal,{title:'Recibir en Bodega — '+str(p.oc.numero_oc),onClose:p.onClose,lg:true},
    h(EB,null,
      h('div',{className:'mb'},
        h('div',{className:'al al-i',style:{marginBottom:10}},
          h('strong',null,'Proceso de recepcion: '),
          'Al confirmar se generaran los movimientos correspondientes usando la fecha del documento tributario ('+fmtD(p.oc.fecha_documento)+').'
        ),
        lineasBodega.length===0&&h('div',{className:'al al-e'},'No hay lineas marcadas con "A Bodega".'),

        // COMBUSTIBLE LINES
        lineasComb.length>0&&h('div',{style:{marginBottom:14}},
          h('div',{style:{fontWeight:600,fontSize:13,marginBottom:6,color:'#D97706'}},'⛽ Lineas de combustible ('+lineasComb.length+') — ingreso a estanque'),
          h('div',{style:{fontSize:11,color:'#64748B',marginBottom:6}},'Seleccione el estanque de destino para cada linea.'),
          h('table',{style:{width:'100%',fontSize:11,borderCollapse:'collapse'}},
            h('thead',null,h('tr',null,
              h('th',{style:thStyle},'Detalle'),
              h('th',{style:thStyle},'Litros'),
              h('th',{style:thStyle},'Tipo combustible'),
              h('th',{style:thStyle},'Estanque destino'),
              h('th',{style:Object.assign({},thStyle,{textAlign:'right'})},'Costo/lt')
            )),
            h('tbody',null,...lineasComb.map(function(l,i){
              var ct=getCombTipo(l);
              var estsFilt=ct?combEstanques.filter(function(e){return !e.tipo_combustible_id||e.tipo_combustible_id===ct.tipo_id;}):combEstanques;
              return h('tr',{key:i},
                h('td',{style:tdStyle},l.descripcion||'—'),
                h('td',{style:Object.assign({},tdStyle,{textAlign:'right',fontFamily:'monospace'})},(parseFloat(l.cantidad)||0).toFixed(1)),
                h('td',{style:tdStyle},ct?h(Bg,{c:'y'},ct.nombre):'—'),
                h('td',{style:tdStyle},
                  h('select',{value:estMap[l.detalle_id]||'',onChange:function(e){setEst(l.detalle_id,e.target.value);},
                    style:{width:'100%',padding:'3px 5px',fontSize:11,border:'1px solid #CBD5E1',borderRadius:4}},
                    h('option',{value:''},'— Seleccione estanque —'),
                    estsFilt.map(function(e){return h('option',{key:e.estanque_id,value:e.estanque_id},e.nombre+(e.litros_disponibles?' ('+parseFloat(e.litros_disponibles).toFixed(0)+' lts)':''));})

              );

        ),

function ImportModal(p){
  const[preview,setPreview]=useState([]);const[errors,setErrors]=useState([]);
  const[importing,setImporting]=useState(false);const[result,setResult]=useState(null);const[step,setStep]=useState('upload');
  function onFile(e){
    const f=e.target.files&&e.target.files[0];if(!f)return;
    setErrors([]);setPreview([]);setResult(null);setStep('upload');
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        if(!rows||rows.length<2){setErrors(['El archivo no tiene datos.']);return;}
        const headers=rows[0].map(function(h){return String(h||'').trim();});
        const campos=p.config.campos;
        const missing=campos.filter(function(c){return c.req&&!headers.includes(c.header);}).map(function(c){return c.header;});
        if(missing.length){setErrors(['Columnas obligatorias faltantes: '+missing.join(', ')]);return;}
        const parsed=rows.slice(1).map(function(row,i){
          const obj={__row:i+2};
          campos.forEach(function(c){const idx2=headers.indexOf(c.header);obj[c.k]=idx2>=0?String(row[idx2]||'').trim():'';});
          return obj;
        }).filter(function(r){return Object.values(r).some(function(v,i2){return i2>0&&v;});});
        const errs=[];const valid=[];
        parsed.forEach(function(r){
          const rowErrs=[];
          campos.forEach(function(c){if(c.req&&!r[c.k])rowErrs.push('Fila '+r.__row+': "'+c.header+'" es obligatorio.');});
          if(rowErrs.length)errs.push(...rowErrs);else valid.push(r);
        });
        setErrors(errs);setPreview(valid);setStep('preview');
      }catch(ex){setErrors(['Error al leer: '+ex.message]);}
    };
    reader.readAsArrayBuffer(f);
  }
  function downloadTemplate(){
    const hs=p.config.campos.map(function(c){return c.header;});
    const ex=p.config.campos.map(function(c){return c.example||'';});
    const ws=XLSX.utils.aoa_to_sheet([hs,[...ex]]);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Plantilla');
    XLSX.writeFile(wb,'plantilla_'+p.config.titulo.toLowerCase().replace(/ /g,'_')+'.xlsx');
  }
  function doImport(){
    setImporting(true);setResult(null);
    Promise.all(preview.map(function(row){
      var body={};
      p.config.campos.forEach(function(c){
        if(c.k==='empresa_rut')return;
        var v=row[c.k];
        if(v===''||v===undefined||v===null){body[c.k]=null;}
        else if(!isNaN(v)&&String(v).trim()!==''&&String(parseInt(v))===String(v).trim()){body[c.k]=parseInt(v);}
        else{body[c.k]=v;}
      });
      if(p.config.resolveEmpresa&&body.empresa_id){
        var empVal=String(body.empresa_id).trim();
        var isPureInt=/^\d+$/.test(empVal);
        if(!isPureInt){
          // It's a RUT — resolve to ID
          return api('/empresas/lookup/rut/'+encodeURIComponent(empVal),'GET',null,p.tok).then(function(r){
            body.empresa_id=r.empresa_id;
            return api('/'+p.config.endpoint,'POST',body,p.tok).then(function(){return{ok:true};});
          }).catch(function(ex){return{ok:false,msg:ex.message||String(ex),row:row.__row};});
        }
        // It's already a numeric ID — use as-is (already cast to int above)
      }
      return api('/'+p.config.endpoint,'POST',body,p.tok).then(function(){return{ok:true};}).catch(function(ex){return{ok:false,msg:ex.message||String(ex),row:row.__row};});
    })).then(function(results){
      const ok=results.filter(function(r){return r.ok;}).length;
      const fail=results.filter(function(r){return !r.ok;});
      setResult({ok,fail});setStep('done');p.onRefresh&&p.onRefresh();
    }).finally(function(){setImporting(false);});
  }
  return h(Modal,{title:'Importar — '+p.config.titulo,onClose:p.onClose},
    h(EB,null,
      h('div',{className:'mb'},
        step==='upload'&&h('div',null,
          h('div',{className:'al al-i',style:{marginBottom:10}},'Descargue la plantilla, completela y subala para importar masivamente.'),
          h(Btn,{v:'g',onClick:downloadTemplate},'⬇ Descargar plantilla Excel'),
          h('hr',{className:'divider'}),
          h(FR,{label:'Archivo Excel (.xlsx) o CSV'},h('input',{type:'file',accept:'.xlsx,.xls,.csv',onChange:onFile,style:{padding:'4px 0'}})),
          errors.length>0&&h('div',{className:'al al-e',style:{marginTop:8}},errors.slice(0,6).join('\n'))
        ),
        step==='preview'&&h('div',null,
          errors.length>0&&h('div',{className:'al al-w',style:{marginBottom:8}},errors.length+' fila(s) con errores seran ignoradas.'),
          h('div',{className:'al al-s',style:{marginBottom:8}},preview.length+' registro(s) listos para importar.'),
          h('div',{style:{overflowX:'auto',maxHeight:260,overflowY:'auto'}},

function BarChart(p){
  var data=p.data||[];var ht=p.height||120;var w=p.width||'100%';
  if(!data.length)return h('div',{style:{color:'#94A3B8',fontSize:12,textAlign:'center',padding:16}},'Sin datos');
  var maxVal=Math.max.apply(null,data.map(function(d){return d.value||0;}));
  if(!maxVal)return h('div',{style:{color:'#94A3B8',fontSize:12,textAlign:'center',padding:16}},'Sin datos');
  var barW=Math.max(20,Math.min(60,Math.floor(300/data.length)));
  var gap=4;
  var totalW=data.length*(barW+gap);
  return h('div',{style:{overflowX:'auto'}},
    h('svg',{width:Math.max(totalW,200),height:ht+30,style:{display:'block'}},
      data.map(function(d,i){
        var bh=Math.round(((d.value||0)/maxVal)*ht);
        var x=i*(barW+gap);
        var y=ht-bh;
        var color=p.colors?p.colors[i%p.colors.length]:(d.color||'#3B82F6');
        return h('g',{key:i},
          h('rect',{x:x,y:y,width:barW,height:bh,fill:color,rx:3}),
          h('text',{x:x+barW/2,y:ht+12,textAnchor:'middle',fontSize:9,fill:'#64748B'},
            (d.label||'').substring(0,8)+(d.label&&d.label.length>8?'..':'')),
          bh>14&&h('text',{x:x+barW/2,y:y+11,textAnchor:'middle',fontSize:9,fill:'#fff',fontWeight:600},
            d.value>999?(d.value/1000).toFixed(1)+'k':Math.round(d.value))
        );
      })
    )
  );
}

function DonutChart(p){
  var data=(p.data||[]).filter(function(d){return d.value>0;});
  if(!data.length)return h('div',{style:{color:'#94A3B8',fontSize:12,textAlign:'center',padding:16}},'Sin datos');
  var total=data.reduce(function(s,d){return s+d.value;},0);
  var cx=70,cy=70,r=55,ri=32;
  var colors=['#3B82F6','#F59E0B','#10B981','#EF4444','#8B5CF6','#06B6D4','#F97316'];
  var paths=[];var angle=-Math.PI/2;
  data.forEach(function(d,i){
    var sweep=(d.value/total)*Math.PI*2;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    var xi1=cx+ri*Math.cos(angle-sweep),yi1=cy+ri*Math.sin(angle-sweep);
    var xi2=cx+ri*Math.cos(angle),yi2=cy+ri*Math.sin(angle);
    var large=sweep>Math.PI?1:0;
    paths.push({path:`M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${large},0 ${xi1},${yi1} Z`,color:colors[i%colors.length],label:d.label,pct:Math.round(d.value/total*100)});
  });
  return h('div',{style:{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}},
    h('svg',{width:140,height:140},
      paths.map(function(p2,i){return h('path',{key:i,d:p2.path,fill:p2.color});}),
      h('text',{x:cx,y:cy+5,textAnchor:'middle',fontSize:11,fontWeight:600,fill:'#1E293B'},total>999?(total/1000).toFixed(1)+'k':Math.round(total))
    ),
    h('div',{style:{fontSize:11}},
      paths.map(function(p2,i){return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:4,marginBottom:3}},
        h('div',{style:{width:10,height:10,borderRadius:2,background:p2.color,flexShrink:0}}),
        h('span',{style:{color:'#475569'}},p2.label+': '),
        h('span',{style:{fontWeight:600}},p2.pct+'%')
      );})
    )
  );
}

function CombEstanques(p){
  const[items,setItems]=useState([]);
  const[show,setShow]=useState(false);
  const[editing,setEditing]=useState(null);
  const[msg,setMsg]=useState('');
  const[isErr,setIsErr]=useState(false);
  // form fields
  const[empresa,setEmpresa]=useState('');
  const[codigo,setCodigo]=useState('');
  const[nombre,setNombre]=useState('');
  const[tipoEst,setTipoEst]=useState('FIJO');
  const[tipoComb,setTipoComb]=useState('');
  const[capMax,setCapMax]=useState('');
  const[ubic,setUbic]=useState('');
  const[obs,setObs]=useState('');

  const empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  const tipos=(p.m.combTipos||[]).filter(function(t){return t.activo;});

  function load(){
    api('/comb/estanques','GET',null,p.tok)
      .then(function(r){setItems(Array.isArray(r)?r:[]);})
      .catch(function(ex){setMsg('Error al cargar: '+ex.message);setIsErr(true);});
  }
  useEffect(load,[p.tok]);

  function openNew(){
    setEditing(null);setMsg('');setIsErr(false);
    setEmpresa('');setCodigo('');setNombre('');setTipoEst('FIJO');
    setTipoComb('');setCapMax('');setUbic('');setObs('');
    setShow(true);
  }
  function openEdit(r){
    setEditing(r);setMsg('');setIsErr(false);
    setEmpresa(String(r.empresa_id||''));
    setCodigo(r.codigo||'');setNombre(r.nombre||'');
    setTipoEst(r.tipo_estanque||'FIJO');
    setTipoComb(r.tipo_combustible_id?String(r.tipo_combustible_id):'');
    setCapMax(r.capacidad_max?String(r.capacidad_max):'');
    setUbic(r.ubicacion||'');setObs(r.observaciones||'');
    setShow(true);
  }

  function save(){
    setMsg('');setIsErr(false);
    if(!empresa){setMsg('Seleccione una empresa');setIsErr(true);return;}
    if(!codigo.trim()){setMsg('El codigo es obligatorio');setIsErr(true);return;}
    if(!nombre.trim()){setMsg('El nombre es obligatorio');setIsErr(true);return;}
    var body={
      empresa_id:parseInt(empresa),
      codigo:codigo.trim(),
      nombre:nombre.trim(),
      tipo_estanque:tipoEst||'FIJO',
      tipo_combustible_id:tipoComb?parseInt(tipoComb):null,
      capacidad_max:capMax?parseFloat(capMax):null,
      ubicacion:ubic||null,
      observaciones:obs||null
    };
    var url=editing?'/comb/estanques/'+editing.estanque_id:'/comb/estanques';
    var method=editing?'PUT':'POST';
    api(url,method,body,p.tok)
      .then(function(){setShow(false);load();setMsg('Guardado correctamente');setIsErr(false);})
      .catch(function(ex){setMsg('Error: '+ex.message);setIsErr(true);});
  }

  var inpStyle={width:'100%',padding:'8px 10px',border:'1px solid #CBD5E1',borderRadius:5,fontSize:13,boxSizing:'border-box'};
  var lblStyle={fontSize:12,fontWeight:600,color:'#475569',display:'block',marginBottom:4};

  return h('div',null,
    msg&&h('div',{className:'al '+(isErr?'al-e':'al-i'),style:{marginBottom:8}},msg),
    h('div',{style:{marginBottom:10}},
      h(Btn,{onClick:openNew},'+ Nuevo Estanque')
    ),
    h('div',{className:'card'},
      h(TBL,{cols:[
        {lbl:'Empresa',k:'empresa_nombre'},
        {lbl:'Codigo',k:'codigo',mono:true},
        {lbl:'Nombre',k:'nombre'},
        {lbl:'Tipo',k:'tipo_estanque'},
        {lbl:'Combustible',render:function(r){return r.tipo_comb_nombre||'—';}},
        {lbl:'Cap. max.',render:function(r){return r.capacidad_max?parseFloat(r.capacidad_max).toFixed(0)+' lts':'—';}},
        {lbl:'Stock',render:function(r){return r.litros_disponibles?parseFloat(r.litros_disponibles).toFixed(1)+' lts':'0 lts';}},
        {lbl:'Estado',render:function(r){return h(Bg,{c:r.activo?'g':'r'},r.activo?'Activo':'Inactivo');}},
        {lbl:'',render:function(r){return h('div',{style:{display:'flex',gap:3}},
          h(Btn,{v:'g',sm:true,onClick:function(){openEdit(r);}},'✏'),
          h(Btn,{v:r.activo?'a':'g',sm:true,onClick:function(){
            api('/comb/estanques/'+r.estanque_id+'/activo','PATCH',{},p.tok).then(load).catch(function(ex){alert(ex.message);});
          }},r.activo?'Inactivar':'Activar'),
          h(Btn,{v:'d',sm:true,onClick:function(){
            if(!window.confirm('Eliminar estanque "'+r.nombre+'"? Esta accion no se puede deshacer.'))return;
            api('/comb/estanques/'+r.estanque_id,'DELETE',null,p.tok).then(load).catch(function(ex){alert('Error: '+ex.message);});
          }},'Eliminar')
        );}}
      ],rows:items,empty:'Sin estanques registrados'})
    ),
    show&&h(Modal,{title:(editing?'Editar':'Nuevo')+' Estanque',onClose:function(){setShow(false);},lg:true},
      h('div',{style:{padding:'4px 0'}},
        isErr&&h('div',{className:'al al-e',style:{marginBottom:12}},msg),
        h('div',{className:'g2',style:{marginBottom:10}},
          h('div',null,
            h('label',{style:lblStyle},'Empresa *'),
            h('select',{value:empresa,onChange:function(e){setEmpresa(e.target.value);},style:inpStyle},
              h('option',{value:''},'Seleccione...'),
              empresas.map(function(e){return h('option',{key:e.empresa_id,value:String(e.empresa_id)},e.razon_social);})
            )
          ),
          h('div',null,
            h('label',{style:lblStyle},'Codigo *'),
            h('input',{type:'text',value:codigo,onChange:function(e){setCodigo(e.target.value);},placeholder:'EST-001',style:inpStyle})

            h('input',{type:'text',value:nombre,onChange:function(e){setNombre(e.target.value);},placeholder:'Estanque Principal',style:inpStyle})
          ),
          h('div',null,
            h('label',{style:lblStyle},'Tipo'),
            h('select',{value:tipoEst,onChange:function(e){setTipoEst(e.target.value);},style:inpStyle},
              h('option',{value:'FIJO'},'Estanque fijo'),

          h('div',null,

            h('select',{value:tipoComb,onChange:function(e){setTipoComb(e.target.value);},style:inpStyle},
              h('option',{value:''},'Seleccione...'),

        )
      )

function CombCierreQuincenal(p){
  var TODAY=new Date().toISOString().split('T')[0];
  const[cierres,setCierres]=useState([]);
  const[provisorios,setProvisiorios]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[selMovIds,setSelMovIds]=useState([]);
  const[form,setForm]=useState({empresa_id:'',proveedor_id:'',numero_factura:'',fecha_factura:TODAY,base_afecta:'',ie_total:'',iva:'',total_factura:'',observaciones:''});
  const[msg,setMsg]=useState('');const[isErr,setIsErr]=useState(false);
  const[procesando,setProcesando]=useState(null);

  const empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  const provs=(p.m.provs||[]).filter(function(p2){return p2.activo;});

  function loadCierres(){
    api('/comb/cierres','GET',null,p.tok).then(function(r){setCierres(Array.isArray(r)?r:[]);}).catch(function(){});
  }
  function loadProvisiorios(empId){
    var qs=empId?'?empresa_id='+empId:'';
    api('/comb/provisorios'+qs,'GET',null,p.tok).then(function(r){setProvisiorios(Array.isArray(r)?r:[]);}).catch(function(){});
  }
  useEffect(function(){loadCierres();loadProvisiorios('');}, [p.tok]);

  function toggleSel(mid){
    setSelMovIds(function(ids){
      return ids.includes(mid)?ids.filter(function(x){return x!==mid;}):[...ids,mid];
    });
  }
  function selectAll(){setSelMovIds(provisorios.map(function(r){return r.mov_id;}));}

  var litrosSelec=provisorios.filter(function(r){return selMovIds.includes(r.mov_id);}).reduce(function(s,r){return s+parseFloat(r.litros||0);},0);

  function calcNetoPorLitro(){
    var ba=parseFloat(form.base_afecta)||0;
    var lts=litrosSelec||parseFloat(form.litros_manual)||0;
    return lts>0?ba/lts:0;
  }

  function crearCierre(){
    setMsg('');setIsErr(false);
    if(!selMovIds.length){setMsg('Seleccione al menos un ingreso provisorio');setIsErr(true);return;}
    if(!form.numero_factura){setMsg('Ingrese el número de factura');setIsErr(true);return;}
    if(!form.base_afecta){setMsg('Ingrese la base afecta de la factura');setIsErr(true);return;}
    var payload=Object.assign({},form,{
      mov_ids:selMovIds,
      litros_total:litrosSelec,
      empresa_id:form.empresa_id||null,
      proveedor_id:form.proveedor_id||null,
      base_afecta:parseFloat(form.base_afecta),
      ie_total:parseFloat(form.ie_total||0),
      iva:parseFloat(form.iva||0),
      total_factura:parseFloat(form.total_factura||0)
    });
    api('/comb/cierres','POST',payload,p.tok).then(function(){
      setShowForm(false);setSelMovIds([]);
      setMsg('Cierre creado. Presione "Procesar" para aplicar el ajuste.');setIsErr(false);
      loadCierres();loadProvisiorios('');
    }).catch(function(ex){setMsg('Error: '+ex.message);setIsErr(true);});
  }

  function procesar(cierreId){
    if(!window.confirm('Esto ajustará el CPP y recalculará los costos de distribución retroactivamente. ¿Confirmar?'))return;
    setProcesando(cierreId);
