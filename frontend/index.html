<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPZ Bodegas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:#F1F4F9;color:#1E293B;height:100vh;overflow:hidden}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #CBD5E1;border-radius:6px;width:100%;background:#fff;color:#1E293B;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
button{font-family:inherit;cursor:pointer;border:none;transition:all .15s}
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748B;background:#F8FAFC;border-bottom:1px solid #E2E8F0;text-align:left;white-space:nowrap}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid #F1F4F9;color:#1E293B;vertical-align:middle}
tr:hover>td{background:#F8FAFC}
#root{display:flex;height:100vh;overflow:hidden}
.sb{width:220px;background:#0F172A;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #1E293B}
.sb-logo h1{color:#F8FAFC;font-size:13px;font-weight:700;line-height:1.3}
.sb-logo p{color:#475569;font-size:11px;margin-top:2px}
.sb-sep{height:1px;background:#1E293B;margin:5px 10px}
.sb-lbl{padding:12px 14px 3px;color:#475569;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.nav{display:flex;align-items:center;gap:8px;padding:7px 14px;color:#94A3B8;cursor:pointer;font-size:13px;border-radius:6px;margin:1px 6px;transition:all .12s}
.nav:hover{background:#1E293B;color:#E2E8F0}
.nav.on{background:#1D4ED8;color:#EFF6FF;font-weight:500}
.nav .cnt{margin-left:auto;background:#EF4444;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:11px 22px;background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:16px;font-weight:700;color:#0F172A}
.topbar-r{display:flex;align-items:center;gap:10px;font-size:12px;color:#64748B}
.content{flex:1;overflow-y:auto;padding:20px 22px}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin-bottom:16px}
.card-h{padding:13px 18px;border-bottom:1px solid #F1F4F9;display:flex;align-items:center;justify-content:space-between}
.card-h h3{font-size:14px;font-weight:600;color:#0F172A}
.card-t{overflow-x:auto}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
.kpi{border-radius:10px;padding:15px 18px}
.kpi-b{background:#EFF6FF;border:1px solid #BFDBFE}
.kpi-g{background:#F0FDF4;border:1px solid #BBF7D0}
.kpi-a{background:#FFFBEB;border:1px solid #FDE68A}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-b .kpi-lbl{color:#1D4ED8}.kpi-g .kpi-lbl{color:#15803D}.kpi-a .kpi-lbl{color:#92400E}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.kpi-b .kpi-val{color:#1E40AF}.kpi-g .kpi-val{color:#166534}.kpi-a .kpi-val{color:#78350F}
.kpi-sub{font-size:11px;margin-top:3px;opacity:.7}
.btn{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.btn-p{background:#1D4ED8;color:#fff}.btn-p:hover{background:#1E40AF}
.btn-g{background:#fff;color:#475569;border:1px solid #CBD5E1}.btn-g:hover{background:#F8FAFC}
.btn-d{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}.btn-d:hover{background:#FEE2E2}
.btn-sm{padding:4px 9px;font-size:11px}
.bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.bg-g{background:#DCFCE7;color:#166534}.bg-r{background:#FEE2E2;color:#991B1B}
.bg-b{background:#DBEAFE;color:#1E40AF}.bg-a{background:#FEF3C7;color:#92400E}
.bg-gray{background:#F1F5F9;color:#475569}
.fr{margin-bottom:12px}
.fl{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.fl .req{color:#EF4444}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:32px 14px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:660px;box-shadow:0 20px 50px rgba(0,0,0,.22)}
.modal-lg{max-width:760px}
.mh{padding:15px 20px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:15px;font-weight:700;color:#0F172A}
.mc{font-size:20px;background:none;border:none;cursor:pointer;color:#64748B;line-height:1;padding:3px 7px;border-radius:4px}
.mb{padding:20px;max-height:68vh;overflow-y:auto}
.mf{padding:13px 20px;border-top:1px solid #E2E8F0;display:flex;justify-content:flex-end;gap:8px}
.al{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:12px}
.al-e{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}
.al-w{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;cursor:pointer}
.al-s{background:#DCFCE7;color:#166534;border:1px solid #BBF7D0}
.tb{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.tb input,.tb select{width:auto;min-width:150px}
.mono{font-family:'Courier New',monospace;font-size:12px}
.tr{text-align:right}.tc{text-align:center}
.ep{color:#16A34A;font-weight:700}.em{color:#DC2626;font-weight:700}
.empty{padding:32px;text-align:center;color:#94A3B8;font-size:13px}
.spin{display:flex;align-items:center;justify-content:center;height:200px;color:#64748B}
.err-box{padding:28px;text-align:center;background:#FEF2F2;border-radius:10px;margin:20px;color:#991B1B}
.tab-bar{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid #E2E8F0}
.tab{padding:8px 16px;font-size:13px;font-weight:400;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;color:#64748B}
.tab.on{font-weight:700;border-bottom-color:#1D4ED8;color:#1D4ED8}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {useState,useEffect,useMemo,useCallback,Component}=React;
const h=React.createElement;
const CLP=n=>new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(n||0);
const N=(n,d=1)=>new Intl.NumberFormat('es-CL',{maximumFractionDigits:d}).format(n||0);
const TODAY=new Date().toISOString().split('T')[0];
const str=v=>v===null||v===undefined?'':String(v);

// ── API ────────────────────────────────────────────────────
function api(path,method,body,token){
  method=method||'GET';
  var opts={method,headers:{'Content-Type':'application/json'}};
  if(token)opts.headers['Authorization']='Bearer '+token;
  if(body)opts.body=JSON.stringify(body);
  return fetch('/api'+path,opts).then(function(r){
    return r.json().then(function(data){
      if(!r.ok)throw new Error(data.error||'Error '+r.status);
      return data;
    }).catch(function(){
      if(!r.ok)throw new Error('Error '+r.status);
      throw new Error('Respuesta inválida del servidor');
    });
  });
}

// ── ERROR BOUNDARY ─────────────────────────────────────────
class EB extends Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e.message||'Error inesperado'};}
  componentDidCatch(e,i){console.error('EB:',e,i);}
  render(){
    if(this.state.err){
      return h('div',{className:'err-box'},
        h('div',{style:{fontSize:24,marginBottom:8}},'⚠'),
        h('div',{style:{fontWeight:700,marginBottom:6}},'Ocurrió un error'),
        h('div',{style:{fontSize:12,color:'#64748B',marginBottom:14}},this.state.err),
        h('button',{className:'btn btn-g',onClick:()=>this.setState({err:null})},'Reintentar')
      );
    }
    return this.props.children;
  }
}

// ── COMPONENTES BASE ───────────────────────────────────────
const Bg=function(p){return h('span',{className:'bg bg-'+(p.c||'g')},p.children);};
const Btn=function(p){
  return h('button',{type:p.type||'button',onClick:p.onClick,disabled:p.disabled,
    className:'btn btn-'+(p.v||'p')+(p.sm?' btn-sm':''),
    style:{opacity:p.disabled?.5:1}},p.children);
};
function FR(p){
  return h('div',{className:'fr'},
    h('label',{className:'fl'},p.label,p.req&&h('span',{className:'req'},' *')),
    p.children
  );
}
function Inp(p){
  return h('input',{value:str(p.value),onChange:function(e){p.onChange(e.target.value);},
    type:p.type||'text',placeholder:p.ph||'',min:p.min,step:p.step});
}
function Sel(p){
  return h('select',{value:str(p.value),onChange:function(e){p.onChange(e.target.value);}},p.children);
}
function Modal(p){
  return h('div',{className:'ov'},
    h('div',{className:'modal'+(p.lg?' modal-lg':'')},
      h('div',{className:'mh'},h('h3',null,p.title),h('button',{className:'mc',onClick:p.onClose},'×')),
      p.children
    )
  );
}
function TBL(p){
  var rows=p.rows||[];
  if(!rows.length)return h('div',{className:'empty'},p.empty||'Sin datos');
  return h('div',{className:'card-t'},
    h('table',null,
      h('thead',null,h('tr',null,p.cols.map(function(c,i){
        return h('th',{key:i,style:{textAlign:c.r?'right':'left'}},c.lbl);
      }))),
      h('tbody',null,rows.map(function(r,i){
        return h('tr',{key:i,style:{background:i%2?'#FAFAFA':''}},
          p.cols.map(function(c,j){
            return h('td',{key:j,style:{textAlign:c.r?'right':'left',fontFamily:c.mono?'Courier New':undefined,fontSize:c.mono?12:undefined}},
              c.render?c.render(r,i):str(r[c.k]||'—')
            );
          })
        );
      }))
    )
  );
}

// ── LOGIN ──────────────────────────────────────────────────
function LoginPage(p){
  var _s=useState('admin@lpz.cl'),email=_s[0],setEmail=_s[1];
  var _s2=useState('admin123'),pass=_s2[0],setPass=_s2[1];
  var _s3=useState(''),err=_s3[0],setErr=_s3[1];
  var _s4=useState(false),loading=_s4[0],setLoading=_s4[1];
  function submit(e){
    e.preventDefault();setErr('');setLoading(true);
    api('/auth/login','POST',{email:email,password:pass}).then(function(r){
      localStorage.setItem('lpz_token',r.token);
      localStorage.setItem('lpz_user',JSON.stringify(r.usuario));
      p.onLogin(r.token,r.usuario);
    }).catch(function(ex){setErr(ex.message);}).finally(function(){setLoading(false);});
  }
  return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0F172A'}},
    h('div',{style:{background:'#fff',borderRadius:14,padding:'40px 36px',width:360,boxShadow:'0 20px 60px rgba(0,0,0,.3)'}},
      h('h1',{style:{fontSize:20,fontWeight:700,marginBottom:4}},'LPZ Bodegas'),
      h('p',{style:{color:'#64748B',fontSize:13,marginBottom:24}},'Leonidas Poo Zenteno y Cía. Ltda.'),
      err&&h('div',{className:'al al-e'},err),
      h('form',{onSubmit:submit},
        h(FR,{label:'Correo'},h(Inp,{value:email,onChange:setEmail,type:'email'})),
        h(FR,{label:'Contraseña'},h(Inp,{value:pass,onChange:setPass,type:'password'})),
        h('button',{type:'submit',className:'btn btn-p',style:{width:'100%',justifyContent:'center',marginTop:8},disabled:loading},loading?'Ingresando...':'Ingresar')
      )
    )
  );
}

// ── DASHBOARD ──────────────────────────────────────────────
function Dashboard(p){
  var _s=useState(null),stats=_s[0],setStats=_s[1];
  var _s2=useState([]),movs=_s2[0],setMovs=_s2[1];
  var _s3=useState(true),loading=_s3[0],setLoading=_s3[1];
  useEffect(function(){
    Promise.all([
      api('/stock/consolidado','GET',null,p.tok),
      api('/movimientos','GET',null,p.tok)
    ]).then(function(results){
      var rows=results[0]||[];
      var ms=results[1]||[];
      setStats({total:rows.reduce(function(s,r){return s+parseFloat(r.valor_total||0);},0),prods:rows.length});
      setMovs(ms);
    }).catch(function(){}).finally(function(){setLoading(false);});
  },[p.tok]);
  if(loading)return h('div',{className:'spin'},'Cargando...');
  return h('div',null,
    h('div',{className:'kpis'},
      h('div',{className:'kpi kpi-b'},h('div',{className:'kpi-lbl'},'Valor total stock'),h('div',{className:'kpi-val'},CLP(stats&&stats.total||0)),h('div',{className:'kpi-sub'},'Costo promedio ponderado')),
      h('div',{className:'kpi kpi-'+(p.alerts>0?'a':'g'),style:{cursor:'pointer'},onClick:function(){p.setView('stock');}},h('div',{className:'kpi-lbl'},'Alertas stock'),h('div',{className:'kpi-val'},p.alerts),h('div',{className:'kpi-sub'},'Bajo mínimo')),
      h('div',{className:'kpi kpi-g'},h('div',{className:'kpi-lbl'},'Productos en stock'),h('div',{className:'kpi-val'},stats&&stats.prods||0),h('div',{className:'kpi-sub'},'Con existencias')),
      h('div',{className:'kpi kpi-b'},h('div',{className:'kpi-lbl'},'Movimientos'),h('div',{className:'kpi-val'},movs.length),h('div',{className:'kpi-sub'},'Total registrados')),
    ),
    p.alerts>0&&h('div',{className:'al al-w',onClick:function(){p.setView('stock');}},
      '⚠ '+p.alerts+' producto(s) con stock bajo el mínimo — click para ver →'
    ),
    h('div',{className:'card'},
      h('div',{className:'card-h'},h('h3',null,'Últimos movimientos')),
      h(TBL,{cols:[
        {lbl:'N°',k:'movimiento_id'},{lbl:'Fecha',k:'fecha'},
        {lbl:'Tipo',render:function(r){return h(Bg,{c:r.tipo_movimiento==='INGRESO'?'g':'r'},r.tipo_movimiento);}},
        {lbl:'Bodega',k:'bodega_nombre'},{lbl:'Faena',k:'faena_nombre'},{lbl:'Equipo',k:'equipo_nombre'},
        {lbl:'Total',r:true,render:function(r){return CLP(r.total||0);}},
      ],rows:movs.slice(0,10),empty:'Sin movimientos'})
    )
  );
}

// ── INGRESO ────────────────────────────────────────────────
function IngresoView(p){
  var bodegas=p.masters&&Array.isArray(p.masters.bodegas)?p.masters.bodegas:[];
  var prods=p.masters&&Array.isArray(p.masters.prods)?p.masters.prods:[];
  var provs=p.masters&&Array.isArray(p.masters.provs)?p.masters.provs:[];
  var tdocs=p.masters&&Array.isArray(p.masters.tdocs)?p.masters.tdocs:[];
  var _s=useState([]),movs=_s[0],setMovs=_s[1];
  var _s2=useState(false),modal=_s2[0],setModal=_s2[1];
  var _s3=useState(''),err=_s3[0],setErr=_s3[1];
  var _s4=useState(false),saving=_s4[0],setSaving=_s4[1];
  var blank={fecha:TODAY,bodega_id:'',prov_id:'',tdoc_id:'',ndoc:'',fdoc:TODAY,obs:'',lineas:[{prod_id:'',qty:'1',cu:'0'}]};
  var _s5=useState(blank),form=_s5[0],setForm=_s5[1];
  function load(){api('/movimientos?tipo=INGRESO','GET',null,p.tok).then(function(r){setMovs(Array.isArray(r)?r:[]);}).catch(function(){});}
  useEffect(function(){load();},[p.tok]);
  function sf(k,v){setForm(function(f){var x=Object.assign({},f);x[k]=v;return x;});}
  function addL(){setForm(function(f){return Object.assign({},f,{lineas:f.lineas.concat([{prod_id:'',qty:'1',cu:'0'}])});});}
  function remL(i){setForm(function(f){return Object.assign({},f,{lineas:f.lineas.filter(function(_,j){return j!==i;})});});}
  function updL(i,k,v){setForm(function(f){return Object.assign({},f,{lineas:f.lineas.map(function(l,j){return j===i?Object.assign({},l,{[k]:v}):l;})});});}
  function pickP(i,pid){
    var prod=prods.find(function(x){return String(x.producto_id)===pid;});
    setForm(function(f){return Object.assign({},f,{lineas:f.lineas.map(function(l,j){return j===i?Object.assign({},l,{prod_id:pid,cu:String(prod&&prod.costo_referencia||0)}):l;})});});
  }
  function save(){
    setErr('');
    if(!form.bodega_id||!form.fecha){setErr('Bodega y fecha son obligatorios');return;}
    if(!form.prov_id){setErr('Proveedor es obligatorio');return;}
    for(var i=0;i<form.lineas.length;i++){
      var l=form.lineas[i];
      if(!l.prod_id||!parseFloat(l.qty)||!parseFloat(l.cu)){setErr('Complete todas las líneas de producto');return;}
    }
    setSaving(true);
    api('/movimientos','POST',{
      tipo_movimiento:'INGRESO',fecha:form.fecha,
      bodega_id:parseInt(form.bodega_id),
      proveedor_id:parseInt(form.prov_id),
      tipo_doc_id:form.tdoc_id?parseInt(form.tdoc_id):null,
      numero_documento:form.ndoc||null,
      fecha_documento:form.fdoc||null,
      oc_referencia:form.obs||null,
      observaciones:form.obs||null,
      lineas:form.lineas.map(function(l){return{producto_id:parseInt(l.prod_id),cantidad:parseFloat(l.qty),costo_unitario:parseFloat(l.cu)};})
    },p.tok).then(function(){
      setModal(false);setErr('');setForm(blank);load();p.onMovement&&p.onMovement();
    }).catch(function(ex){setErr(ex.message||'Error al guardar');}).finally(function(){setSaving(false);});
  }
  var grandTotal=form.lineas.reduce(function(s,l){return s+(parseFloat(l.qty)||0)*(parseFloat(l.cu)||0);},0);
  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:12}},
      h(Btn,{onClick:function(){setErr('');setForm(blank);setModal(true);}},'+ Nuevo Ingreso')
    ),
    h('div',{className:'card'},h(TBL,{cols:[
      {lbl:'N°',k:'movimiento_id'},{lbl:'Fecha',k:'fecha'},{lbl:'Bodega',k:'bodega_nombre'},
      {lbl:'Proveedor',k:'proveedor_nombre'},
      {lbl:'Documento',render:function(r){return r.numero_documento?(str(r.tipo_doc_nombre)+' '+r.numero_documento):'—';}},
      {lbl:'Ítems',r:true,k:'num_lineas'},
      {lbl:'Total',r:true,render:function(r){return CLP(r.total_ingreso||0);}},
      {lbl:'Estado',render:function(r){return h(Bg,{c:r.estado==='ACTIVO'?'g':'r'},r.estado);}},
    ],rows:movs,empty:'No hay ingresos registrados'})),
    modal&&h(Modal,{title:'Registrar Ingreso',onClose:function(){setModal(false);},lg:true},
      h(EB,null,
        h('div',{className:'mb'},
          err&&h('div',{className:'al al-e'},err),
          h('div',{className:'g2'},
            h(FR,{label:'Fecha',req:true},h(Inp,{value:form.fecha,onChange:function(v){sf('fecha',v);},type:'date'})),
            h(FR,{label:'Bodega',req:true},h(Sel,{value:form.bodega_id,onChange:function(v){sf('bodega_id',v);}},
              h('option',{value:''},'Seleccione...'),
              bodegas.filter(function(b){return b.activo;}).map(function(b){return h('option',{key:b.bodega_id,value:b.bodega_id},b.nombre);})
            )),
            h(FR,{label:'Proveedor',req:true},h(Sel,{value:form.prov_id,onChange:function(v){sf('prov_id',v);}},
              h('option',{value:''},'Seleccione...'),
              provs.filter(function(q){return q.activo;}).map(function(q){return h('option',{key:q.proveedor_id,value:q.proveedor_id},q.nombre);})
            )),
            h(FR,{label:'Tipo documento'},h(Sel,{value:form.tdoc_id,onChange:function(v){sf('tdoc_id',v);}},
              h('option',{value:''},'Sin especificar'),
              tdocs.map(function(t){return h('option',{key:t.tipo_doc_id,value:t.tipo_doc_id},t.nombre);})
            )),
            h(FR,{label:'N° documento'},h(Inp,{value:form.ndoc,onChange:function(v){sf('ndoc',v);},ph:'Ej: 00045312'})),
            h(FR,{label:'Fecha documento'},h(Inp,{value:form.fdoc,onChange:function(v){sf('fdoc',v);},type:'date'})),
          ),
          h(FR,{label:'OC / Observaciones'},h(Inp,{value:form.obs,onChange:function(v){sf('obs',v);},ph:'Ej: OC-2025-0003'})),
