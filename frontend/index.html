// Builder HTML del finiquito (formato oficial)
function buildFiniquitoHTML(f){
  function CLPF(n){return '$'+new Intl.NumberFormat('es-CL').format(Math.round(parseFloat(n)||0));}
  var fechaTxt=fmtFechaLarga(f.fecha_termino);
  var fechaInicio=fmtFechaLarga(f.fecha_inicio);
  var logo=f.logo_base64?'<img src="'+f.logo_base64+'" style="max-height:80px;max-width:200px;margin-bottom:10px"/>':'';
  var firmaEmp=f.firma_representante?'<img src="'+f.firma_representante+'" style="max-height:70px;max-width:160px;display:block;margin:0 auto 4px"/>':'';
  var timbreEmp=f.timbre_empresa?'<div style="margin-top:6px;text-align:center"><img src="'+f.timbre_empresa+'" style="max-height:60px;max-width:140px"/></div>':'';
  // Mapeo causal a texto natural
  function causalTxt(c){
    if(!c)return'';
    var m={
      'Art. 159-1: Mutuo acuerdo':'Mutuo acuerdo de las partes',
      'Art. 159-2: Renuncia del trabajador':'Renuncia del trabajador',
      'Art. 159-3: Muerte del trabajador':'Muerte del trabajador',
      'Art. 159-4: Vencimiento plazo convenido (contratos plazo fijo)':'Vencimiento del plazo convenido',
      'Art. 159-5: Conclusión del trabajo que dio origen al contrato (obra o faena)':'Conclusión del trabajo o servicio que dio origen al contrato',
      'Art. 159-6: Caso fortuito o fuerza mayor':'Caso fortuito o fuerza mayor',
      'Art. 161-1: Necesidades de la empresa':'Necesidades de la empresa',
      'Art. 161-2: Desahucio':'Desahucio'
    };
    return m[c]||c;
  }
  function articuloTxt(c){
    if(!c)return'';
    var m=c.match(/Art\.\s*(\d+)-(\d+)/);
    return m?'Articulo '+m[1]+' No '+m[2]:c;
  }
  // Filas de liquidación
  var filas=[];
  if((f.indem_vacaciones||0)>0)filas.push(['Vacaciones proporcionales',f.indem_vacaciones]);
  if((f.indem_aviso_previo||0)>0)filas.push(['Indemnización sustitutiva aviso previo',f.indem_aviso_previo]);
  else filas.push(['Indemnización sustitutiva aviso previo',0]);
  if((f.indem_anios_servicio||0)>0)filas.push(['Indemnización Años de Servicio',f.indem_anios_servicio]);
  else filas.push(['Indemnización Años de Servicio',0]);
  if((f.indem_tiempo_servido||0)>0)filas.push(['Indemnización por tiempo servido (obra/faena)',f.indem_tiempo_servido]);
  if((f.remuneracion_pendiente||0)>0)filas.push(['Remuneración pendiente',f.remuneracion_pendiente]);
  if((f.descuentos||0)>0)filas.push(['Descuentos',f.descuentos]);
  if((f.saldo_afc_empleador||0)>0)filas.push(['Saldo AFC Aporte Empleador',f.saldo_afc_empleador]);
  filas.push(['Total a Pagar',f.total_finiquito]);
  var rowsHtml=filas.map(function(r,i){
    var isTotal=i===filas.length-1;
    return '<tr'+(isTotal?' style="font-weight:700;background:#F0FDF4"':'')+'><td style="padding:6px 10px;border:1px solid #94A3B8">'+r[0]+'</td><td style="padding:6px 10px;border:1px solid #94A3B8;text-align:right;font-family:monospace">'+CLPF(r[1])+'</td></tr>';
  }).join('');

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Finiquito</title>'+
    '<style>body{font-family:Calibri,Arial,sans-serif;font-size:11pt;line-height:1.5;margin:2cm;color:#000}'+
    'h2{text-align:center;font-size:14pt;margin:8px 0 18px}'+
    'p{text-align:justify;margin:8px 0}'+
    'table.liq{width:100%;border-collapse:collapse;margin:10px 0}'+
    '.firmas-tbl{margin-top:50px;width:100%;border-collapse:collapse}'+
    '.firmas-tbl td{width:50%;vertical-align:top;padding:0 5px;text-align:center}'+
    '.firma-line{border-top:1px solid #000;padding-top:6px;font-size:10pt;line-height:1.4}'+
    '.ministro{margin-top:50px;text-align:center;width:60%;margin-left:auto;margin-right:auto}'+
    '.ministro .firma-line{border-top:1px solid #000;padding-top:6px;font-size:10pt}'+
    '@media print{body{margin:1.5cm}}</style></head><body>'+
    logo+
    '<h2>Finiquito de Contrato de Trabajo</h2>'+
    '<p>En <strong>Nacimiento</strong>, a <strong>'+fechaTxt+'</strong>, entre <strong>'+(f.empresa_nombre||'')+'</strong>, R.U.T <strong>'+(f.empresa_rut||'')+'</strong>, en adelante, empleador, representado por '+
    (f.representante_nombre?'Don <strong>'+f.representante_nombre+'</strong> R.U.T. <strong>'+(f.representante_rut||'')+'</strong> ':'')+
    'ambos domiciliados en Avda. Julio Hemmelmann N° 127, comuna de Nacimiento, ciudad de Nacimiento, por una parte; y la otra, Don/Doña <strong>'+(f.nombre_completo||'')+'</strong>, R.U.T <strong>'+(f.rut||'')+'</strong>, domiciliado en '+(f.persona_direccion||'')+', comuna de '+(f.persona_comuna||'')+', en adelante, también, se deja testimonio y se ha acordado el finiquito que consta de las siguientes cláusulas:</p>'+
    '<p><strong>PRIMERO:</strong> El trabajador prestó servicios al empleador, en el cargo de <strong>'+(f.cargo||'')+'</strong>, desde el <strong>'+fechaInicio+'</strong>, hasta el <strong>'+fechaTxt+'</strong>, fecha esta última en que su contrato de trabajo ha terminado por, <strong>'+causalTxt(f.causal)+'</strong>, la causal señalada en el Código del Trabajo, <strong>'+articuloTxt(f.causal)+'</strong>.</p>'+
    '<p><strong>SEGUNDO:</strong> Don/Doña <strong>'+(f.nombre_completo||'')+'</strong> declara recibir en este acto, a su entera satisfacción, de parte de '+(f.empresa_nombre||'')+' la suma de <strong>'+CLPF(f.total_finiquito)+'</strong>, según la liquidación que se señala a continuación:</p>'+
    '<table class="liq">'+rowsHtml+'</table>'+
    '<p>Don/Doña <strong>'+(f.nombre_completo||'')+'</strong> declara haber analizado y estudiado detenidamente dicha liquidación, aceptándola en todas sus partes, sin tener observación alguna que formularle.</p>'+
    '<p><strong>TERCERO:</strong> En consecuencia, el empleador paga a Don/Doña <strong>'+(f.nombre_completo||'')+'</strong> en dinero efectivo que el trabajador declara recibir en este acto a su entera satisfacción. Las partes dejan constancia que la referida suma cubre el total de haberes especificados en la liquidación señalada en el numerando SEGUNDO del presente finiquito.</p>'+
    '<p><strong>CUARTO:</strong> Don/Doña <strong>'+(f.nombre_completo||'')+'</strong> deja constancia que durante el tiempo que prestó servicios a '+(f.empresa_nombre||'')+', recibió oportunamente el total de las remuneraciones, beneficios y demás prestaciones convenidas de acuerdo a su contrato de trabajo, clase de trabajo ejecutado y disposiciones legales pertinentes, y que en tal virtud el empleador nada le adeuda por tales conceptos, ni por horas extraordinarias, asignación familiar, feriado, indemnización por años de servicios, imposiciones previsionales, así como por ningún otro concepto, ya sea legal o contractual, derivado de la prestación de sus servicios, de su contrato de trabajo o de la terminación del mismo. En consecuencia, Don/Doña '+(f.nombre_completo||'')+' declara que no tiene reclamo alguno que formular en contra de '+(f.empresa_nombre||'')+', renunciando a todas las acciones que pudieran emanar del contrato que los vinculó.</p>'+

// Builder HTML de carta de término
function buildCartaTerminoHTML(c){
  function CLPF(n){return '$'+new Intl.NumberFormat('es-CL').format(Math.round(parseFloat(n)||0));}
  function safeDate(d){
    if(!d)return null;
    var s=String(d).slice(0,10); // toma YYYY-MM-DD aunque venga con timestamp
    var dd=new Date(s+'T00:00:00');
    return isNaN(dd.getTime())?null:dd;
  }
  function fmtCorto(d){
    var dd=safeDate(d);
    if(!dd)return '________';
    var p=function(n){return n<10?'0'+n:''+n;};
    return p(dd.getDate())+'-'+p(dd.getMonth()+1)+'-'+dd.getFullYear();
  }
  var fechaCarta=fmtFechaLarga(safeDate(c.fecha_carta)||c.fecha_carta);
  var ciudadFirma='NACIMIENTO';
  var fechaContratoStr=fmtCorto(c.fecha_contrato);
  var fechaTerminoStr=fmtCorto(c.fecha_termino);
  var logo=c.logo_base64?'<img src="'+c.logo_base64+'" style="max-height:65px;max-width:180px;margin-bottom:8px"/>':'';
  var firmaEmp=c.firma_representante?'<img src="'+c.firma_representante+'" style="max-height:90px;max-width:200px;display:block;margin:0 auto"/>':'';
  var timbreEmp=c.timbre_empresa?'<div style="margin-top:4px"><img src="'+c.timbre_empresa+'" style="max-height:55px;max-width:140px"/></div>':'';
  // Convertir causal en texto formal
  var causalUpper=(c.causal||'').toUpperCase().replace(/^ART\.\s*/,'ART. ');
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Carta de Término</title>'+
    '<style>body{font-family:Calibri,Arial,sans-serif;font-size:11pt;line-height:1.35;margin:1.6cm 2cm;color:#000}'+
    'p{text-align:justify;margin:6px 0}'+
    '.indem-table{margin:8px 0;width:100%;border-collapse:collapse;font-size:11pt}'+
    '.indem-table td{padding:2px 8px}'+
    '.indem-table td:first-child{padding-left:25px}'+
    '.indem-table td:last-child{text-align:right;font-weight:700;padding-right:30px}'+
    '.firmas-tbl{margin-top:14px;width:100%;border-collapse:collapse}'+
    '.firmas-tbl td{width:50%;vertical-align:top;padding:6px 8px;text-align:center;font-size:10pt;border:1px solid #94A3B8}'+
    '.firma-line{padding-top:4px;line-height:1.3;margin-top:4px}'+
    '@media print{body{margin:1.4cm 1.8cm}}</style></head><body>'+
    logo+
    '<p>'+ciudadFirma+', '+fechaCarta+'.</p>'+
    '<p>Señor</p>'+
    '<p><strong>'+(c.nombre_completo||'').toUpperCase()+'</strong><br/>'+
    (c.persona_direccion||'')+'<br/>'+
    (c.persona_comuna||'').toUpperCase()+'<br/>'+
    'Presente.</p>'+
    '<p>De nuestra consideración,</p>'+
    '<p>Nos referimos a su contrato de trabajo de fecha <strong>'+fechaContratoStr+'</strong>, que lo vincula con nuestra empresa y conforme al cual usted se desempeña, actualmente, como <strong>'+(c.cargo||'').toUpperCase()+'</strong>.</p>'+
    '<p>Por medio de la presente y de acuerdo a lo conversado con usted, cumplimos con formalizar y comunicar por escrito la decisión de la empresa en orden a poner término al contrato de trabajo antes indicado, a contar del <strong>'+fechaTerminoStr+'</strong>.</p>'+
    '<p>Lo anterior se funda en que, '+(c.causal_hecho||'')+'. De ese modo, se configura la causal de término de contrato establecida en el <strong>'+causalUpper+'</strong> del Código del Trabajo.</p>'+
    '<p>Hacemos presente que, sin perjuicio de los demás haberes y descuentos pertinentes, corresponden a usted las siguientes indemnizaciones:</p>'+
    '<table class="indem-table">'+
      '<tr><td>• Indemnización años de Servicio</td><td>'+CLPF(c.indem_anios_servicio)+'</td></tr>'+
      '<tr><td>• Vacaciones Proporcionales</td><td>'+CLPF(c.indem_vacaciones)+'</td></tr>'+
      '<tr><td>• Indemnización por tiempo servido</td><td>'+CLPF(c.indem_tiempo_servido)+'</td></tr>'+
      '<tr><td>• Indemnización sustitutiva del aviso previo</td><td>'+CLPF(c.indem_aviso_previo)+'</td></tr>'+
    '</table>'+
    '<p>Por otro lado, y de conformidad a la ley, le hacemos saber que sus cotizaciones previsionales quedaron totalmente declaradas y pagadas hasta esta fecha. Adjuntamos a la presente, certificado de cotizaciones previsionales pagadas, que dan cuenta de lo señalado precedentemente.</p>'+
    '<p>Sin otro particular,</p>'+
    '<p>Saluda atentamente a usted, y agradeciendo su colaboración.</p>'+
    '<table class="firmas-tbl"><tr>'+
      '<td>'+
        '<div style="height:96px;text-align:center">'+firmaEmp+'</div>'+
        '<div class="firma-line">'+(c.empresa_nombre||'').toUpperCase()+'<br/>'+(c.empresa_rut||'')+(c.representante_rut?'<br/>Representante Legal: '+c.representante_rut:'')+'</div>'+
        timbreEmp+
      '</td>'+
      '<td>'+
        '<div style="height:96px"></div>'+
        '<div class="firma-line">Recibí copia de la presente carta<br/><br/>'+(c.nombre_completo||'').toUpperCase()+'<br/>'+(c.rut||'')+'</div>'+
      '</td>'+
    '</tr></table>'+
    '</body></html>';
}

// ── Formulario de traslado móvil (simplificado, campos grandes) ──
function MobileTransporte(p){
  var empresas=(p.m.empresas||[]).filter(function(e){return e.activo;});
  var faenas=p.m.faenas||[];
  var equipos=(p.m.equipos||[]).filter(function(e){return e.activo&&!e.es_transporte;});
  var estanques=(p.m.combEstanques||[]).filter(function(e){return e.activo;});
  var[camiones,setCamiones]=useState([]);
  var[choferes,setChoferes]=useState([]);
  var[modo,setModo]=useState('pendientes'); // pendientes | form
  var[pendientes,setPendientes]=useState([]);
  var[planActivo,setPlanActivo]=useState(null);
  var[msg,setMsg]=useState('');
  var[saved,setSaved]=useState(false);
  var emptyForm={fecha:new Date().toISOString().slice(0,10),empresa_id:'',camion_id:'',chofer_id:'',faena_id:'',equipo_id:'',origen:'',destino:'',km_cargado:'',km_vacio:'0',litros_combustible:'0',estanque_id:'',observaciones:''};
  var[form,setForm]=useState(emptyForm);

  useEffect(function(){
    api('/trans/camiones','GET',null,p.tok).then(function(r){setCamiones(r||[]);}).catch(function(){});
    api('/trans/choferes','GET',null,p.tok).then(function(r){setChoferes(r||[]);}).catch(function(){});
  },[p.tok]);

  // Cargar pendientes del día + próximos días
  function loadPendientes(){
    var hoy=new Date().toISOString().slice(0,10);
    var d=new Date();d.setDate(d.getDate()+14);var hasta=d.toISOString().slice(0,10);
    api('/trans/planificacion?solo_pendientes=1&desde='+hoy+'&hasta='+hasta,'GET',null,p.tok).then(function(r){
      setPendientes(Array.isArray(r)?r:[]);
    }).catch(function(){});
  }
  useEffect(loadPendientes,[p.tok]);

  function upd(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}

  function ejecutarPlan(plan){
    // Pre-llenar formulario desde la planificación
    setPlanActivo(plan);
    setForm({
      fecha:(plan.fecha_plan+'').slice(0,10),
      empresa_id:plan.empresa_id||'',
      camion_id:plan.camion_id||'',
      chofer_id:plan.chofer_id||'',
      faena_id:plan.faena_id||'',
      equipo_id:plan.equipo_id||'',
      origen:plan.origen||'',
      destino:plan.destino||'',
      km_cargado:plan.km_cargado_plan||'',
      km_vacio:plan.km_vacio_plan||'0',
      litros_combustible:'0',
      estanque_id:'',
      observaciones:plan.observaciones||''
    });
    setModo('form');setMsg('');setSaved(false);
  }

  function nuevoDirecto(){setPlanActivo(null);setForm(emptyForm);setModo('form');setMsg('');setSaved(false);}

  function guardar(){
    if(!form.empresa_id||!form.camion_id||!form.chofer_id){setMsg('Complete empresa, camión y chofer');return;}
    if(!form.origen||!form.destino){setMsg('Complete origen y destino');return;}
    var kc=parseFloat(form.km_cargado)||0;var kv=parseFloat(form.km_vacio)||0;
    if(kc+kv===0){setMsg('Ingrese kilómetros');return;}
    api('/trans/traslados','POST',Object.assign({},form,{estado:'finalizado'}),p.tok).then(function(r){
      // Si viene de un plan, marcarlo como ejecutado
      if(planActivo&&r&&r.traslado_id){
        api('/trans/planificacion/'+planActivo.plan_id+'/ejecutar','POST',{traslado_id:r.traslado_id},p.tok).catch(function(){});
      }
      setSaved(true);setMsg('');
      loadPendientes();
    }).catch(function(e){setMsg(e.message);});
  }

  function volver(){setSaved(false);setPlanActivo(null);setModo('pendientes');setForm(emptyForm);}
  function nuevo(){setSaved(false);setPlanActivo(null);setForm(Object.assign({},emptyForm,{empresa_id:form.empresa_id,camion_id:form.camion_id,chofer_id:form.chofer_id}));}

  var F=function(lbl,content){return h('div',{className:'mob-field'},h('label',null,lbl),content);};
  var priCol={normal:'#64748B',alta:'#F59E0B',urgente:'#DC2626'};

  // Pantalla éxito
  if(saved)return h('div',{className:'mob-wrap'},
    h('div',{className:'mob-topbar'},h('button',{onClick:volver},'←'),h('h3',null,'Traslado')),
    h('div',{style:{textAlign:'center',padding:'60px 20px'}},
      h('div',{style:{fontSize:48,marginBottom:12}},'✅'),
      h('div',{style:{fontSize:16,fontWeight:700,color:'#166534',marginBottom:8}},'Traslado registrado'),
      planActivo&&h('div',{style:{fontSize:12,color:'#64748B',marginBottom:12}},'Planificación marcada como ejecutada'),
      h('button',{onClick:nuevo,className:'mob-form mob-submit',style:{maxWidth:200,margin:'16px auto',display:'block'}},'Registrar otro'),
      h('button',{onClick:volver,style:{background:'none',border:'1px solid #CBD5E1',padding:'12px 24px',borderRadius:8,marginTop:8,cursor:'pointer',fontSize:14}},'Volver a pendientes')
    )
  );

  // Pantalla pendientes (default al entrar)
  if(modo==='pendientes')return h('div',{className:'mob-wrap'},
    h('div',{className:'mob-topbar'},h('button',{onClick:p.onBack},'←'),h('h3',null,'Traslados planificados')),
    h('div',{style:{padding:'12px'}},
      h('button',{onClick:nuevoDirecto,style:{width:'100%',padding:'14px',background:'#1E3A2D',color:'#D4C5A9',border:'none',borderRadius:10,fontSize:15,fontWeight:700,marginBottom:16,cursor:'pointer'}},'+ Nuevo traslado directo'),
      pendientes.length===0?h('div',{style:{textAlign:'center',padding:'40px 20px',color:'#94A3B8'}},
        h('div',{style:{fontSize:40,marginBottom:8}},'📭'),
        h('div',{style:{fontSize:14}},'Sin traslados planificados'),
        h('div',{style:{fontSize:11,marginTop:4}},'Use el botón de arriba para registrar uno nuevo')
      ):h('div',null,
        h('div',{style:{fontSize:11,fontWeight:700,color:'#64748B',marginBottom:8,textTransform:'uppercase',letterSpacing:1}},'Pendientes próximos 14 días'),
        pendientes.map(function(pl){
          var fecha=(pl.fecha_plan+'').slice(0,10);
          var d=new Date(fecha+'T00:00:00');
          var hoy=new Date().toISOString().slice(0,10);
          var esHoy=fecha===hoy;
          return h('div',{key:pl.plan_id,onClick:function(){ejecutarPlan(pl);},style:{padding:14,marginBottom:10,background:esHoy?'#FEF3C7':'#fff',borderLeft:'5px solid '+priCol[pl.prioridad||'normal'],borderRadius:8,boxShadow:'0 1px 3px rgba(0,0,0,.08)',cursor:'pointer'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
              h('div',{style:{fontSize:13,fontWeight:700,color:'#1E3A2D'}},
                esHoy?'HOY':d.toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'}).toUpperCase(),
                pl.hora_plan?h('span',{style:{marginLeft:6,fontWeight:500}},pl.hora_plan.slice(0,5)):null
              ),
              pl.prioridad==='urgente'?h('span',{style:{fontSize:9,background:'#DC2626',color:'#fff',padding:'2px 6px',borderRadius:10,fontWeight:700}},'URGENTE'):pl.prioridad==='alta'?h('span',{style:{fontSize:9,background:'#F59E0B',color:'#fff',padding:'2px 6px',borderRadius:10,fontWeight:700}},'ALTA'):null
            ),
            h('div',{style:{fontSize:14,fontWeight:600,color:'#0F172A',marginBottom:4}},(pl.origen||'?')+' → '+(pl.destino||'?')),
            h('div',{style:{fontSize:11,color:'#64748B'}},
              '🚛 '+(pl.camion_patente||pl.camion_nombre||'?'),
              pl.equipo_nombre?' · 📦 '+pl.equipo_nombre:''
            ),
            pl.observaciones?h('div',{style:{fontSize:11,color:'#94A3B8',marginTop:4,fontStyle:'italic'}},pl.observaciones):null,
            h('div',{style:{marginTop:8,fontSize:11,color:'#1E3A2D',fontWeight:600}},'Tocar para ejecutar →')
          );
        })
      )
    )
  );

  // Formulario de ejecución
  return h('div',{className:'mob-wrap'},
    h('div',{className:'mob-topbar'},h('button',{onClick:volver},'←'),h('h3',null,planActivo?'Ejecutar planificación':'Nuevo traslado')),
    h('div',{className:'mob-form',style:{paddingBottom:40}},
      planActivo&&h('div',{style:{background:'#DBEAFE',border:'1px solid #3B82F6',color:'#1E40AF',padding:10,borderRadius:8,fontSize:11,marginBottom:12}},
        '📋 Ejecutando plan del ',(planActivo.fecha_plan+'').slice(0,10),planActivo.hora_plan?' '+planActivo.hora_plan.slice(0,5):'',
        h('div',{style:{fontSize:10,marginTop:2,color:'#3B82F6'}},'Puede modificar cualquier dato según lo ocurrido')
      ),
      msg&&h('div',{className:'al al-e',style:{marginBottom:10}},msg),
      F('Fecha',h('input',{type:'date',value:form.fecha,onChange:function(e){upd('fecha',e.target.value);}})),
      F('Empresa',h('select',{value:form.empresa_id,onChange:function(e){upd('empresa_id',e.target.value);}},h('option',{value:''},'Seleccione empresa...'),empresas.map(function(e){return h('option',{key:e.empresa_id,value:e.empresa_id},e.razon_social);}))),
      F('Camión cama baja',h('select',{value:form.camion_id,onChange:function(e){upd('camion_id',e.target.value);}},h('option',{value:''},'Seleccione camión...'),camiones.map(function(c){return h('option',{key:c.equipo_id,value:c.equipo_id},c.patente_serie+(c.patente_carro?' + '+c.patente_carro:'')+' — '+c.nombre);}))),
      F('Chofer',h('select',{value:form.chofer_id,onChange:function(e){upd('chofer_id',e.target.value);}},h('option',{value:''},'Seleccione chofer...'),choferes.map(function(c){return h('option',{key:c.persona_id,value:c.persona_id},c.nombre_completo);}))),
      F('Faena',h('select',{value:form.faena_id,onChange:function(e){upd('faena_id',e.target.value);}},h('option',{value:''},'—'),faenas.map(function(f){return h('option',{key:f.faena_id,value:f.faena_id},f.nombre);}))),
      F('Equipo transportado',h('select',{value:form.equipo_id,onChange:function(e){upd('equipo_id',e.target.value);}},h('option',{value:''},'—'),equipos.map(function(e){return h('option',{key:e.equipo_id,value:e.equipo_id},e.codigo+' — '+e.nombre);}))),

var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;

  if(window.innerWidth>768)return;
  if(sessionStorage.getItem('pwa_dismissed'))return;
  var banner=document.createElement('div');banner.className='mob-install';banner.id='pwa-install';
  banner.innerHTML='<span>📱 Instalar como app</span><div style="display:flex;gap:6px"><button onclick="installPWA()">Instalar</button><button onclick="dismissPWA()" style="background:transparent;color:#D4C5A9;border:1px solid rgba(212,197,169,.4);padding:8px 12px;border-radius:6px;cursor:pointer">×</button></div>';
  document.body.appendChild(banner);
});
window.installPWA=function(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(){deferredPrompt=null;var b=document.getElementById('pwa-install');if(b)b.remove();});
};
window.dismissPWA=function(){sessionStorage.setItem('pwa_dismissed','1');var b=document.getElementById('pwa-install');if(b)b.remove();};
